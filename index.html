{d:25,wk:5,ph:'표현·음색',t:'셈여림',lead:'소리 크기 변화가 화성 긴장과 맞물려 다이내믹 아치를 만들어요.',concept:'<p>소리 크기 변화는 화성 긴장과 맞물려 하나의 <b>다이내믹 아치</b>를 이뤄요. 낱개 셈여림이 아니라 "정점을 향한 곡선"으로 설계하는 게 핵심입니다.</p><table class="ctbl"><tr><th>기법</th><th>설명</th></tr><tr><td>계단식(테라스)</td><td>단으로 뚝뚝 f→p 급전환 (바로크)</td></tr><tr><td>메사 디 보체</td><td>한 음을 &lt;&gt;로 부풀렸다 줄임 (성악·관악)</td></tr><tr><td>만하임 크레셴도</td><td>로켓·롤러·한숨 — 극적 점층</td></tr><tr><td>로시니 크레셴도</td><td>반복→단축→악기 추가→음역 상승</td></tr><tr><td>기능적 크레셴도</td><td>정점으로 향하는 다이내믹 아치</td></tr></table><svg class="cdia" viewBox="0 0 320 122"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">다이내믹 아치 — 정점을 향한 하나의 곡선</text><line x1="20" y1="100" x2="305" y2="100" stroke="#75818b" stroke-width="1"/><path d="M22,96 C90,90 150,32 214,30 C250,29 280,60 300,88" fill="none" stroke="#6fe9cd" stroke-width="2.4"/><line x1="214" y1="30" x2="214" y2="100" stroke="#ff8575" stroke-dasharray="3 3"/><circle cx="214" cy="30" r="4" fill="#ff8575"/><text x="22" y="114" font-size="9" fill="#a2b3de">p 시작</text><text x="214" y="24" text-anchor="middle" font-size="9" fill="#ff8575" font-weight="700">ff 정점</text><text x="300" y="114" text-anchor="end" font-size="9" fill="#a2b3de">p 이완</text><text x="214" y="114" text-anchor="middle" font-size="8.5" fill="#75818b">약 2/3 지점</text></svg><p><b>해석 · </b>표현은 <b>하나의 큰 곡선</b>이에요. 어디서 시작해 어디가 정점이고 어디서 이완하는지를 먼저 정해야, 국지적 셈여림이 그 아치에 종속됩니다. 정점은 보통 <b>후반 2/3 지점</b>에 두어야 자연스러워요.</p><div class="cnote"><b>지휘 함의 · </b>다이내믹은 <b>왼손</b>의 몫. 손바닥 높이로 음량을 은유하며 아치를 그리세요. 정점을 너무 일찍 소모하면 김이 빠집니다.</div>',think:['정점을 2/3 지점에 두는 관습 — 이야기 구조(기승전결)와 우연의 일치일까?','크레셴도 없이 긴장을 키우는 방법을 세 가지 이상 떠올려보기.'],listen:['차이콥스키 교향곡 6번 4악장','소리가 꺼져가는 방식의 슬픔 — 사라지는 다이내믹을 끝까지 배웅해보세요.'],read:[
'계단식: 단으로 뚝뚝(바로크)','메사 디 보체: 한 음 <>로 부풀렸다 줄임','만하임: 크레셴도·로켓·롤러·한숨·그랜드 포즈','로시니 크레셴도: 반복→단축→악기 추가→음역 상승','기능적 크레셴도: 정점으로 향하는 다이내믹 아치'],
q:[mc('점점이 아니라 단으로 뚝뚝 바뀌는 바로크 셈여림은?',['메사 디 보체','계단식','만하임 크레셴도','로시니'],1,'f→p 급전환.'),
sa('한 음을 여리게 시작해 부풀렸다 다시 줄이는 것(<>)은?','메사 디 보체','성악·관악의 호흡 미학.'),
mc('로시니 크레셴도의 특징이 아닌 것은?',['악구 반복','점점 단축','악기 추가','음역 하강'],3,'음역을 위로 올려 달아오름.')],
task:'한 악구에서 정점을 향하는 다이내믹 아치를 그려보기(어디서 시작·정점·이완).'},

{d:26,wk:5,ph:'표현·음색',t:'아고긱·템포',lead:'음량이 아니라 시간의 흔들림으로 표현. 리만이 정립.',concept:'<p>음량이 아니라 <b>시간의 흔들림</b>으로 표현하는 방식이에요. 리만이 정립했습니다.</p><table class="ctbl"><tr><th>수단</th><th>설명</th></tr><tr><td>아고긱 악센트</td><td>음을 살짝 길게 늘여 강세 (음량 없이 도드라지게)</td></tr><tr><td>템포 루바토</td><td>선율만 신축(쇼팽) / 전체 신축</td></tr><tr><td>점진 변화</td><td>rit · rall · accel · allargando</td></tr><tr><td>급격 변화</td><td>ritenuto · stringendo · a tempo</td></tr><tr><td>뤼시 규칙</td><td>상행=조임, 하행=늦춤</td></tr></table><p><b>해석 · </b><b>아고긱 악센트</b>는 셋잇단 첫 음이나 정점 음을 미세하게 끌어 "음량 없이 도드라지게" 하는 거예요. 루바토는 "훔친 시간을 같은 마디 안에서 되갚는다"는 원리 — 선율이 밀면 어딘가서 당겨 균형을 맞춥니다.</p><div class="cnote"><b>지휘 함의 · </b>rit는 박을 <b>세분</b>해 안정시키고, 아고긱은 <b>익투스 타이밍</b>을 미세하게 늘려 표현하세요. 셈여림(어제)과 아고긱은 섞지 말고 하나씩 써야 효과가 삽니다.</div>',think:['아고긱이 지나치면 무엇이 무너질까? 자유와 방종의 경계는 어디일까?','루바토가 훔친 시간을 되갚는 것이라면, 되갚지 않는 루바토는 어떤 음악이 될까?'],listen:['쇼팽 녹턴 Op.9-2','루바토가 숨처럼 밀고 당기는 시간. 연주자의 호흡에 내 호흡을 포개보세요.'],read:[
'아고긱 악센트: 음을 살짝 길게 늘여 강세(음량 없이 도드라지게)','템포 루바토: 선율만 신축(쇼팽) / 전체 루바토','점진: rit·rall / accel / allargando','급격: ritenuto / stringendo / a tempo','뤼시 규칙: 상행=조임, 하행=늦춤'],
q:[mc('소리를 키우지 않고 음을 살짝 길게 늘여 주는 강세는?',['다이내믹 악센트','아고긱 악센트','스포르찬도','테누토'],1,'셋잇단 첫 음·정점 음을 미세하게 끄는 것.'),
sa('반주는 일정한데 선율만 자유롭게 밀고 당기는 루바토는?','선율 루바토','쇼팽식. "훔친 시간은 같은 마디 안에서 되갚는다".'),
mc('즉시 당겨 느리게 하는 지시어는?',['ritardando','ritenuto','rallentando','allargando'],1,'ritenuto=점진적이 아닌 즉각적.')],
task:'느린 악장 한 악구에 아고긱(어느 음을 살짝 끌지)을 3곳 표시.'},

{d:27,wk:5,ph:'표현·음색',t:'관현악법 I',lead:'같은 음악도 어떻게 입히느냐로 달라져요. 7개의 축·악기군·배합.',concept:'<p>같은 음악도 <b>어떤 악기로 울리느냐</b>로 완전히 달라져요. 악기군의 성격과 배합이 관현악 색의 기초입니다.</p><table class="ctbl"><tr><th>악기군</th><th>특성</th><th>역할</th></tr><tr><td>현</td><td>균질 · 잘 융합 · 표현폭 넓음</td><td>바탕천</td></tr><tr><td>목관</td><td>개성 강함 · 각기 다른 색</td><td>색채 · 솔로</td></tr><tr><td>금관</td><td>광채 · 힘</td><td>정점 · 팡파르</td></tr><tr><td>타</td><td>리듬 · 색채</td><td>강조 · 색</td></tr></table><svg class="cdia" viewBox="0 0 320 148"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">오케스트라 배치 — 지휘자 앞으로 층층이</text><path d="M40,120 A120,120 0 0 1 280,120" fill="none" stroke="#6fe9cd" stroke-width="16" opacity=".35"/><path d="M62,120 A98,98 0 0 1 258,120" fill="none" stroke="#f5d18f" stroke-width="14" opacity=".35"/><path d="M84,120 A76,76 0 0 1 236,120" fill="none" stroke="#ff8575" stroke-width="13" opacity=".35"/><text x="160" y="30" text-anchor="middle" font-size="9" fill="#ff8575" font-weight="700">금관·타 (뒤)</text><text x="160" y="52" text-anchor="middle" font-size="9" fill="#f5d18f" font-weight="700">목관 (중간)</text><text x="160" y="74" text-anchor="middle" font-size="9.5" fill="#6fe9cd" font-weight="700">현 (앞·바탕천)</text><circle cx="160" cy="132" r="8" fill="#a2b3de"/><text x="160" y="146" text-anchor="middle" font-size="8.5" fill="#a7b4bc">지휘자</text></svg><p><b>해석 · </b>배합은 <b>동질</b>(같은 군 = 잘 융합), <b>이질</b>(다른 군 = 대비), <b>혼합색</b>(섞어 제3의 색)으로 나뉘어요. 림스키코르사코프의 원리는 <b>색의 절제</b> — 다 쓰지 말아야 정점에서 색이 삽니다.</p><div class="cnote"><b>지휘 함의 · </b>어느 악기군이 <b>주선율을 지금 쥐고 있는지</b>를 늘 파악하세요. 그 층을 띄우고 나머지를 받쳐 발란스를 조각합니다.</div>',think:['색의 절제 — 아껴야 산다는 원리가 적용되는 다른 예술·삶의 장면을 찾아보기.','현이 바탕천이라면, 바탕천 없이 목관·금관만으로 짠 음악은 어떤 옷일까?'],listen:['무소륵스키·라벨 「전람회의 그림」','같은 선율이 악기를 갈아입는 마법 — 프롬나드가 돌아올 때마다 옷이 달라요.'],read:[
'7축: 편성·배합방식·주법·음역·수(solo/divisi/tutti)·짜임새 역할·셈여림','악기군: 현(바탕천)·목관(개성)·금관(광채)·타(리듬·색채)','배합: 동질(잘 융합)·이질(대비/혼합색)·중복(동음·옥타브)','R-K: 색의 절제 — 다 쓰지 말 것'],
q:[mc('음색이 균질하고 잘 섞여 "바탕천"이 되는 악기군은?',['목관','금관','현악','타악'],2,'표현폭이 가장 넓음.'),
sa('다른 군을 섞어 제3의 색을 만드는 배합을 뭐라 하나?','혼합색(이질 배합)','플루트+바이올린 유니즌의 부드러운 광택.'),
mc('림스키코르사코프가 강조한 관현악 원리는?',['다 쓰기','색의 절제','한 악기만','타악 위주'],1,'꼭 필요한 만큼만 칠해야 정점에서 색이 삼.')],
task:'같은 선율을 현/목관/금관으로 상상해 각각 어떤 느낌인지 메모.'},

{d:28,wk:5,ph:'표현·음색',t:'관현악법 II',lead:'짜임새의 층과 주법 — 발란스 설계.',concept:'<p>짜임새의 <b>층</b>과 <b>주법</b> — 발란스 설계의 실전이에요.</p><table class="ctbl"><tr><th>구분</th><th>내용</th></tr><tr><td>5개 기능 층</td><td>주선율 · 대선율 · 베이스 · 화성 충전 · 리듬</td></tr><tr><td>sul ponticello</td><td>브리지 쪽 활 — 거칠·금속적</td></tr><tr><td>sul tasto</td><td>지판 쪽 활 — 부드럽·플루트 같은</td></tr><tr><td>con sordino</td><td>약음기 — 어둡·먼 소리</td></tr><tr><td>하모닉스</td><td>배음 — 유리 같은 맑음</td></tr></table><p><b>해석 · </b>총보에서 <b>5개 층</b>을 색으로 구분하면 발란스가 보여요 — 지금 무엇이 주선율이고 무엇이 채움인지. 작곡가의 주법 선택(sul tasto·약음기)은 곧 <b>음색·발란스 지시</b>라, 그 의도대로 큐와 균형을 만듭니다.</p><div class="cnote"><b>지휘 함의 · </b>관현악법 분석 = <b>지휘 해석의 절반</b>. 주법과 배합을 읽는 순간 어느 층을 어떻게 들려줄지가 정해져요.</div>',think:['다섯 층 중 하나를 뺀다면 무엇을 빼도 음악이 성립할까? 층의 위계를 실험해보기.','주법 지시가 없는 곳에서 지휘자의 자유는 어디까지일까?'],listen:['드뷔시 「목신의 오후 전주곡」','플루트 한 줄이 여는 오후의 공기. 음색 하나가 세계를 만드는 순간.'],read:[
'5개 층: 주선율·대선율·베이스·화성충전·리듬 — 각 층 다른 음색','성부 배치: 밀집/개리, 음역 배분','주법: sul ponticello(거칠)·sul tasto(부드럽)·con sordino(약음기)·하모닉스','지휘 함의: 배합·주법 읽기 = 발란스 설계. 관현악법 분석 = 지휘 해석의 절반'],
q:[mc('안을 채우는 지속화음 층(흔히 호른·내성 현)은?',['주선율','대선율','화성 충전','리듬'],2,'Harmonic filler/pad.'),
sa('브리지 쪽을 활로 그어 거칠고 금속적인 음색을 내는 주법은?','sul ponticello','sul tasto는 반대(부드럽고 플루트 같은).'),
mc('작곡가가 sul tasto·약음기를 택한 의도를 읽으면?',['템포가 정해짐','음색·발란스 설계로 이어짐','조가 정해짐','종지가 정해짐'],1,'그 의도대로 큐·균형·음색을 만듦.')],
task:'오케스트라 총보 한 페이지에서 5개 층을 색으로 구분해보기.'},

{d:29,wk:5,ph:'표현·음색',t:'화성색·음색 텍스처',lead:'배치·음색이 화성의 색을 만들어요. 보이싱·음색선율·스펙트럼.',concept:'<p>같은 화음도 <b>배치</b>와 <b>음색</b>에 따라 색이 달라져요. 화성의 색을 만드는 요소들입니다.</p><table class="ctbl"><tr><th>요소</th><th>내용</th></tr><tr><td>보이싱</td><td>밀집=뭉침·두꺼움 / 개방=투명·공간감</td></tr><tr><td>간격</td><td>저음역 3도=뭉침 / 6·10도=열림 / 2·7도=마찰</td></tr><tr><td>중복</td><td>근음 중복=안정 / 3음 중복=색 진해짐</td></tr><tr><td>음색선율</td><td>같은 음을 악기 바꿔가며 = 색이 곧 선율(쇤베르크 Op.16-3)</td></tr><tr><td>스펙트럼</td><td>자연배음렬=융합·광채 / 어긋나게=거칠·긴장</td></tr></table><p><b>해석 · </b>화성색은 "무슨 화음이냐"만이 아니라 "어떻게 배치·중복·발성하느냐"의 문제예요. <b>음색선율</b>은 화성을 정지시키고 음색만 움직여 선율을 만드는 20세기의 발상 — 사운드 자체가 화성이 되는 스펙트럴 음악으로 이어집니다.</p><div class="cex"><div class="cex-t">🎧 예시 — 보이싱 — 밀집 vs 개방</div><div class="cex-btns"><button class="cex-b" onclick="ac();playChord([60,64,67],1.4)">밀집</button><button class="cex-b" onclick="ac();playChord([48,55,64],1.4)">개방</button></div><div class="cex-d">밀집은 한 옥타브에 뭉쳐 두껍게, 개방은 넓게 벌려 투명하게. 같은 화음도 색이 달라져요.</div></div><div class="cnote"><b>지휘 함의 · </b>화성색은 <b>발란스로 조각</b>해요. 같은 코드도 어느 층을 끌어올리냐로 색이 바뀌니, 원하는 색을 위해 특정 성부를 띄우거나 누르세요.</div>',think:['같은 화음의 밀집·개방이 다른 감정을 주는 이유 — 공간감이 감정이 되는 메커니즘은?','음색선율을 일상에서 찾아보기 — 같은 말을 다른 목소리로 이어 말할 때 무엇이 들릴까?'],listen:['라벨 「물의 유희」','화음이 물빛이 되는 순간 — 소리를 색으로, 색을 온도로 느껴보세요.'],read:[
'간격의 색: 3도는 저음역서 뭉침, 6·10도는 열림, 4·5도=순수, 2·7도=마찰','중복: 근음 중복=안정, 3음 중복=장·단 성격 진해짐','음색선율: 같은 음을 악기 바꿔가며 = 색이 곧 선율','배음·스펙트럼: 자연배음렬대로=융합·광채 / 어긋나게=거칠·긴장'],
q:[mc('저음역에서 뭉치기 쉬워 피해야 하는 음정은?',['6도','10도','3도','5도'],2,'저음역 3도는 탁함 → 넓게 벌려야.'),
sa('배음을 그대로 화음으로 끌어오는 20세기 사조는?','스펙트럴(스펙트럼악파)','그리세·뮈라이 — "음색이 곧 화성".'),
mc('3음을 중복하면 무엇이 강조되나?',['근음','장·단 성격(색)','베이스','리듬'],1,'화음의 색이 진해짐.')],
task:'앱 사전에서 한 화음을 골라 밀집/개방·중복을 바꿔 색 변화를 귀로 익히기.'},

{d:30,wk:5,ph:'표현·음색',t:'복습 — 표현·음색',lead:'문제로 다지기.',concept:'<p><b>5주차 정리.</b> 표현(셈여림·아고긱)과 음색(관현악법·화성색) — 음악에 <b>생명과 색</b>을 입히는 도구들이에요.</p><table class="ctbl"><tr><th>개념</th><th>핵심</th></tr><tr><td>셈여림</td><td>정점을 향한 다이내믹 아치로 설계</td></tr><tr><td>아고긱</td><td>시간(타이밍)으로 주는 강세·표현</td></tr><tr><td>관현악법</td><td>악기군·배합·층·주법 = 발란스</td></tr><tr><td>화성색</td><td>보이싱·중복·음색선율로 색을 조각</td></tr></table><div class="cnote"><b>복습법 · </b>한 곡의 정점을 찾아 <b>화성 긴장 + 다이내믹 + 음색</b>이 어떻게 겹치는지 한 줄로 적어보세요. 표현은 이 셋을 하나의 곡선으로 모으는 일이에요.</div>',think:['표현과 음색을 한 정점에 겹칠 때와 어긋나게 배치할 때 — 각각 어떤 드라마가 될까?','이번 주 개념으로 최근 들은 연주 하나를 비평해보기 — 무엇이 좋았고 무엇이 아쉬웠나?'],listen:['말러 교향곡 5번 아다지에토','표현과 음색이 하나의 긴 호흡이 되는 10분. 중간에 끊지 말고.'],read:['셈여림·아고긱·관현악법·화성색 점검','핵심: 표현은 정점을 향한 하나의 곡선으로 설계'],
q:[mc('만하임 악파의 효과가 아닌 것은?',['크레셴도','로켓','한숨','헤미올라'],3,'헤미올라는 리듬 기법.'),
sa('음량 없이 음을 길게 끌어 도드라지게 하는 강세는?','아고긱 악센트','시간으로 주는 강세.'),
mc('관현악 5개 기능 층에 없는 것은?',['주선율','대선율','종지','리듬'],2,'주선율·대선율·베이스·화성충전·리듬.'),
sa('같은 음을 악기 바꿔가며 만드는 "음색의 선율"은?','음색선율(Klangfarbenmelodie)','쇤베르크.')],
task:'한 곡의 정점을 찾아 화성긴장+다이내믹+음색이 어떻게 겹치는지 한 줄로.'},

// ── 6주: 형식·구조 ──
{d:31,wk:6,ph:'형식·구조',t:'형식 기초',lead:'곡의 큰 틀을 읽어요. 소나타·론도·변주·정점.',concept:'<p>곡이 어떤 <b>큰 틀</b>로 짜였는지 보는 거예요. 구획·정점·반복의 지도를 그려야 큰 아치 위에서 국지 사건을 배치할 수 있어요.</p><table class="ctbl"><tr><th>형식</th><th>구조</th><th>특징</th></tr><tr><td>소나타</td><td>제시 → 발전 → 재현</td><td>고전 교향곡·소나타의 뼈대</td></tr><tr><td>론도</td><td>A-B-A-C-A</td><td>후렴이 돌아옴</td></tr><tr><td>변주곡</td><td>주제 + 변형들</td><td>같은 뼈대 반복 변형</td></tr><tr><td>3부형식</td><td>A-B-A</td><td>가운데 대비</td></tr><tr><td>푸가</td><td>주제 모방 대위</td><td>대위법으로 짬</td></tr></table><svg class="cdia" viewBox="0 0 320 108"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">소나타 형식 — 제시 · 발전 · 재현</text><rect x="10" y="30" width="70" height="34" fill="rgba(111,233,205,.25)" stroke="#6fe9cd"/><rect x="80" y="30" width="60" height="34" fill="rgba(162,179,222,.25)" stroke="#a2b3de"/><rect x="140" y="30" width="70" height="34" fill="rgba(245,209,143,.25)" stroke="#f5d18f"/><rect x="210" y="30" width="55" height="34" fill="rgba(111,233,205,.25)" stroke="#6fe9cd"/><rect x="265" y="30" width="45" height="34" fill="rgba(162,179,222,.25)" stroke="#a2b3de"/><text x="45" y="51" text-anchor="middle" font-size="8.5" fill="#dbe4e8">1주제</text><text x="110" y="51" text-anchor="middle" font-size="8.5" fill="#dbe4e8">2주제</text><text x="175" y="51" text-anchor="middle" font-size="8.5" fill="#dbe4e8">전개</text><text x="237" y="51" text-anchor="middle" font-size="8.5" fill="#dbe4e8">1주제</text><text x="287" y="51" text-anchor="middle" font-size="8.5" fill="#dbe4e8">2주제</text><text x="75" y="78" text-anchor="middle" font-size="9" fill="#6fe9cd" font-weight="700">제시부</text><text x="175" y="78" text-anchor="middle" font-size="9" fill="#f5d18f" font-weight="700">발전부</text><text x="262" y="78" text-anchor="middle" font-size="9" fill="#6fe9cd" font-weight="700">재현부(모두 으뜸조)</text><circle cx="175" cy="24" r="3.5" fill="#ff8575"/><text x="175" y="98" text-anchor="middle" font-size="8" fill="#ff8575">정점은 흔히 발전부 후반</text></svg><p><b>해석 · </b>소나타의 핵심은 <b>조성 드라마</b>예요 — 제시부에서 2주제가 다른 조(딸림조)로 떠났다가, 재현부에서 <b>모두 으뜸조로</b> 돌아와 화해합니다. 정점(Höhepunkt)은 보통 <b>발전부 후반~재현 직전</b>에 두어요.</p><div class="cnote"><b>지휘 함의 · </b>"지금 어느 칸(제시/발전/재현)인가"를 늘 파악하세요. 큰 아치 위에서 셈여림·템포를 배분해야 국지 사건이 구조에 종속됩니다.</div>',think:['재현부가 모두 으뜸조로 돌아오는 화해 — 소설·영화와 공유하는 서사의 뼈대는?','형식을 모르는 청중도 재현을 느껴요. 몸은 무엇을 근거로 돌아왔음을 아는 걸까?'],listen:['모차르트 교향곡 40번 1악장 전곡','떠남과 돌아옴을 여행으로 — 재현부에서 집에 온 기분이 드는지.'],read:[
'정점(Höhepunkt): 긴장 최고점, 흔히 2/3 지점 — 모든 완급을 여기로 설계','소나타(제시-발전-재현)·론도(후렴 회귀)·변주·푸가의 표지 읽기','하이퍼미터·악구 주기로 큰 박 흐름 느끼기','"지금 어느 칸?"을 늘 파악'],
q:[mc('곡의 긴장 정점은 흔히 어디쯤?',['시작','1/3','2/3 부근','맨 끝'],2,'황금분할 근처. 너무 이르면 김 빠짐.'),
sa('제시-발전-재현으로 짜인 형식의 이름은?','소나타 형식','고전 교향곡·소나타의 뼈대.'),
mc('후렴이 반복해 돌아오는 형식은?',['변주곡','론도','푸가','소나타'],1,'A-B-A-C-A 식.')],
task:'교향곡 1악장을 들으며 제시-발전-재현 경계를 대략 표시.'},

{d:32,wk:6,ph:'형식·구조',t:'형식 기능 (캐플린)',lead:'형식을 "구획"이 아니라 "무엇을 하는 자리"로 봐요.',concept:'<p>형식을 "구획"이 아니라 <b>무엇을 하는 자리</b>로 보는 관점이에요. 같은 길이라도 기능이 다르면 다르게 연주합니다.</p><table class="ctbl"><tr><th>기능</th><th>특징</th><th>연주</th></tr><tr><td>제시구(presentation)</td><td>기본악상 제시·반복 · 안정</td><td>놓고(제시)</td></tr><tr><td>전개구(continuation)</td><td>분절·화성 가속 · 불안정</td><td>밀고(추진)</td></tr><tr><td>종지구(cadential)</td><td>종지로 닫음</td><td>매듭</td></tr></table><svg class="cdia" viewBox="0 0 320 100"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">형식 기능 — 8마디 문장의 세 자리</text><rect x="12" y="30" width="150" height="32" rx="6" fill="rgba(111,233,205,.2)" stroke="#6fe9cd"/><rect x="166" y="30" width="80" height="32" rx="6" fill="rgba(245,209,143,.2)" stroke="#f5d18f"/><rect x="250" y="30" width="58" height="32" rx="6" fill="rgba(255,133,117,.2)" stroke="#ff8575"/><text x="87" y="50" text-anchor="middle" font-size="9" font-weight="700" fill="#6fe9cd">제시구 (놓고)</text><text x="206" y="50" text-anchor="middle" font-size="9" font-weight="700" fill="#f5d18f">전개구 (밀고)</text><text x="279" y="50" text-anchor="middle" font-size="8.5" font-weight="700" fill="#ff8575">종지구</text><text x="87" y="80" text-anchor="middle" font-size="8.5" fill="#75818b">안정·제시·반복</text><text x="206" y="80" text-anchor="middle" font-size="8.5" fill="#75818b">분절·화성 가속</text><text x="279" y="80" text-anchor="middle" font-size="8.5" fill="#75818b">매듭</text></svg><p><b>해석 · </b>형식 기능을 알면 <b>분석이 곧 연주 지시</b>가 돼요. 제시구는 여유 있게 놓고, 전개구는 밀어붙이고, 종지구는 매듭짓듯. "이 자리는 왜 여기 있나 → 어떻게 연주하나"로 이어집니다.</p><div class="cnote"><b>지휘 함의 · </b>같은 8마디도 제시-전개-종지의 <b>기능에 따라 무게와 추진</b>을 다르게. 전개구에서 조이고 종지구에서 착지하세요.</div>',think:['기능이 연주를 결정한다면, 기능이 모호한 자리는 어떻게 연주할까?','제시–전개–종지의 위계를 하루 일과에 대응시켜 설명해보기.'],listen:['베토벤 「비창」 소나타 2악장','제시하고, 밀고, 매듭짓는 말하기 — 음악이 말을 거는 방식으로 들어보세요.'],read:[
'제시구(presentation): 기본악상 제시·반복 — 안정·시작','전개구(continuation): 분절·화성 가속 — 추진·불안정','종지구(cadential): 종지로 닫음','같은 길이라도 기능이 다르면 다르게 연주 — 제시는 놓고, 전개는 밀고, 종지는 매듭'],
q:[mc('분절·화성 가속으로 밀어붙이는 기능 단위는?',['제시구','전개구','종지구','간주부'],1,'추진·불안정. 밀어붙일 곳.'),
sa('캐플린 형식기능의 세 단위를 쓰시오.','제시구·전개구·종지구','시작·중간·맺음.'),
mc('형식 기능을 알면 좋은 점은?',['조성 파악','분석이 곧 연주 지시로 번역','템포 결정','악기 선택'],1,'"이 자리는 왜 여기 있나→어떻게 연주하나".')],
task:'8마디 문장에서 제시-전개-종지 구간을 나눠보기.'},

{d:33,wk:6,ph:'형식·구조',t:'소나타 이론 (H&D)',lead:'소나타를 고정 틀이 아니라 규범과의 대화로 봐요.',concept:'<p>소나타를 고정 틀이 아니라 <b>규범과의 대화</b>로 보는 현대 이론이에요 (헤포코스키·다시).</p><table class="ctbl"><tr><th>용어</th><th>뜻</th></tr><tr><td>회전(rotation)</td><td>같은 주제 순서를 반복해 도는 구조</td></tr><tr><td>MC(매개 종지)</td><td>제1·2주제군 사이의 갈라짐 틈</td></tr><tr><td>EEC / ESC</td><td>비로소 안정된 종지에 처음 닿는 결정적 도착</td></tr><tr><td>변형(deformation)</td><td>규범을 일부러 어긴 지점 = 의미</td></tr></table><p><b>해석 · </b>이 이론의 힘은 "규범을 <b>어긴 것</b>이 곧 의미"라는 시각이에요. 작곡가가 MC를 미루거나 EEC에 못 닿게 하면, 그 <b>지연·좌절 자체가 드라마</b>입니다. 규범을 알아야 어긴 것이 들려요.</p><div class="cnote"><b>지휘 함의 · </b>MC(주제군 사이 틈)와 EEC(진짜 도착)를 찾아 <b>호흡과 무게</b>를 배치하세요. 변형 지점은 밑줄 긋듯 부각.</div>',think:['규범을 어긴 것이 의미가 된다면, 규범을 모르는 청중에게도 그 의미는 전달될까?','EEC(진짜 도착)가 끝내 오지 않는 소나타가 있다면 그 곡은 무엇을 말하는 걸까?'],listen:['베토벤 「에그몬트」 서곡','도착이 미뤄질 때의 조바심, 끝내 왔을 때의 해방 — 기다림 자체를 즐기세요.'],read:[
'회전(rotation): 같은 주제 순서를 반복해 도는 구조','MC(매개 종지): 제1·2주제군 사이의 갈라짐 틈','EEC/ESC: 비로소 안정된 종지에 처음 닿는 결정적 도착','변형(deformation): 규범을 일부러 어긴 지점 = 의미'],
q:[mc('제1주제군과 제2주제군 사이의 "틈"은?',['EEC','MC(매개 종지)','회전','변형'],1,'호흡·무게의 분기점.'),
sa('규범을 일부러 어겨 밑줄 긋는 지점을 뭐라 하나?','변형(deformation)','어긴 것이 곧 의미.'),
mc('EEC/ESC가 뜻하는 것은?',['주제 제시','악장의 진짜 도착점','템포 변화','조표'],1,'구조의 진짜 도착.')],
task:'소나타 악장에서 MC(주제군 사이 틈)를 하나 찾아 표시.'},

{d:34,wk:6,ph:'형식·구조',t:'쉥커 분석 I',lead:'표면 음표 아래 숨은 몇 개의 뼈대를 봐요. "숲을 보는" 분석.',concept:'<p>표면의 수많은 음 아래 숨은 <b>몇 개의 뼈대</b>를 보는 분석이에요. "숲을 보는" 눈입니다.</p><table class="ctbl"><tr><th>개념</th><th>뜻</th></tr><tr><td>Ursatz(기본구조)</td><td>Urlinie + Bassbrechung</td></tr><tr><td>Urlinie(기본선율)</td><td>위 성부 3&#x0302;-2&#x0302;-1&#x0302; 하행</td></tr><tr><td>Bassbrechung</td><td>베이스 아르페지오 I-V-I</td></tr><tr><td>연장(prolongation)</td><td>한 화음·음을 여러 마디에 걸쳐 늘임</td></tr><tr><td>층(level)</td><td>전경(표면) → 중경 → 배경(Ursatz)</td></tr></table><svg class="cdia" viewBox="0 0 300 156"><text x="150" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">Ursatz(기본구조) — 표면 아래의 골격</text><line x1="60" y1="34" x2="60" y2="126" stroke="rgba(255,255,255,.12)" stroke-dasharray="3 3"/><line x1="150" y1="46" x2="150" y2="126" stroke="rgba(255,255,255,.12)" stroke-dasharray="3 3"/><line x1="240" y1="58" x2="240" y2="126" stroke="rgba(255,255,255,.12)" stroke-dasharray="3 3"/><path d="M54,28 Q150,10 244,52" fill="none" stroke="#6fe9cd" stroke-width="1.4"/><ellipse cx="60" cy="40" rx="7" ry="5" fill="none" stroke="#6fe9cd" stroke-width="2" transform="rotate(-20 60 40)"/><ellipse cx="150" cy="52" rx="7" ry="5" fill="none" stroke="#6fe9cd" stroke-width="2" transform="rotate(-20 150 52)"/><ellipse cx="240" cy="64" rx="7" ry="5" fill="none" stroke="#6fe9cd" stroke-width="2" transform="rotate(-20 240 64)"/><text x="60" y="24" text-anchor="middle" font-size="14" fill="#6fe9cd">3&#x0302;</text><text x="150" y="36" text-anchor="middle" font-size="14" fill="#6fe9cd">2&#x0302;</text><text x="240" y="48" text-anchor="middle" font-size="14" fill="#6fe9cd">1&#x0302;</text><ellipse cx="60" cy="106" rx="7" ry="5" fill="none" stroke="#ff8575" stroke-width="2" transform="rotate(-20 60 106)"/><ellipse cx="150" cy="106" rx="7" ry="5" fill="none" stroke="#ff8575" stroke-width="2" transform="rotate(-20 150 106)"/><ellipse cx="240" cy="106" rx="7" ry="5" fill="none" stroke="#ff8575" stroke-width="2" transform="rotate(-20 240 106)"/><path d="M54,118 Q150,138 244,118" fill="none" stroke="#ff8575" stroke-width="1.4"/><text x="60" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#dbe4e8">I</text><text x="150" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#dbe4e8">V</text><text x="240" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#dbe4e8">I</text><text x="296" y="42" text-anchor="end" font-size="8.5" fill="#75818b">기본선율</text><text x="296" y="112" text-anchor="end" font-size="8.5" fill="#75818b">베이스</text></svg><p><b>해석 · </b>쉥커의 통찰은 조성곡이 결국 <b>3&#x0302;-2&#x0302;-1&#x0302; 하행 + I-V-I</b>라는 하나의 큰 문장으로 환원된다는 것. 표면의 화려함은 이 골격을 <b>연장</b>한 장식이에요. 큰 음이 꼭 구조적인 건 아닙니다.</p><div class="cex"><div class="cex-t">🎧 예시 — Ursatz — 3̂-2̂-1̂ / I-V-I</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[48,64],[43,62],[48,60]],1.1)">골격 재생</button></div><div class="cex-d">위 성부 미-레-도(3̂-2̂-1̂ 하행) + 베이스 도-솔-도(I-V-I). 곡 전체가 이 하나의 큰 문장으로 환원돼요.</div></div><div class="cnote"><b>지휘 함의 · </b>구조음과 장식음을 구별하면 <b>프레이징 스케일이 커져요</b>. 국지마다 무게 주면 부서지니, 큰 아치(Ursatz)에 국지를 종속시키세요.</div>',think:['쉥커의 환원이 놓치는 것은 무엇일까 — 골격만 보면 잃게 되는 표면의 가치를 변호해보기.','모든 조성곡이 미–레–도 하행으로 환원된다면, 곡들의 개성은 어디에 사는 걸까?'],listen:['바흐 평균율 1권 프렐류드 C장조','표면의 물결 아래 흐르는 큰 강. 오늘은 강만 느끼세요.'],read:[
'기본구조 Ursatz = 기본선율 Urlinie(3-2-1 하행) + 베이스 아르페지오 Bassbrechung(I-V-I)','연장: 한 화음·음을 여러 마디에 걸쳐 늘임','층: 전경(표면)→중경(악구)→배경(곡 전체 Ursatz)','구조음 vs 장식음 — 큰 음이 꼭 구조적인 건 아님'],
q:[mc('쉥커의 기본선율(Urlinie)의 전형은?',['1-2-3 상행','3-2-1 하행','5-1 도약','반음계'],1,'위 성부가 으뜸음까지 단계적 하행.'),
sa('쉥커에서 베이스의 가장 큰 단위 I-V-I를 뭐라 하나?','베이스 아르페지오 (Bassbrechung)','출발·긴장·귀환.'),
mc('쉥커 분석이 지휘에 주는 것은?',['템포','큰 아치 위에서 국지 사건을 종속','조성','악기'],1,'국지마다 무게 주면 부서짐.')],
task:'앱 이론탭의 쉥커 그래프(3̂-2̂-1̂ / I-V-I)를 보고 구조를 손으로 그려보기.'},

{d:35,wk:6,ph:'형식·구조',t:'쉥커 분석 II — 환원',lead:'악구를 직접 환원해봐요.',concept:'<p>악구를 직접 <b>환원</b>해보는 실습이에요. 표면을 걷어내고 골격을 드러냅니다.</p><table class="ctbl"><tr><th>단계</th><th>할 일</th></tr><tr><td>1단계</td><td>경과·보조·계류음을 걷어낸다 → 남는 화음 톤이 골격</td></tr><tr><td>2단계</td><td>베이스가 I를 떠나 V에 닿고 다시 I로 오는지 찾기</td></tr><tr><td>3단계</td><td>위 성부가 어느 음에서 1&#x0302;로 내려앉는지 보기</td></tr><tr><td>4단계</td><td>골격의 아치만 먼저 지휘해본다</td></tr></table><p><b>해석 · </b>환원의 목적은 <b>구조적 청취</b>예요 — 8마디를 4개 골격 화음으로 줄여 보면, 어디가 진짜 도착이고 어디가 지나가는 장식인지 들립니다. 이것이 큰 프레이징의 근거가 돼요.</p><div class="cnote"><b>지휘 함의 · </b>먼저 <b>골격 아치</b>만 지휘해 큰 흐름을 몸에 익힌 뒤, 표면 장식을 얹으세요. 그러면 국지에 휘둘리지 않아요.</div>',think:['어디까지 줄여도 그 곡다움이 남을까? 최소한의 곡이란 무엇일까?','골격만 먼저 지휘하는 연습이 실제 리허설 설계에 주는 힌트는?'],listen:['같은 프렐류드 한 번 더','이번엔 시작·가운데·끝, 세 기둥만 듣기 — 나머지는 바람에 맡기고.'],read:[
'1단계: 경과음·보조음·계류음을 걷어낸다 → 남는 화음 톤이 골격','2단계: 베이스가 I를 떠나 V에 닿고 다시 I로 오는지 찾기','3단계: 위 성부가 어느 음에서 1̂로 내려앉는지 보기','4단계: 골격의 아치만 먼저 지휘해보기'],
q:[mc('환원의 첫 단계는?',['조표 확인','비화성음 걷어내기','악기 확인','템포 정하기'],1,'남는 화음 톤이 골격.'),
sa('환원 후 베이스에서 찾아야 할 핵심 진행은?','I-V-I','떠남·긴장·귀환.'),
mc('구조적 청취의 목적은?',['모든 음에 무게','작은 것을 큰 아치에 종속','빠른 템포','큰 음량'],1,'프레이징 스케일이 커짐.')],
task:'8마디 악구에서 비화성음을 지우고 골격 화음 4개로 환원해보기.'},

{d:36,wk:6,ph:'형식·구조',t:'복습 — 형식·구조',lead:'문제로 다지기.',concept:'<p><b>6주차 정리.</b> 형식(무엇을 하는 자리)과 구조(표면 아래 골격) — 곡을 <b>큰 지도</b>로 읽는 도구들이에요.</p><table class="ctbl"><tr><th>개념</th><th>핵심</th></tr><tr><td>형식 기초</td><td>소나타·론도·변주 — 큰 틀과 정점</td></tr><tr><td>형식 기능(캐플린)</td><td>제시·전개·종지 = 연주 지시</td></tr><tr><td>소나타 이론(H&D)</td><td>규범과의 대화 · 변형이 의미</td></tr><tr><td>쉥커</td><td>Ursatz(3&#x0302;-2&#x0302;-1&#x0302; + I-V-I)로 환원</td></tr></table><div class="cnote"><b>복습법 · </b>한 악장을 골라 형식을 <b>기능(제시/전개/종지)</b>으로 한 줄 요약하고, 8마디를 골격 4화음으로 환원해보세요.</div>',think:['캐플린과 쉥커는 어떻게 보완할까 — 하나만 써야 한다면 무엇을 고를까, 왜?','다음에 지휘할 곡 한 악장을 형식 한 줄 + 골격 네 화음으로 요약해보기.'],listen:['브람스 교향곡 4번 4악장','하나의 베이스 위 서른 번의 변주 — 구조가 그대로 감동이 되는 순간.'],read:['형식·기능·소나타이론·쉥커 점검','핵심: 지도(어디)가 아니라 기능(무엇을 하나)으로 읽기'],
q:[mc('캐플린에서 종지로 닫는 기능은?',['제시구','전개구','종지구','회전'],2,'cadential.'),
sa('쉥커 층 3가지를 표면→전체 순으로.','전경-중경-배경','Vordergrund-Mittelgrund-Hintergrund.'),
mc('소나타 이론에서 "진짜 도착"을 뜻하는 것은?',['MC','EEC/ESC','회전','변형'],1,'제시·재현부의 결정적 종지.'),
sa('긴장 최고점(정점)을 독일어로?','Höhepunkt','흔히 2/3 지점.')],
task:'한 악장의 형식을 기능(제시/전개/종지)으로 한 줄 요약.'},
// ── 7주: 의미·해석 ──
{d:37,wk:7,ph:'의미·해석',t:'음형론 I',lead:'특정 음형이 특정 정서를 상징하던 바로크의 음악 수사학.',concept:'<p>특정 <b>음형</b>이 특정 정서·형상을 상징하던 바로크의 <b>음악 수사학</b>이에요. 상승=천상, 반음하행=비탄처럼, 음형을 읽으면 무게·색이 한 번에 정해져요.</p><table class="ctbl"><tr><th>음형</th><th>형상</th><th>상징</th></tr><tr><td>anabasis</td><td>위로 상승</td><td>부활 · 천상</td></tr><tr><td>catabasis</td><td>아래로 하강</td><td>매장 · 겸손</td></tr><tr><td>passus duriusculus</td><td>반음계 하행 베이스</td><td>비탄 · 죽음</td></tr><tr><td>saltus duriusculus</td><td>불협 도약</td><td>충격</td></tr><tr><td>circulatio</td><td>원 그리며 돎</td><td>휘감김</td></tr></table><svg class="cdia" viewBox="0 0 320 118"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">음형 = 형상으로 정서를 그림</text><path d="M14,80 L44,66 L74,50 L100,34" fill="none" stroke="#6fe9cd" stroke-width="2.4" marker-end="url(#af)"/><defs><marker id="af" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6fe9cd"/></marker><marker id="af2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#a2b3de"/></marker></defs><text x="57" y="98" text-anchor="middle" font-size="9" fill="#6fe9cd">상승 = 천상·부활</text><path d="M120,34 L146,50 L172,66 L200,80" fill="none" stroke="#a2b3de" stroke-width="2.4" marker-end="url(#af2)"/><text x="160" y="98" text-anchor="middle" font-size="9" fill="#a2b3de">하강 = 겸손·매장</text><line x1="224" y1="42" x2="236" y2="42" stroke="#ff8575" stroke-width="2.4"/><line x1="239" y1="49" x2="251" y2="49" stroke="#ff8575" stroke-width="2.4"/><line x1="254" y1="56" x2="266" y2="56" stroke="#ff8575" stroke-width="2.4"/><line x1="269" y1="63" x2="281" y2="63" stroke="#ff8575" stroke-width="2.4"/><line x1="284" y1="70" x2="296" y2="70" stroke="#ff8575" stroke-width="2.4"/><text x="270" y="98" text-anchor="middle" font-size="9" fill="#ff8575">반음 하행 = 비탄</text></svg><p><b>해석 · </b>바로크에서 음형은 <b>수사적 약속</b>이었어요. <b>반음계 하행 베이스</b>(라멘토 베이스)는 디도의 탄식처럼 죽음·비탄을 그리고, 상승 음형은 천상을 향합니다. 음형을 읽으면 "왜 그렇게 연주해야 하는가"의 역사적 근거가 생겨요.</p><div class="cex"><div class="cex-t">🎧 예시 — 라멘토 베이스 (반음계 하행)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playMel([60,59,58,57],0.75)">하행 재생</button></div><div class="cex-d">반음계 하행(도-시-시♭-라) = 비탄·죽음의 상징(passus duriusculus). 디도의 탄식이 이 음형이에요.</div></div><div class="cnote"><b>지휘 함의 · </b>음형의 정서를 곧 <b>주법·무게</b>로 번역하세요. 상승 음형엔 무게를 위로 실어 열어 주고, 반음 하행엔 한숨처럼 떨구듯.</div>',think:['라멘토 베이스가 여러 문화·시대에서 슬픔이 된 이유 — 학습일까 신체(한숨·낙하)일까?','상승=희망 같은 도식을 일부러 뒤집은 곡이 있다면 어떤 효과가 날까?'],listen:['퍼셀 「디도의 탄식」','라멘토 베이스 위의 눈물. 반음 하행을 몸의 낙하로 느껴보세요.'],read:[
'anabasis(상승)=부활·천상 / catabasis(하강)=매장·겸손','passus duriusculus: 반음계 하행 베이스=비탄·죽음','saltus duriusculus: 불협 도약=충격','circulatio: 원 그리며 돎=휘감김'],
q:[mc('반음계 하행 베이스가 상징하는 정서는?',['기쁨','비탄·죽음','승리','평온'],1,'passus duriusculus. 디도의 탄식.'),
sa('음형이 위로 오르며 부활·천상을 상징하는 것은?','anabasis','연주: 무게를 위로 실어.'),
mc('음형론이 지휘에 주는 것은?',['템포','정서를 곧 주법·무게로 번역','조성','악기'],1,'"왜 그렇게"의 역사적 근거.')],
task:'바흐 수난곡에서 반음계 하행(비탄)을 하나 찾아보기.'},

{d:38,wk:7,ph:'의미·해석',t:'음형론 II',lead:'말하기 음형과 큰 수사구조.',concept:'<p>말하기(수사) 음형과 큰 수사구조예요.</p><table class="ctbl"><tr><th>음형</th><th>형상</th><th>정서</th></tr><tr><td>suspiratio / pianto</td><td>2도 하행(흔히 반음)</td><td>한숨 · 눈물</td></tr><tr><td>aposiopesis</td><td>갑작 총휴지</td><td>말 삼킴 · 전환</td></tr><tr><td>exclamatio</td><td>6도↑ 솟구침</td><td>외침</td></tr><tr><td>interrogatio</td><td>끝을 올려</td><td>질문</td></tr></table><p><b>해석 · </b>개별 음형을 넘어, 곡 전체를 <b>연설처럼</b> 읽을 수도 있어요 — 도입(exordium) → 진술 → 논증 → 결론(peroratio). 형식을 "설득의 흐름"으로 보면 어디서 힘을 주고 어디서 풀지가 논리로 잡힙니다.</p><div class="cex"><div class="cex-t">🎧 예시 — 한숨 음형 (pianto)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playMel([69,67,65,64],0.55)">한숨 재생</button></div><div class="cex-d">2도 하행(흔히 반음)의 한숨·눈물. 기대듯 얹었다 떨구는 릴리스로 연주해요.</div></div><div class="cnote"><b>지휘 함의 · </b>한숨(pianto)은 <b>기대듯 얹었다 떨구는</b> 릴리스로, 총휴지(aposiopesis)는 그 침묵의 장력을 온몸으로 붙드세요.</div>',think:['총휴지의 장력은 소리의 부재에서 와요. 침묵이 말이 되는 조건은 무엇일까?','도입–논증–결론이 없는 음악(앰비언트)은 수사학으로 보면 무엇에 가까울까?'],listen:['하이든 교향곡 94번 「놀람」 2악장','침묵과 놀람의 장난 — 유머도 음형이에요. 웃어도 됩니다.'],read:[
'suspiratio/pianto: 2도 하행·한숨=탄식·눈물','aposiopesis: 갑작 총휴지=말 삼킴·전환','exclamatio: 6도↑ 솟구침=외침 / interrogatio: 끝 올려=질문','큰 수사구조: 도입(exordium)-진술-논증-결론(peroratio)'],
q:[mc('갑작스런 총휴지로 "말 삼킴·충격"을 주는 음형은?',['pianto','aposiopesis','exclamatio','tirata'],1,'침묵의 장력.'),
sa('2도 하행(흔히 반음)으로 한숨·눈물을 그리는 음형은?','pianto(suspiratio)','기대듯 떨구는 릴리스.'),
mc('연설처럼 곡을 도입-진술-논증-결론으로 읽는 시선은?',['집합론','큰 수사구조','톤네츠','아이소리듬'],1,'형식을 설득의 흐름으로.')],
task:'느린 악장에서 "한숨(pianto)" 제스처를 찾아 연주 함의(릴리스)를 메모.'},

{d:39,wk:7,ph:'의미·해석',t:'토포스 (표상)',lead:'사냥·전원·행진·탄식 같은 관습적 장면의 단서를 읽어요.',concept:'<p>음악의 <b>표상</b> — 사냥·전원·행진·탄식 같은 관습적 장면을 가리키는 단서(리듬·음색·조)예요. 토포스가 바뀌는 순간이 드라마의 전환점입니다.</p><table class="ctbl"><tr><th>토포스</th><th>단서</th><th>환기</th></tr><tr><td>사냥</td><td>6/8 · 뿔피리 5도 · 팡파르</td><td>야외 · 귀족 · 활력</td></tr><tr><td>전원</td><td>드론 · 6/8 · 느린 화성</td><td>목가 · 평온</td></tr><tr><td>행진</td><td>2박 · 점음표</td><td>군대 · 위엄</td></tr><tr><td>탄식</td><td>반음 하행 · 느림</td><td>애도</td></tr><tr><td>교회(stile antico)</td><td>대위 · 긴 음가</td><td>엄숙 · 권위</td></tr></table><p><b>해석 · </b>토포스를 알아보면 <b>같은 8분음표도</b> 사냥이면 튀고 교회면 잇는 식으로 주법이 한 번에 정해져요. 전원에서 질풍노도(단조·트레몰로)로 <b>토포스가 전환</b>되는 순간이 곧 곡의 분기점입니다.</p><div class="cnote"><b>지휘 함의 · </b>토포스가 바뀌면 <b>음색·무게·주법을 통째로</b> 바꿔 그 장면을 전하세요. 전원의 여유 ↔ 행진의 각.</div>',think:['토포스는 문화적 기억이에요. 그 기억이 없는 청중에게 전원 토포스는 무엇으로 들릴까?','오늘날 새로 생겨난 토포스(영화·게임 음악 등)를 하나 찾아 이름 붙여보기.'],listen:['베토벤 교향곡 6번 「전원」 1악장','음악이 그리는 풍경 속을 걷기 — 시냇물·새·바람이 어디 있는지.'],read:[
'사냥: 6/8·뿔피리 5도·팡파르 / 전원: 드론·6/8·느린 화성','행진: 2박·점음표 / 춤: 3박 정형','교회(stile antico): 대위·긴 음가=엄숙 / 질풍노도: 단조·트레몰로·도약','토포스 전환(전원→질풍노도)=드라마 분기점'],
q:[mc('드론+6/8 흔들림+느린 화성이 환기하는 토포스는?',['행진','전원','사냥','교회'],1,'목가·평온·자연.'),
sa('대위·푸가토·긴 음가로 엄숙·권위를 주는 토포스는?','교회 양식(stile antico)','과거를 환기.'),
mc('토포스를 알아보면 무엇이 한 번에 정해지나?',['조성','주법·음색·무게','템포만','악기 수'],1,'같은 8분음표도 사냥이면 튀고 교회면 잇는다.')],
task:'한 악장에서 토포스 전환(예: 전원→질풍노도)을 하나 찾기.'},

{d:40,wk:7,ph:'의미·해석',t:'음악심리 — 기대',lead:'왜 그렇게 들리는가. 기대의 생성·지연·위반·충족이 정서를 만들어요.',concept:'<p>왜 그렇게 들리는가. <b>기대의 생성·지연·위반·충족</b>이 정서를 만든다는 관점이에요 — 정점을 언제 두고 해결을 얼마나 미룰지의 근거입니다.</p><table class="ctbl"><tr><th>학자/이론</th><th>핵심</th></tr><tr><td>마이어(1956)</td><td>정서 = 기대의 생성·지연·위반·충족</td></tr><tr><td>나무어 I-R</td><td>음형이 다음을 암시(함의) → 충족/비틀기</td></tr><tr><td>후런 ITPRA</td><td>상상-긴장-예측-반응-평가 (지연된 해결이 쾌감↑)</td></tr></table><svg class="cdia" viewBox="0 0 320 118"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">기대 곡선 — 지연될수록 짜릿한 해결</text><line x1="18" y1="96" x2="305" y2="96" stroke="#75818b" stroke-width="1"/><path d="M20,92 C70,88 100,50 140,42 L200,42 C240,42 270,70 300,90" fill="none" stroke="#6fe9cd" stroke-width="2.4"/><line x1="140" y1="42" x2="200" y2="42" stroke="#f5d18f" stroke-width="3"/><circle cx="200" cy="42" r="4" fill="#ff8575"/><text x="75" y="112" text-anchor="middle" font-size="9" fill="#6fe9cd">긴장 상승</text><text x="170" y="34" text-anchor="middle" font-size="9" fill="#f5d18f" font-weight="700">지연(버티기)</text><text x="270" y="112" text-anchor="middle" font-size="9" fill="#ff8575" font-weight="700">해결 ↓</text></svg><p><b>해석 · </b>너무 뻔하면 지루하고 너무 어긋나면 혼란스러워요. 좋은 음악은 <b>기대를 만들고, 살짝 미루고, 결국 채워</b> 짜릿함을 줍니다. 후런의 ITPRA는 <b>지연된 해결</b>이 왜 더 강한 쾌감을 주는지 설명해요.</p><div class="cex"><div class="cex-t">🎧 예시 — 기대 — 충족 vs 위반</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[67,71,74],[60,64,67]],1.0)">충족 V→I</button><button class="cex-b" onclick="ac();playSeq([[67,71,74],[69,72,76]],1.0)">위반 V→vi</button></div><div class="cex-d">V 다음 I(충족)를 기대하는데 vi로 빠지면(위반) 놀람·지연이 생겨요. 이 위반이 정서를 만듭니다.</div></div><div class="cnote"><b>지휘 함의 · </b>해결을 <b>얼마나 미룰지</b>가 표현의 핵심. 도미넌트에서 조이며 기대를 쌓고, 도착을 살짝 지연했다 풀어 카타르시스를 만드세요.</div>',think:['지연된 해결이 더 달콤한 이유 — 일상에서 같은 구조(기다림–충족)를 찾아 비교해보기.','기대가 전혀 형성되지 않는 음악은 왜 정서를 만들기 어려울까? 명상 음악은 기대를 어떻게 다룰까?'],listen:['라흐마니노프 피아노 협주곡 2번 1악장 도입','종이 울리듯 쌓이는 기대와 그 해소 — 기다림이 달콤해지는 순간.'],read:[
'마이어(1956): 정서 = 기대의 생성·지연·위반·충족','나무어 I-R: 음형이 다음을 암시, 충족/비틈','후런 ITPRA: 상상-긴장-예측-반응-평가 — 지연된 해결이 쾌감↑','정점은 후반 2/3 부근에 와야 자연스러움'],
q:[mc('음악의 정서가 나온다고 마이어가 본 원천은?',['음량','기대의 생성·지연·위반·충족','조성','악기'],1,'너무 뻔하면 지루, 너무 어긋나면 혼란.'),
sa('지연된 해결이 왜 더 짜릿한지 다섯 단계로 설명한 이론(ITPRA)의 학자는?','후런(Huron)','Sweet Anticipation(2006).'),
mc('정점(긴장 최고점)이 오기 좋은 위치는?',['맨 앞','정중앙','후반 2/3 부근','맨 끝'],2,'너무 이르면 김 빠짐.')],
task:'좋아하는 곡에서 "해결을 미뤄 짜릿한" 지점을 하나 찾아 왜 그런지 메모.'},

{d:41,wk:7,ph:'의미·해석',t:'게슈탈트·기억·시간',lead:'우리가 어떻게 악구로 묶어 듣고 기억하는가.',concept:'<p>우리가 어떻게 <b>악구로 묶어 듣고 기억하는가</b>예요.</p><table class="ctbl"><tr><th>개념</th><th>내용</th></tr><tr><td>게슈탈트 묶기</td><td>근접·유사·연속으로 악구 자동 분절 (GTTM)</td></tr><tr><td>기억 층</td><td>메아리 → 작업 → 장기 (재현부가 의미 있는 이유)</td></tr><tr><td>크로노스 vs 카이로스</td><td>시계 시간 vs 질적·주관적 순간</td></tr><tr><td>시간 지각</td><td>rit이 시간을 늘려 느끼게 함 (사건 밀도↓)</td></tr></table><p><b>해석 · </b>우리는 마디를 자동으로 악구로 <b>묶어</b> 듣고, 재현부에서 앞의 것을 <b>기억</b>해 의미를 느껴요. 페르마타·정점에서 늘어나는 <b>카이로스</b>(질적 시간)는 rit이 사건 밀도를 낮춰 "한 순간에 오래 머물게" 하기 때문입니다.</p><div class="cnote"><b>지휘 함의 · </b>rit(늦춤)은 <b>시간을 늘려</b> 그 순간에 머물게 하는 도구예요. 페르마타에서 시간이 늘어나는 체감을 몸으로 붙드세요.</div>',think:['페르마타의 카이로스 체험 — 명상의 지금 이 순간과 같은 것일까, 다른 것일까?','재현부가 의미를 갖는 건 기억 덕분이에요. 기억이 짧은 청중을 위한 작곡 전략은 무엇일까?'],listen:['아르보 패르트 「Für Alina」','시간이 멈춘 곳에서 듣기 — 카이로스. 명상의 지금과 음악의 지금이 만나는 자리.'],read:[
'게슈탈트 묶기: 근접·유사·연속으로 악구 자동 분절(GTTM)','기억 층: 메아리·작업·장기 — 재현부가 의미 있는 이유','크로노스(시계 시간) vs 카이로스(질적 순간)','rit이 "더 많은 시간"으로 느껴지는 이유: 사건 밀도↓'],
q:[mc('마디들을 악구로 자동으로 묶는 원리는?',['집합론','게슈탈트(근접·유사·연속)','아이소리듬','톤네츠'],1,'레르달-잭켄도프 GTTM.'),
sa('페르마타·정점에서 늘어나는 주관적·질적 시간을 뭐라 하나?','카이로스','크로노스=시계 시간.'),
mc('rit(늦춤)이 시간을 늘려 느끼게 하는 이유는?',['음량 증가','사건 밀도가 낮아져 주의가 길어짐','조성 변화','악기 증가'],1,'한 순간에 머무는 시간이 길어짐.')],
task:'페르마타가 있는 악구에서 "시간이 늘어나는" 체감을 지휘 동작으로 상상.'},

{d:42,wk:7,ph:'의미·해석',t:'복습 — 의미·해석',lead:'문제로 다지기.',concept:'<p><b>7주차 정리.</b> 음악의 <b>의미</b>를 읽고 그것을 연주로 번역하는 도구들이에요.</p><table class="ctbl"><tr><th>개념</th><th>핵심</th></tr><tr><td>음형론</td><td>음형 = 정서 (상승·하강·반음하행·한숨)</td></tr><tr><td>토포스</td><td>관습적 장면(사냥·전원·행진·탄식)의 단서</td></tr><tr><td>음악심리</td><td>기대의 생성·지연·충족이 정서</td></tr><tr><td>게슈탈트·시간</td><td>악구로 묶어 듣기 · 카이로스</td></tr></table><div class="cnote"><b>복습법 · </b>한 악구에서 <b>음형 1 + 토포스 1</b>을 찾아 "이래서 이렇게 연주한다"를 한 줄로 적어보세요. 표면 너머의 의미가 곧 연주 근거예요.</div>',think:['음형·토포스·기대·시간 중 실제 연주 해석에 가장 힘이 센 도구는? 근거와 함께.','의미를 읽는 분석이 지나치면 무엇이 위험해질까 — 해석과 과잉 해석의 경계는?'],listen:['모리코네 「시네마 천국」 러브 테마','음형·토포스·기대가 3분 안에 다 있는 이유 — 그리고 그걸 다 잊게 만드는 이유.'],read:['음형론·토포스·음악심리 점검','핵심: 표면 너머의 의미를 읽어 주법·무게로 번역'],
q:[mc('exclamatio(외침) 음형의 형상은?',['반음 하행','6도↑ 솟구침','총휴지','원 그리기'],1,'솟는 음에 무게·열기.'),
sa('사냥 토포스의 대표 단서 2가지.','6/8 · 뿔피리 5도(팡파르)','야외·귀족·활력.'),
mc('나무어의 이론(I-R)이 다루는 것은?',['음 집합','한 음형이 다음을 어떻게 암시하는가','톤네츠','판본'],1,'함의-실현.'),
sa('음형론이 "어떻게"라면 무엇의 "왜 그렇게"를 주나?','셈여림·아고긱(표현)의 역사적 근거','13·14장과 짝.')],
task:'한 악구에서 음형 1 + 토포스 1을 찾아 "이래서 이렇게 연주"를 한 줄로.'},

{d:43,wk:8,ph:'확장',t:'해석사·연주 전통',lead:'같은 악보를 시대마다 다르게. "정답은 하나가 아니다".',concept:'<p>같은 악보를 <b>시대마다 다르게</b> 연주해 왔어요. "정답은 하나가 아니다"라는 것, 그리고 내 선택의 근거를 역사에서 찾는 것이 핵심입니다.</p><table class="ctbl"><tr><th>경향</th><th>특징</th></tr><tr><td>주관·유기적</td><td>템포 자유·큰 호흡 (푸르트벵글러 계열)</td></tr><tr><td>즉물·정확</td><td>악보에 충실 (토스카니니 계열)</td></tr><tr><td>HIP 원전연주</td><td>시대악기·빠른 템포·비브라토 절제·작은 편성</td></tr><tr><td>판본</td><td>Urtext vs 연주판 — 판본 선택도 이미 해석</td></tr></table><p><b>해석 · </b>리디아 괴어는 "작품에 충실=객관"이라는 생각조차 <b>1800년경의 관념</b>임을 보였고, 타루스킨은 HIP의 "진정성"이 사실 <b>20세기의 취향</b>이라 지적했어요. 즉 모든 연주는 해석이며, 중요한 건 <b>왜 그렇게 하는지</b>의 근거예요.</p><div class="cnote"><b>지휘 함의 · </b>같은 곡의 <b>역사적 녹음 2~3종</b>을 같은 악구로 비교하세요. 차이를 역추적하면 내 템포·프레이징 선택의 근거가 단단해져요.</div>',think:['모든 연주가 해석이라면 원전연주의 가치는 어디에 있을까 — 진정성이 아니라면 무엇?','내 연주 취향이 어느 전통에 가까운지, 그렇게 된 이유를 추적해보기.'],listen:['베토벤 5번 1악장 — 푸르트벵글러와 카를로스 클라이버 연속 듣기','같은 악보, 다른 세계. 어느 쪽이 내 심장에 가까운가.'],read:[
'양극: 주관·유기적(푸르트벵글러 경향) vs 즉물·정확(토스카니니 경향)','HIP 원전연주: 시대악기·빠른 템포·비브라토 절제·작은 편성','괴어: "작품" 개념은 1800년경 관념 / 타루스킨: HIP 진정성=20세기 취향','판본(Urtext vs 연주판)도 이미 해석'],
q:[mc('원전연주(HIP)가 가져온 변화가 아닌 것은?',['빠른 템포','비브라토 절제','작은 편성','느린 템포·큰 편성'],3,'가볍고 빠르고 또렷하게.'),
sa('"작품에 충실=객관"조차 1800년경 관념임을 보인 철학자는?','리디아 괴어','The Imaginary Museum of Musical Works.'),
mc('해석사 공부의 실전 방법은?',['한 녹음만 반복','역사적 녹음 3종을 같은 악구로 비교','악보만 보기','템포만 재기'],1,'차이를 역추적해 내 선택의 근거로.')],
task:'같은 곡의 서로 다른 녹음 2종을 같은 악구로 비교해 3가지 차이를 적기.'},

{d:44,wk:8,ph:'확장',t:'신리만 변형이론 I',lead:'화음을 "다른 화음으로 가는 동작"으로 봐요. 기능으로 안 풀리는 진행.',concept:'<p>화음을 "무엇이다"가 아니라 <b>다른 화음으로 가는 동작</b>으로 보는 관점이에요. 기능화성으로 안 풀리는 반음계 진행을 설명합니다.</p><table class="ctbl"><tr><th>변형</th><th>이동</th><th>예</th></tr><tr><td>P (Parallel)</td><td>같은 으뜸 장↔단 · 3음만 반음</td><td>C장 ↔ c단</td></tr><tr><td>L (Leading-tone)</td><td>장 밑음 반음↓ → 위 단화음</td><td>C장 → e단</td></tr><tr><td>R (Relative)</td><td>나란한조 · 5음 온음</td><td>C장 ↔ a단</td></tr></table><svg class="cdia" viewBox="0 0 320 138"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">PLR — 한 음만 반음 움직여 옮겨가기(아낌)</text><circle cx="160" cy="70" r="24" fill="rgba(111,233,205,.2)" stroke="#6fe9cd" stroke-width="1.8"/><text x="160" y="75" text-anchor="middle" font-size="13" font-weight="800" fill="#6fe9cd">C장</text><circle cx="60" cy="112" r="21" fill="rgba(162,179,222,.18)" stroke="#a2b3de"/><text x="60" y="117" text-anchor="middle" font-size="11" font-weight="700" fill="#a2b3de">c단</text><circle cx="160" cy="120" r="21" fill="rgba(162,179,222,.18)" stroke="#a2b3de"/><text x="160" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#a2b3de">e단</text><circle cx="260" cy="112" r="21" fill="rgba(162,179,222,.18)" stroke="#a2b3de"/><text x="260" y="117" text-anchor="middle" font-size="11" font-weight="700" fill="#a2b3de">a단</text><line x1="145" y1="88" x2="75" y2="98" stroke="#75818b" stroke-width="1.5"/><line x1="160" y1="94" x2="160" y2="100" stroke="#75818b" stroke-width="1.5"/><line x1="175" y1="88" x2="245" y2="98" stroke="#75818b" stroke-width="1.5"/><text x="98" y="92" font-size="10" font-weight="700" fill="#6fe9cd">P</text><text x="167" y="99" font-size="10" font-weight="700" fill="#6fe9cd">L</text><text x="212" y="92" font-size="10" font-weight="700" fill="#6fe9cd">R</text></svg><p><b>해석 · </b>핵심 원리는 <b>아낌(parsimony)</b> — 공통음을 최대한 붙들고 <b>한 음만 반음</b> 움직여 옮겨가요. 최소의 손놀림으로 색이 확 바뀌는 것이 이 이론의 매력입니다.</p><div class="cex"><div class="cex-t">🎧 예시 — PLR 변형 (from C장조)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[60,64,67],[60,63,67]],1.0)">P (→c단)</button><button class="cex-b" onclick="ac();playSeq([[60,64,67],[64,67,71]],1.0)">L (→e단)</button><button class="cex-b" onclick="ac();playSeq([[60,64,67],[69,72,76]],1.0)">R (→a단)</button></div><div class="cex-d">P는 3음만 반음(C장↔c단), L은 밑음이 반음 내려(C장→e단), R은 나란한조(C장↔a단). 공통음은 붙들고 한 음만 움직여요.</div></div><div class="cnote"><b>지휘 함의 · </b>공통음은 <b>고정점</b>으로 붙들고, 움직이는 한 음을 변화의 주역으로 부각하세요. 색의 전환이 곧 표현이에요.</div>',think:['최소 변화가 최대 색을 내는 아낌의 원리 — 디자인·요리 등 다른 분야에서 예를 찾아보기.','기능(T–S–D)과 변형(PLR)은 경쟁일까 보완일까 — 한 곡 안에서 둘이 교대하는 지점을 상상해보기.'],listen:['슈베르트 「밤과 꿈」','한 음만 미끄러져도 세계가 바뀌는 아득함 — 아낌의 아름다움.'],read:[
'발상: 공통음 최대·한 음만 반음 이동(아낌)','P(Parallel): 같은 으뜸 장↔단(C↔c), 3음만 반음','L(Leading-tone): 장 밑음 반음↓→위 단화음(C장→e단), 어둡고 신비','R(Relative): 나란한조(C장↔a단), 5음 온음'],
q:[mc('C장조와 c단조를 잇는 변형은?',['P','L','R','없음'],0,'같은 으뜸음 장↔단. 3음만 반음.'),
sa('C장조→e단조로 가는 신리만 변형의 이름은?','L (Leading-tone exchange)','장 밑음이 반음 내려감. 어둡고 신비.'),
mc('신리만 이론의 핵심 원리 "아낌(parsimony)"이란?',['모든 음을 바꿈','공통음 최대·한 음만 반음','근음 고정','5도 이동'],1,'최소의 손놀림으로 옮겨감.')],
task:'C장 삼화음에서 P·L·R을 각각 적용해 도착 화음을 손으로 찾기.'},

{d:45,wk:8,ph:'확장',t:'신리만 II — 톤네츠',lead:'음 공간과 육각순환. 바그너·영화음악의 색.',concept:'<p>음을 격자에 배치한 <b>음 공간</b>과, P·L을 번갈아 도는 <b>육각순환</b>이에요. 바그너·영화음악의 3도 색을 설명합니다.</p><table class="ctbl"><tr><th>개념</th><th>내용</th></tr><tr><td>톤네츠</td><td>음을 3·5도 격자에 배치 — PLR은 이웃 이동</td></tr><tr><td>육각순환(PL-cycle)</td><td>P·L 번갈아 → 6삼화음 폐곡선</td></tr><tr><td>적용</td><td>바그너 트리스탄·슈베르트 3도 전조·영화음악</td></tr></table><svg class="cdia" viewBox="0 0 320 158"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">육각순환 — P·L 번갈아 = 6삼화음 폐곡선</text><line x1="160" y1="20" x2="205" y2="46" stroke="#6fe9cd" stroke-width="1.8" opacity=".7"/><text x="183" y="36" text-anchor="middle" font-size="9" font-weight="800" fill="#6fe9cd">P</text><line x1="205" y1="46" x2="205" y2="98" stroke="#f5d18f" stroke-width="1.8" opacity=".7"/><text x="205" y="75" text-anchor="middle" font-size="9" font-weight="800" fill="#f5d18f">L</text><line x1="205" y1="98" x2="160" y2="124" stroke="#6fe9cd" stroke-width="1.8" opacity=".7"/><text x="183" y="114" text-anchor="middle" font-size="9" font-weight="800" fill="#6fe9cd">P</text><line x1="160" y1="124" x2="115" y2="98" stroke="#f5d18f" stroke-width="1.8" opacity=".7"/><text x="137" y="114" text-anchor="middle" font-size="9" font-weight="800" fill="#f5d18f">L</text><line x1="115" y1="98" x2="115" y2="46" stroke="#6fe9cd" stroke-width="1.8" opacity=".7"/><text x="115" y="75" text-anchor="middle" font-size="9" font-weight="800" fill="#6fe9cd">P</text><line x1="115" y1="46" x2="160" y2="20" stroke="#f5d18f" stroke-width="1.8" opacity=".7"/><text x="137" y="36" text-anchor="middle" font-size="9" font-weight="800" fill="#f5d18f">L</text><circle cx="160" cy="20" r="17" fill="rgba(111,233,205,.2)" stroke="#6fe9cd" stroke-width="1.5"/><text x="160" y="23" text-anchor="middle" font-size="9.5" font-weight="700" fill="#6fe9cd">C장</text><circle cx="205" cy="46" r="17" fill="rgba(162,179,222,.2)" stroke="#a2b3de" stroke-width="1.5"/><text x="205" y="49" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a2b3de">c단</text><circle cx="205" cy="98" r="17" fill="rgba(111,233,205,.2)" stroke="#6fe9cd" stroke-width="1.5"/><text x="205" y="101" text-anchor="middle" font-size="9.5" font-weight="700" fill="#6fe9cd">A♭장</text><circle cx="160" cy="124" r="17" fill="rgba(162,179,222,.2)" stroke="#a2b3de" stroke-width="1.5"/><text x="160" y="127" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a2b3de">a♭단</text><circle cx="115" cy="98" r="17" fill="rgba(111,233,205,.2)" stroke="#6fe9cd" stroke-width="1.5"/><text x="115" y="101" text-anchor="middle" font-size="9.5" font-weight="700" fill="#6fe9cd">E장</text><circle cx="115" cy="46" r="17" fill="rgba(162,179,222,.2)" stroke="#a2b3de" stroke-width="1.5"/><text x="115" y="49" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a2b3de">e단</text><text x="160" y="152" text-anchor="middle" font-size="8.5" fill="#75818b">바그너·영화음악의 3도 색</text></svg><p><b>해석 · </b>P와 L을 번갈아 적용하면 <b>여섯 개의 삼화음</b>이 하나의 폐곡선(육각순환)을 이뤄요. 기능화성이 침묵하는 후기 낭만·반음계 음악의 색을 이 공간이 메웁니다.</p><div class="cex"><div class="cex-t">🎧 예시 — 육각순환 (P·L 번갈아)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[60,64,67],[60,63,67],[56,60,63],[56,59,63],[52,56,59],[52,55,59],[60,64,67]],0.7)">6삼화음 순환</button></div><div class="cex-d">C장→c단→A♭장→a♭단→E장→e단→C장. P·L을 번갈아 여섯 삼화음이 폐곡선을 이뤄요.</div></div><div class="cnote"><b>지휘 함의 · </b>중3도 전환(예: C장→E장)은 <b>색의 문이 갑자기 열리는</b> 순간. 음색·발란스를 확 바꿔 그 경이를 전하세요.</div>',think:['육각순환처럼 닫힌 공간을 도는 음악 — 목적지 없는 여행이 주는 정서는 무엇일까?','5도권과 톤네츠 — 두 지도의 세계관 차이는 무엇일까?'],listen:['바그너 「트리스탄」 전주곡 다시','이번엔 기능을 버리고 색의 이동만 따라가기 — 지도 없이 떠도는 여행.'],read:[
'톤네츠: 음을 3·5도 격자에 배치 — PLR은 이웃 이동','육각순환(PL-cycle): P·L 번갈아 → 6삼화음 폐곡선','바그너 트리스탄·슈베르트 3도 전조·영화음악이 PLR로 설명','공통음=고정점, 움직이는 한 음=변화의 주역'],
q:[mc('P와 L을 번갈아 적용하면 생기는 것은?',['5도권','6삼화음 육각순환','12음렬','온음음계'],1,'콘의 "초월적" 3도 관계 구조.'),
sa('신리만에서 붙잡아 두는 소리(고정점) 역할을 하는 것은?','공통음','움직이는 한 음이 변화의 주역.'),
mc('신리만 이론이 특히 유효한 레퍼토리는?',['바로크','후기 낭만·반음계','고전 소나타','중세'],1,'기능화성이 침묵하는 곳을 메움.')],
task:'앱 이론탭 신리만 예시(톤네츠 육각순환)를 보고 P·L 경로를 따라 그려보기.'},

{d:46,wk:8,ph:'확장',t:'20세기 이후 분석',lead:'조성이 해체된 뒤의 도구들. 종지 대신 통일성·질감·음향.',concept:'<p>조성이 해체된 뒤의 도구들이에요. 종지 대신 <b>통일성·질감·음향</b>을 묻습니다.</p><table class="ctbl"><tr><th>도구</th><th>내용</th></tr><tr><td>집합론(포트)</td><td>음 묶음이 분석 단위 · 음정군 벡터로 색을 수치화</td></tr><tr><td>12음·음렬주의</td><td>P·R·I·RI + 12이항 = 48 행렬</td></tr><tr><td>음계</td><td>옥타토닉·온음·메시앙 이조제한선법</td></tr><tr><td>음색·질감</td><td>음향덩어리·미소다성(리게티)·스펙트럴</td></tr></table><p><b>해석 · </b>분석의 질문이 "종지가 어디냐"에서 "<b>무엇이 이 곡을 하나로 묶나</b>(통일성·질감·음향적 정점)"로 바뀌어요. 스펙트럴 음악에선 음색 자체가 화성이 되기도 합니다.</p><div class="cex"><div class="cex-t">🎧 예시 — 온음음계 (whole-tone)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playMel([60,62,64,66,68,70,72],0.34)">온음음계</button></div><div class="cex-d">반음이 없어 방향감이 흐려지는 부유하는 색(드뷔시). 조성의 중력이 사라진 소리예요.</div></div><div class="cnote"><b>지휘 함의 · </b>조성 없는 곡은 <b>질감과 음향의 정점</b>으로 큰 흐름을 잡으세요. 음색덩어리의 밀도·색 변화가 곧 드라마예요.</div>',think:['종지가 사라진 음악에서 끝났다는 느낌은 무엇이 만들까 — 20세기 곡의 마침을 세 유형으로 분류해보기.','음색이 화성이 되는 스펙트럴 발상 — 소리 자체를 듣는 것과 명상적 듣기의 접점은?'],listen:['리게티 「Lux Aeterna」','음향 덩어리 속에 잠기기 — 소리 그 자체를 듣는 일. 명상적 듣기의 극단이에요.'],read:[
'집합론(포트): 음 묶음이 분석 단위, 음정군 벡터로 색 수치화','12음·음렬주의: P·R·I·RI + 12이항 = 48 행렬(총렬주의)','음계: 옥타토닉·온음·메시앙 이조제한선법','음색·질감: 음향덩어리·미소다성(리게티)·스펙트럴(음색이 곧 화성)'],
q:[mc('조성 없는 음악을 "음 묶음(집합)"으로 분석한 학자는?',['쉥커','앨런 포트','캐플린','래트너'],1,'정규형·음정군 벡터.'),
sa('12음렬의 네 변형을 쓰시오.','원형(P)·역행(R)·전위(I)·역행전위(RI)','+12 이항 = 48 형태.'),
mc('20세기 레퍼토리에서 묻는 것으로 바뀐 것은?',['종지가 어디냐','통일성·질감·음향적 정점','조가 무엇이냐','박자표'],1,'분석 단위가 음집합·질감·음색으로.')],
task:'리게티/스펙트럴 곡을 짧게 듣고 "종지 대신 무엇이 통일감을 주나" 메모.'},

{d:47,wk:8,ph:'확장',t:'예술 횡단 + 구조 종합',lead:'여러 예술이 공유하는 구조 원리로 발견을 하나로 묶어요.',concept:'<p>여러 예술이 공유하는 <b>구조 원리</b>로 지금까지의 발견을 하나로 묶어요.</p><table class="ctbl"><tr><th>메타 원리</th><th>음악에서</th></tr><tr><td>중심·위계</td><td>토닉·주선율</td></tr><tr><td>긴장-해소</td><td>불협→협화, 도미넌트→토닉</td></tr><tr><td>반복·변화</td><td>동기 전개·변주</td></tr><tr><td>대칭·가역</td><td>역행·전위·회문</td></tr><tr><td>전경·배경</td><td>주선율·반주 / 쉥커 층</td></tr></table><p><b>해석 · </b>화성의 협화↔불협은 리듬의 격자↔이탈(메트릭 디소넌스)과 같은 원리예요. 분석의 마지막은 <b>모든 발견을 하나의 긴장 곡선</b>으로 통합하는 것 — 국지마다 무게 주면 부서집니다.</p><div class="cnote"><b>지휘 함의 · </b>한 악장의 <b>긴장 곡선</b>을 화성+다이내믹+아고긱+텍스처로 겹쳐 하나의 큰 아치로 그리세요. 그것이 해석의 완성이에요.</div>',think:['긴장–해소·반복–변화·전경–배경이 통하지 않는 예술이 있을까? 반례를 찾아보기.','내 전공 분야의 언어로 이번 주 개념 하나를 번역해보기.'],listen:['스크랴빈 「프로메테우스」 (칸딘스키 그림 한 점과 함께)','색을 들으려 한 음악과 소리를 그리려 한 그림 — 번역의 순간을 목격하세요.'],read:[
'예술 횡단: 콜라주·몽타주·내러티브 아크·라이트모티프·회문·여백(間)','메타 원리: 중심·위계 / 긴장-해소 / 운동·방향 / 반복·변화 / 대칭·가역 / 전경·배경','구조적 운율: 화성 협화↔불협 ≈ 리듬 격자↔이탈(메트릭 디소넌스)','종합 = 1부 "긴장 곡선 통합"'],
q:[mc('분석의 마지막 단계에서 해야 할 일은?',['더 많은 디테일','발견을 원리로 묶어 큰 아치에 종속','템포 재기','악기 세기'],1,'국지마다 무게 주면 부서짐.'),
sa('화성의 불협을 빌려 박의 어긋남을 부르는 말은?','메트릭 디소넌스','구조적 운율의 증거.'),
mc('내러티브 아크(발단-절정-해소)와 짝이 되는 음악 개념은?',['조표','긴장 곡선','박자표','음색'],1,'소나타를 드라마로 읽기.')],
task:'한 악장의 "긴장 곡선"을 화성+다이내믹+아고긱+텍스처로 겹쳐 한 곡선으로.'},

{d:48,wk:8,ph:'모의고사',t:'2개월 모의고사',lead:'표현·형식·의미·확장 종합. 60% 이상 통과.',concept:'<p><b>2개월 종합 점검.</b> 5~8주에 배운 <b>표현·형식·의미·확장</b> 전 범위에서 출제됩니다. 아래 체크리스트로 준비도를 확인하고, 60% 미만이면 약한 주제로 돌아가세요.</p><table class="ctbl"><tr><th>주차</th><th>꼭 알아야 할 것</th></tr><tr><td>5주 표현</td><td>다이내믹 아치 · 아고긱 · 관현악법(악기군·층) · 화성색</td></tr><tr><td>6주 형식</td><td>소나타·론도 · 캐플린 기능 · 소나타이론 · 쉥커 Ursatz</td></tr><tr><td>7주 의미</td><td>음형론 · 토포스 · 기대이론 · 게슈탈트·시간</td></tr><tr><td>8주 확장</td><td>해석사 · 신리만 PLR·톤네츠 · 20세기 · 예술 횡단</td></tr></table><div class="cnote"><b>시험 팁 · </b>틀린 문제는 <b>오답 노트</b>에 자동으로 모여요. 완료 후 홈의 📝 오답 노트에서 약점을 몰아 복습하세요.</div>',think:['같은 곡을 1개월 전과 지금 들을 때 무엇이 다르게 들리나 — 이론이 귀를 바꿨는지 점검하기.','약점 셋을 골라 남은 3주의 개인 커리큘럼을 스스로 설계해보기.'],listen:['자유 감상','2개월 전의 나라면 못 들었을 것을 지금은 듣는가 — 같은 곡으로 확인해보세요.'],read:['5~8주 전체 출제','틀린 건 해당 날로 복습'],
q:[mc('캐플린에서 밀어붙이는 기능은?',['제시구','전개구','종지구','회전'],1,'분절·가속.'),
sa('반음계 하행 베이스가 상징하는 정서와 음형 이름은?','비탄·죽음 / passus duriusculus','라멘토 베이스.'),
mc('신리만 R 변형은 무엇을 잇나?',['C장↔c단','C장↔a단','C장↔e단','C장↔E장'],1,'나란한조. 5음 온음 이동.'),
sa('HIP(원전연주)의 대표 특징 2가지.','빠른 템포 · 비브라토 절제(시대악기·작은 편성)','수사적 프레이징.'),
mc('쉥커의 Ursatz를 이루는 두 요소는?',['주제+응답','Urlinie+Bassbrechung','MC+EEC','P+L'],1,'기본선율 + 베이스 아르페지오.')],
task:'모의고사 오답 정리 + 약한 주제 2개를 복습 목록에.'},
// ── 9주: 지휘 언어 ──
{d:49,wk:9,ph:'지휘 언어',t:'지휘=언어 + 문법 전통',lead:'지휘는 약속된 코드예요. 유창해야 연주자가 알아들어요.',concept:'<p>지휘는 연주자와 <b>공유된 코드(약속)</b>예요. 이 언어가 유창해야 연주자가 망설임 없이 알아들어요.</p><table class="ctbl"><tr><th>요소</th><th>뜻</th></tr><tr><td>예비박</td><td>첫 소리 한 박 전 예고 (들숨+템포·세기)</td></tr><tr><td>익투스(ictus)</td><td>박이 떨어지는 점 = 최저점</td></tr><tr><td>반동(rebound)</td><td>익투스 후 튀어 올라 다음 박 성격 예고</td></tr><tr><td>커트오프</td><td>소리를 끊는 작은 고리</td></tr><tr><td>데드 제스처</td><td>소리 없이 쉬는 동작</td></tr></table><svg class="cdia" viewBox="0 0 320 116"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">한 박의 흐름 — 예비 · 익투스 · 반동</text><line x1="16" y1="92" x2="305" y2="92" stroke="#75818b" stroke-width="1"/><path d="M30,40 C60,55 80,86 105,88 C130,86 150,52 185,42" fill="none" stroke="#6fe9cd" stroke-width="2.4"/><circle cx="105" cy="88" r="4.5" fill="#ff8575"/><circle cx="30" cy="40" r="4" fill="#a2b3de"/><circle cx="185" cy="42" r="4" fill="#f5d18f"/><text x="30" y="30" text-anchor="middle" font-size="9" fill="#a2b3de">예비박</text><text x="105" y="108" text-anchor="middle" font-size="9.5" fill="#ff8575" font-weight="700">익투스(최저점)</text><text x="200" y="34" font-size="9" fill="#f5d18f">반동 → 다음 박</text></svg><p><b>해석 · </b>막스 루돌프는 박자 도형·예비박·커트오프를 <b>문법</b>처럼 체계화했고, 엘리자베스 그린은 "<b>박의 명료함이 아니라 의도의 명료함</b>"을 모토로 삼았어요. 어휘가 몸에 배어야 음악에 집중할 수 있습니다.</p><div class="cnote"><b>지휘 함의 · </b>익투스(최저점)를 또렷이 찍고, 반동 크기로 다음 박을 예고하세요. 이 기초는 <b>참고사전 → 지휘 언어 탭</b>에서 매일 확인할 수 있어요.</div>',think:['지휘가 언어라면 방언·억양도 있을까 — 지휘자마다 다른 몸의 억양을 어디까지 허용해야 할까?','예비박 없는 시작(무예고)이 필요한 음악적 순간이 있을까?'],listen:['카를로스 클라이버 「박쥐」 서곡 영상','몸이 말이 되는 순간 — 소리를 끄고 한 번, 켜고 한 번 보세요.'],read:[
'박자 도형·예비박·큐 = 연주자와 공유된 코드','막스 루돌프 『지휘의 문법』: 박자 도형·예비박·커트오프를 문법처럼','엘리자베스 그린: "박의 명료함이 아니라 의도의 명료함"','공유 어휘: 예비박·익투스(박점)·반동·데드 제스처'],
q:[mc('그린의 지휘 모토는?',['빠른 박','의도의 명료함','큰 동작','정확한 박만'],1,'Clarity of intent, not just clarity of beat.'),
sa('박이 떨어지는 정확한 점을 뭐라 하나?','익투스 (ictus, 박점)','연주자가 여기에 맞춤.'),
mc('『지휘의 문법』을 쓴 사람은?',['그린','막스 루돌프','말코','라반'],1,'박자 도형을 문법처럼 체계화.')],
task:'거울 앞에서 4박 도형을 천천히 그려보고 익투스가 또렷한지 확인.'},

{d:50,wk:9,ph:'지휘 언어',t:'제스처 기호학',lead:'지휘 동작이 뜻을 전하는 세 갈래 — 상징·지표·도상.',concept:'<p>지휘 동작이 뜻을 전하는 <b>세 갈래</b>예요. 좋은 지휘는 이 셋을 겹쳐 씁니다.</p><table class="ctbl"><tr><th>기호</th><th>설명</th><th>예</th></tr><tr><td>상징(symbolic)</td><td>자의적 약속</td><td>4박 도형</td></tr><tr><td>지표(indexical)</td><td>무언가를 가리킴</td><td>큐(시선+손)</td></tr><tr><td>도상(iconic)</td><td>소리의 모양을 닮음</td><td>레가토 곡선·스타카토 점</td></tr></table><p><b>해석 · </b>4박 도형은 모양에 필연성 없는 <b>약속(상징)</b>이고, 큐는 특정 주자를 <b>가리키는(지표)</b> 동작이며, 레가토의 이어진 곡선은 소리 형태를 <b>닮은(도상)</b> 동작이에요. 셋이 겹칠수록 전달이 풍부해집니다.</p><div class="cnote"><b>지휘 함의 · </b>레가토·스타카토·크레셴도를 <b>도상적</b>으로(소리 모양대로) 그리면 말보다 빠르게 전해져요.</div>',think:['도상(소리를 닮은 동작)이 강력한 이유 — 말보다 빠른 소통의 조건은 무엇일까?','같은 큐를 시선으로만·손으로만·둘 다로 줄 때 연주자의 반응은 어떻게 다를까? 직접 실험해보기.'],listen:['번스타인 지휘 영상 (아무 곡이나)','눈썹으로 지휘하는 순간 찾기 — 손이 아닌 곳에서 나오는 음악.'],read:[
'상징(symbolic): 자의적 약속 — 4박 도형','지표(indexical): 가리킴 — 큐(시선+손), 다이내믹 방향','도상(iconic): 음악 모양 그리기 — 레가토 곡선·스타카토 점','좋은 지휘는 셋을 겹쳐 씀'],
q:[mc('4박 도형은 어떤 기호에 해당?',['상징','지표','도상','없음'],0,'모양에 필연성 없는 자의적 약속.'),
sa('특정 주자에게 시선+손을 향하는 큐는 어떤 기호?','지표(indexical)','무언가를 가리킴.'),
mc('레가토의 이어진 곡선처럼 소리 모양을 닮은 동작은?',['상징','지표','도상','반동'],2,'iconic. 동작이 소리 형태를 닮음.')],
task:'레가토·스타카토·크레셴도를 각각 도상적 동작으로 손으로 그려보기.'},

{d:51,wk:9,ph:'지휘 언어',t:'라반 에포트',lead:'음악 의도를 몸의 문법으로 옮기는 틀. 무게·시간·공간·흐름.',concept:'<p>음악 의도를 <b>몸의 문법</b>으로 옮기는 틀이에요. 네 요소의 조합으로 동작의 성격이 정해집니다.</p><table class="ctbl"><tr><th>요소</th><th>양극</th></tr><tr><td>무게</td><td>가벼움 ↔ 강함</td></tr><tr><td>시간</td><td>지속 ↔ 급격</td></tr><tr><td>공간</td><td>간접 ↔ 직접</td></tr><tr><td>흐름</td><td>자유 ↔ 억제</td></tr></table><svg class="cdia" viewBox="0 0 320 138"><text x="160" y="15" text-anchor="middle" font-size="10" fill="#a7b4bc">라반 에포트 — 4요소의 양극</text><text x="10" y="40" font-size="9" fill="#6fe9cd" font-weight="700">무게</text><line x1="66" y1="36" x2="248" y2="36" stroke="#75818b" stroke-width="1.4"/><circle cx="66" cy="36" r="3" fill="#a2b3de"/><circle cx="248" cy="36" r="3" fill="#a2b3de"/><text x="70" y="32" font-size="8.5" fill="#a7b4bc">가벼움</text><text x="244" y="32" text-anchor="end" font-size="8.5" fill="#a7b4bc">강함</text><text x="10" y="66" font-size="9" fill="#6fe9cd" font-weight="700">시간</text><line x1="66" y1="62" x2="248" y2="62" stroke="#75818b" stroke-width="1.4"/><circle cx="66" cy="62" r="3" fill="#a2b3de"/><circle cx="248" cy="62" r="3" fill="#a2b3de"/><text x="70" y="58" font-size="8.5" fill="#a7b4bc">지속</text><text x="244" y="58" text-anchor="end" font-size="8.5" fill="#a7b4bc">급격</text><text x="10" y="92" font-size="9" fill="#6fe9cd" font-weight="700">공간</text><line x1="66" y1="88" x2="248" y2="88" stroke="#75818b" stroke-width="1.4"/><circle cx="66" cy="88" r="3" fill="#a2b3de"/><circle cx="248" cy="88" r="3" fill="#a2b3de"/><text x="70" y="84" font-size="8.5" fill="#a7b4bc">간접</text><text x="244" y="84" text-anchor="end" font-size="8.5" fill="#a7b4bc">직접</text><text x="10" y="118" font-size="9" fill="#6fe9cd" font-weight="700">흐름</text><line x1="66" y1="114" x2="248" y2="114" stroke="#75818b" stroke-width="1.4"/><circle cx="66" cy="114" r="3" fill="#a2b3de"/><circle cx="248" cy="114" r="3" fill="#a2b3de"/><text x="70" y="110" font-size="8.5" fill="#a7b4bc">자유(파시브)</text><text x="244" y="110" text-anchor="end" font-size="8.5" fill="#a7b4bc">억제(악티브)</text><text x="160" y="132" text-anchor="middle" font-size="8.5" fill="#75818b">앞 셋의 조합 = 8 기본 에포트</text></svg><p><b>해석 · </b>무게·시간·공간의 조합이 <b>8 기본 에포트</b>(펀치·글라이드·대브 등)를 만들고, <b>흐름</b>(억제↔자유)이 악티브/파시브를 가릅니다. 점이 또렷하면 악티브(억제), 흐리면 파시브(자유)예요.</p><div class="cnote"><b>지휘 함의 · </b>추상적인 "표현"을 <b>무게·시간·공간·흐름</b>의 좌표로 옮기면 막연함이 사라져요. "이건 가볍고 지속되며 점이 흐린 동작" 식으로.</div>',think:['라반의 네 요소로 내 평소 걸음걸이를 분석해보기 — 내 몸의 기본 에포트는?','같은 포르테도 펀치와 프레스는 달라요. 곡에서 두 포르테를 구별해 쓰는 기준은?'],listen:['발레 「백조의 호수」 2막 한 장면','무게·시간·공간·흐름을 무용수의 몸에서 읽기 — 지휘의 스승은 무용이에요.'],read:[
'4요소: 무게(가벼움↔강함)·시간(지속↔급격)·공간(간접↔직접)·흐름(자유↔억제)','8 기본 에포트: 무게·시간·공간의 조합','흐름(억제↔자유)=악티브/파시브를 가름','점 또렷=악티브(억제), 흐림=파시브(자유)'],
q:[mc('악티브/파시브를 가르는 라반 요소는?',['무게','시간','공간','흐름'],3,'흐름 억제(bound)=악티브, 자유(free)=파시브.'),
sa('라반 에포트의 네 요소를 쓰시오.','무게·시간·공간·흐름','앞 셋의 조합이 8 기본 에포트.'),
mc('강·급격의 조합인 "펀치" 에포트에 해당하는 지휘는?',['레가토','마르카토','테누토','파시브'],1,'바닥서 꽝, 점 크고 또렷.')],
task:'"마르카토=펀치", "레가토=글라이드"를 손으로 각각 재현해보기.'},

{d:52,wk:9,ph:'지휘 언어',t:'에포트 번역표',lead:'의도→느낌→동작→에포트로 옮기면 막연함이 사라져요.',concept:'<p>의도 → 느낌 → 동작 → 에포트로 옮기면 표현이 <b>구체적인 동작</b>이 돼요.</p><table class="ctbl"><tr><th>주법</th><th>느낌</th><th>에포트</th></tr><tr><td>마르카토</td><td>못 박듯, 점 또렷</td><td>펀치(강·급격·직접)</td></tr><tr><td>스타카토</td><td>콕 찍고 멈춤</td><td>대브(가벼움·급격)</td></tr><tr><td>테누토</td><td>눌러 끌기</td><td>프레스(강·지속)</td></tr><tr><td>레가토</td><td>미끄러지듯</td><td>글라이드(가벼움·지속·자유)</td></tr></table><p><b>해석 · </b>순서는 <b>비유 → 점이 또렷한가 → 무게·시간</b>이에요. "이 악구는 레가토(가볍고 지속, 점 흐림)" 하고 에포트 좌표로 적으면 손이 저절로 따라옵니다. <b>예비박</b>도 받을 박의 에포트를 한 박 먼저 담는 거예요.</p><div class="cnote"><b>지휘 함의 · </b>한 악구를 정해 "마르카토=펀치 / 레가토=글라이드"처럼 에포트로 번역해 손으로 재현해보세요.</div>',think:['번역표를 뒤집어 동작에서 소리를 상상하는 연습은 지휘에 어떤 힘을 줄까?','언어로 표현이 안 되는 음악적 의도를 몸이 먼저 아는 경험이 있었다면 떠올려보기.'],listen:['좋아하는 연주 영상 하나','소리를 끄고 지휘자의 동작만으로 음악을 상상 — 그다음 소리를 켜서 대조해보세요.'],read:[
'마르카토: 못 박듯, 점 또렷(악티브)=펀치','스타카토: 콕 찍고 멈춤=대브 / 테누토: 눌러 끌기=프레스','레가토: 미끄러지듯, 점 흐림(파시브)=글라이드','예비박: 받을 박 성격을 한 박 먼저 = 받을 박 에포트를 미리'],
q:[mc('테누토에 해당하는 에포트는?',['펀치','대브','프레스(눌러 끌기)','글라이드'],2,'강·지속. 무거운 문 천천히 밀듯.'),
sa('점을 콕 찍고 즉시 멈추는 스타카토의 에포트는?','대브(dab)','가벼움·급격.'),
mc('의도를 동작으로 옮기는 3단계 순서는?',['동작→느낌→에포트','느낌→동작→에포트','에포트→느낌→동작','동작→에포트→느낌'],1,'비유→점이 또렷한가→무게·시간.')],
task:'한 악구를 "이건 레가토(가볍고 지속, 점 흐림)"식으로 에포트 좌표로 적기.'},

{d:53,wk:9,ph:'지휘 언어',t:'유창성',lead:'도형이 자동화돼야 음악에 머리를 쓸 수 있어요.',concept:'<p>박자 도형이 <b>자동화</b>돼야 음악 표현에 머리를 쓸 수 있어요.</p><table class="ctbl"><tr><th>단계</th><th>내용</th></tr><tr><td>인지</td><td>생각하며 하나씩 (피츠-포스너 1단계)</td></tr><tr><td>연합</td><td>연결되며 부드러워짐</td></tr><tr><td>자동</td><td>생각 안 해도 나옴 — 여기 올라야 함</td></tr></table><p><b>해석 · </b>도형이 <b>자동 단계</b>에 있어야 표현에 인지 자원을 쓸 수 있어요. 외국어 유창성과 같은 메커니즘 — 핵심 어휘가 몸에 배어 무의식적으로 나오는 상태를 <b>체화된 인지</b>라 합니다.</p><div class="cnote"><b>지휘 함의 · </b>4박 도형을 <b>메트로놈에 맞춰 "생각 없이"</b> 나올 때까지 반복하세요. 매일 비팅 연습이 바로 이 자동화 훈련이에요.</div>',think:['자동화와 무의식적 습관의 차이는 무엇일까 — 자동화가 굳으면 표현이 죽을까?','유창해진 뒤에 일부러 서툶을 연출해야 하는 음악적 순간이 있을까?'],listen:['임윤찬 라흐마니노프 협주곡 3번','기술이 사라지고 음악만 남는 순간이란 무엇인가.'],read:[
'운동학습 3단계: 인지→연합→자동(피츠-포스너)','도형이 자동 단계여야 표현에 인지 자원','체화된 인지: 의미가 몸의 움직임에 담김','핵심 어휘가 몸에 배어 무의식적으로 나오는 상태'],
q:[mc('박자 도형이 올라야 하는 운동학습 단계는?',['인지','연합','자동','없음'],2,'생각 안 해도 나오는 단계.'),
sa('동작이 인지→연합→자동으로 가는 모델의 이름은?','피츠-포스너 모델','외국어 유창성과 같은 메커니즘.'),
mc('유창성이란?',['많은 동작을 아는 것','핵심 어휘가 몸에 배어 무의식적으로 나옴','빠른 동작','큰 동작'],1,'그래야 연주자가 망설임 없이 읽음.')],
task:'4박 도형을 메트로놈에 맞춰 "생각 없이" 나올 때까지 반복.'},

{d:54,wk:9,ph:'지휘 언어',t:'실증 + 익히는 법 + 복습',lead:'"명료할수록 잘 맞춘다"는 측정된 사실.',concept:'<p>"명료할수록 잘 맞춘다"는 <b>측정된 사실</b>이에요. 그리고 9주차를 정리합니다.</p><table class="ctbl"><tr><th>실증</th><th>내용</th></tr><tr><td>동기화 지점</td><td>연주자는 수직 최저점·최대 감속에 박을 맞춤 (r≈0.6)</td></tr><tr><td>매끄러움</td><td>저크 낮은 제스처에 더 잘 동기화 (마르카토&gt;레가토)</td></tr><tr><td>예비박</td><td>"한 음절 앞선 발화" — 늦으면 진입이 무너짐</td></tr></table><p><b>해석 · </b>익히는 법의 순서는 <b>어휘 자동화 → 의도를 에포트로 → 명료·매끄럽게 → 한 박 먼저</b>예요. 연주자는 예측으로 맞추기 때문에, 명료하고 매끄러운 예비박이 앙상블의 진입을 좌우합니다.</p><div class="cnote"><b>9주 복습 · </b>지휘=언어(문법·기호) → 라반 에포트(4요소) → 번역표 → 유창성(자동화) → 실증. 추상적 의도를 <b>몸의 문법</b>으로 옮기는 흐름이에요.</div>',think:['연주자가 예측으로 맞춘다면, 지휘의 본질은 지금이 아니라 다음을 보여주는 일일까?','명료함과 표현이 충돌할 때 무엇을 우선할지, 장면별 기준을 세워보기.'],listen:['오자와 세이지 지휘 영상','예비박 하나로 오케스트라 전체가 숨을 쉰다 — 그 한 박을 여러 번 돌려보세요.'],read:[
'연주자는 수직 속도 최대점·최대 감속 지점에 박을 맞춤(r≈0.6)','저크 낮은(매끄러운) 제스처에 더 잘 동기화, 마르카토가 레가토보다 쉬움','익히는 법: 어휘 자동화→의도를 에포트로→명료·매끄럽게→한 박 먼저','예비박 = "한 음절 앞선 발화"'],
q:[mc('연주자가 박을 맞추는 지휘 동작 지점은?',['최고점','최저점·최대 감속','중간','시작'],1,'실증: r≈0.60.'),
sa('예비박이 하는 일을 한마디로.','받을 박의 템포·세기·성격을 한 박 먼저 예고','늦으면 진입이 무너짐.'),
mc('동기화가 더 쉬운 제스처는?',['저크 높은','매끄럽고 예측 가능','불명료한','느린'],1,'명료·매끄러울수록 잘 맞물림.')],
task:'녹음에 맞춰 지휘하며 예비박이 늦지 않는지 영상으로 점검.'},

// ── 10주: 신체별 역할 ──
{d:55,wk:10,ph:'신체별 역할',t:'오른손 — 시간',lead:'오른손은 시계. 박·템포·구획을 명확히. 명료함이 우선.',concept:'<p>오른손은 <b>시계</b>예요. 박·템포·구획을 명확히 하는 게 1순위 — 표현·색은 왼손에 넘기고, 여기선 <b>명료함</b>에 집중해요.</p><table class="ctbl"><tr><th>기능</th><th>내용</th></tr><tr><td>박자 도형</td><td>자동화 (흔들리면 언어가 무너짐)</td></tr><tr><td>익투스</td><td>최저점·최대 감속점 = 소리 나는 순간</td></tr><tr><td>반동</td><td>튀어 올라 다음 박 성격 예고</td></tr><tr><td>예비박</td><td>첫 소리 한 박 전 예고 호흡</td></tr><tr><td>세분·데드 제스처</td><td>느린 곳 잘게 / 소리 없는 쉬는 동작</td></tr></table><svg class="cdia" viewBox="0 0 320 100"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">양손 분업 — 오른손은 시계, 왼손은 화가</text><rect x="12" y="28" width="142" height="52" rx="10" fill="rgba(111,233,205,.14)" stroke="#6fe9cd" stroke-width="1.6"/><text x="83" y="50" text-anchor="middle" font-size="12" font-weight="800" fill="#6fe9cd">오른손 = 시간</text><text x="83" y="68" text-anchor="middle" font-size="8.5" fill="#a7b4bc">박·템포·구획 (명료)</text><rect x="166" y="28" width="142" height="52" rx="10" fill="rgba(162,179,222,.14)" stroke="#a2b3de" stroke-width="1.6"/><text x="237" y="50" text-anchor="middle" font-size="12" font-weight="800" fill="#a2b3de">왼손 = 색</text><text x="237" y="68" text-anchor="middle" font-size="8.5" fill="#a7b4bc">표현·다이내믹·큐</text></svg><p><b>해석 · </b>오른손의 1번 임무는 <b>명료한 시간</b>이에요. 익투스가 매번 또렷하고, 반동으로 다음 박을 예고하며, 예비박이 진입을 이끌어요. 여기에 표현까지 섞으면 시간이 흐려지니, <b>표현은 왼손</b>에 맡깁니다.</p><div class="cnote"><b>지휘 함의 · </b>느린 악구는 <b>세분</b>(2분박)으로 안정시키고, 정확한 익투스로 앙상블의 시간을 지키세요. 매일 트레이너의 익투스 연습이 이 기초예요.</div>',think:['시계가 잠시 멈춰도 되는 순간은 언제일까 — 박을 놓아주는 용기에 대해.','명료한 익투스가 오히려 방해가 되는 음악에서 오른손은 무엇을 해야 할까?'],listen:['아바도의 브람스 교향곡 영상','최소의 동작, 최대의 음악 — 시계가 거의 안 보일 때 무엇이 음악을 끌고 가나.'],read:[
'박자 도형 자동화(흔들리면 언어가 무너짐)','익투스: 최저점·최대 감속점 / 반동: 다음 박 성격 예고','예비박: 첫 소리 한 박 전 예고 호흡 / 커트오프: 작은 고리','세분(느린 템포·rit)·데드 제스처(소리 없는 쉬는 동작)'],
q:[mc('오른손의 1번 임무는?',['표현','명료한 시간(박·템포·구획)','색','큐'],1,'표현은 왼손에 넘김.'),
sa('익투스 직후 튀어 올라 다음 박 성격을 예고하는 것은?','반동(rebound)','크기·속도가 다음 박 정보.'),
mc('느린 템포·리타르단도에서 박을 잘게 쪼개 안정시키는 것은?',['커트오프','세분(subdivide)','데드 제스처','반동'],1,'박을 잘게 쪼갬.')],
task:'느린 악구를 세분(2분박) 넣어 지휘해보기.'},

{d:56,wk:10,ph:'신체별 역할',t:'왼손 — 색',lead:'왼손은 화가. 표현·다이내믹·큐. 핵심은 독립성.',concept:'<p>왼손은 <b>화가</b>예요. 표현·다이내믹·큐를 맡아요. 핵심 난관은 오른손을 따라 하지 않는 <b>독립성</b>입니다.</p><table class="ctbl"><tr><th>역할</th><th>내용</th></tr><tr><td>독립성</td><td>미러링하면 정보 절반 → 다른 메시지 동시에</td></tr><tr><td>다이내믹</td><td>손바닥 높이=음량 은유 (위=크게, 눌러=작게)</td></tr><tr><td>큐</td><td>진입 주자에 미리 손+시선 → 그 박에 줌</td></tr><tr><td>발란스</td><td>층을 끌어올리거나 눌러 음향 무게중심 조정</td></tr><tr><td>함정</td><td>끊임없이 움직여 의미 희석 → 할 말 없으면 중립</td></tr></table><p><b>해석 · </b>왼손의 가장 큰 함정은 "<b>항상 뭔가 해야</b>"라는 강박이에요. 할 말이 없으면 중립 위치에서 쉬는 것이 오히려 강한 메시지. 발란스로 특정 층을 끌어올리거나 눌러 음향의 무게중심을 조정합니다.</p><div class="cnote"><b>지휘 함의 · </b>오른손 4박을 유지하며 왼손으로만 크레셴도 후 정지 — 매일 비팅의 <b>왼손 분리 연습</b>이 이 독립성을 길러요.</div>',think:['왼손의 침묵(중립)이 강한 메시지가 되는 이유 — 말과 침묵의 관계로 설명해보기.','왼손이 절대 따라하지 않는 지휘와 자주 함께 움직이는 지휘 — 각각 어떤 음악에 맞을까?'],listen:['번스타인 말러 2번 피날레 영상','왼손이 하늘을 여는 순간 — 그 손은 박이 아니라 무엇을 젓고 있나.'],read:[
'독립성: 미러링하면 정보 절반 → 다른 메시지 동시에','다이내믹: 손바닥 높이=음량 은유(위=크게, 눌러=작게)','큐: 진입 주자에 미리 손+시선→그 박에 줌','발란스: 층을 끌어올리거나 눌러 무게중심 조정','함정: "항상 뭔가 해야" 강박 → 할 말 없으면 쉼(중립)'],
q:[mc('왼손의 가장 큰 난관은?',['빠르기','독립성(미러링 탈피)','음량','방향'],1,'오른손을 따라 하면 정보 절반.'),
sa('왼손이 특정 층을 끌어올리거나 눌러 음향 무게중심을 조정하는 것은?','발란스','제1편 관현악 층과 직결.'),
mc('왼손의 흔한 함정은?',['너무 안 움직임','끊임없이 움직여 의미 희석','너무 낮음','너무 빠름'],1,'할 말 없으면 중립 위치.')],
task:'오른손 4박 유지하며 왼손으로 4마디 크레셴도 후 정지 연습.'},

{d:57,wk:10,ph:'신체별 역할',t:'시선·얼굴 + 호흡',lead:'눈맞춤은 가장 강한 큐. 호흡은 보이지 않는 박.',concept:'<p>눈맞춤은 <b>가장 강한 큐</b>, 호흡은 <b>보이지 않는 박</b>이에요.</p><table class="ctbl"><tr><th>요소</th><th>내용</th></tr><tr><td>눈맞춤</td><td>손보다 빠른 직접 큐 (악보에 코 박으면 죽음)</td></tr><tr><td>표정</td><td>성격(affect) 전염 — 긴장·평온·격정</td></tr><tr><td>호흡</td><td>예비박과 한 몸 — 들숨이 템포·세기를 실어 나름</td></tr><tr><td>통일</td><td>앙상블 호흡을 모아 시작·정점·끝을 함께</td></tr></table><p><b>해석 · </b>눈맞춤은 손동작보다 빠르고 정확한 큐라 "지금 너"를 전해요. 그래서 <b>암보·내청</b>이 실전에서 중요합니다 — 악보에 시선을 뺏기면 이 채널이 죽어요. 관·성악과 함께 들이쉬는 호흡이 진입을 하나로 묶습니다.</p><div class="cnote"><b>지휘 함의 · </b>짧은 악구를 암보해 가상의 주자에게 <b>눈으로 큐</b> 주는 연습을 하세요. 예비박에 들숨을 실어 앙상블 호흡을 모으고요.</div>',think:['시선을 아끼는 것도 표현일까 — 어디를 안 볼지 설계해보기.','호흡이 예비박과 한 몸이라면, 숨을 참는 지휘는 연주에 어떤 흔적을 남길까?'],listen:['클라이버 영상 다시 한 번','눈으로 큐를 주는 순간을 세 번 찾기 — 시선이 닿는 곳에 소리가 피어요.'],read:[
'눈맞춤: 손보다 빠른 직접 큐 → 악보에 코 박으면 죽음(암보·내청)','표정: 성격(affect) 전염 — 긴장·평온·격정','호흡=예비박과 한 몸: 들숨이 템포·세기 실어 나름','통일: 앙상블 호흡을 모아 시작·정점·끝을 함께'],
q:[mc('손보다 빠르고 정확한 큐는?',['반동','눈맞춤','커트오프','세분'],1,'"지금 너"를 전함.'),
sa('예비박과 한 몸이 되어 템포·세기를 실어 나르는 것은?','호흡(들숨)','관·성악이 함께 들이쉼.'),
mc('암보·내청이 실전에서 중요한 이유는?',['멋있어서','시선(눈맞춤) 채널을 살리려고','빠르려고','악보가 없어서'],1,'악보에 코 박으면 큐 채널이 죽음.')],
task:'짧은 악구를 암보해 가상의 주자에게 눈으로 큐 주는 연습.'},

{d:58,wk:10,ph:'신체별 역할',t:'몸통·자세 + 팔 메커니즘',lead:'안정·규모는 몸이, 크기는 관절 위계가 정해요.',concept:'<p>안정·규모는 <b>몸</b>이, 동작 크기는 <b>관절 위계</b>가 정해요.</p><table class="ctbl"><tr><th>관절</th><th>특성</th><th>쓰임</th></tr><tr><td>손목</td><td>관성 작음 · 섬세 · 빠름</td><td>pp · 빠른 잔결</td></tr><tr><td>팔뚝</td><td>중간</td><td>보통 다이내믹</td></tr><tr><td>어깨(팔 전체)</td><td>크고 강함</td><td>f · 넓은 레가토</td></tr></table><svg class="cdia" viewBox="0 0 320 128"><text x="160" y="15" text-anchor="middle" font-size="10" fill="#a7b4bc">관절 위계 — 필요한 만큼만(경제성)</text><circle cx="60" cy="66" r="14" fill="rgba(111,233,205,.2)" stroke="#6fe9cd"/><text x="60" y="70" text-anchor="middle" font-size="8" font-weight="700" fill="#6fe9cd">손목</text><text x="60" y="98" text-anchor="middle" font-size="8.5" fill="#a7b4bc">섬세·빠름</text><text x="60" y="110" text-anchor="middle" font-size="8" fill="#75818b">pp·잔결</text><circle cx="160" cy="62" r="21" fill="rgba(162,179,222,.2)" stroke="#a2b3de"/><text x="160" y="66" text-anchor="middle" font-size="8.5" font-weight="700" fill="#a2b3de">팔뚝</text><text x="160" y="98" text-anchor="middle" font-size="8.5" fill="#a7b4bc">중간</text><circle cx="262" cy="56" r="29" fill="rgba(255,133,117,.2)" stroke="#ff8575"/><text x="262" y="60" text-anchor="middle" font-size="9" font-weight="700" fill="#ff8575">어깨</text><text x="262" y="100" text-anchor="middle" font-size="8.5" fill="#a7b4bc">크고 강함</text><text x="262" y="112" text-anchor="middle" font-size="8" fill="#75818b">f·넓은 레가토</text><path d="M78,66 L139,62" stroke="#75818b" stroke-width="1.2" stroke-dasharray="3 2"/><path d="M183,60 L233,57" stroke="#75818b" stroke-width="1.2" stroke-dasharray="3 2"/></svg><p><b>해석 · </b>발 어깨너비·무게중심 낮게가 안정의 기본이고, <b>부동(멈춤)</b>도 강한 메시지예요(고요=긴장). 다운비트는 능동적 내리침이 아니라 <b>팔의 무게로 낙하 → 반동</b>으로 회복합니다. 필요한 최소 관절만 쓰는 <b>경제성</b>이 원칙 — 큰 동작을 아껴야 정점에서 효과가 삽니다.</p><div class="cnote"><b>지휘 함의 · </b>같은 악구를 손목만 / 어깨까지로 각각 지휘해 <b>크기 차이</b>를 몸으로 느껴보세요. 무게 낙하와 반동의 감각을 익히고요.</div>',think:['큰 동작을 아낀 지휘자가 정점에서 얻는 것은 무엇일까?','무게 낙하와 능동적 내리침의 차이를 연주자는 소리로 구별할 수 있을까?'],listen:['첼리비다케 브루크너 영상','큰 몸이 만드는 큰 시간 — 느림이 지루하지 않은 이유를 몸에서 찾기.'],read:[
'안정: 발 어깨너비·무게중심 낮게. 부동도 강한 메시지(고요=긴장)','규모: 큰 포르테=몸·팔 전체, 섬세한 피아노=작게','관절 위계: 손목(섬세)→팔뚝(중간)→어깨(크게·강함)','원리: 무게로 낙하→반동, 필요한 최소 관절(경제성)'],
q:[mc('가장 섬세한 피아니시모·빠른 결에 쓰는 관절은?',['어깨','팔뚝','손목','허리'],2,'관성이 가장 작아 빠르고 또렷한 익투스.'),
sa('다운비트를 능동적 내리침이 아니라 무엇으로 떨어뜨리나?','팔의 자연 무게(낙하)','→ 반동으로 회복.'),
mc('경제성(Ökonomie) 원칙이 뜻하는 것은?',['항상 크게','필요한 최소 관절만','항상 작게','손목만'],1,'큰 동작을 아껴야 정점에서 효과.')],
task:'같은 악구를 손목만 / 어깨까지로 각각 지휘해 크기 차이를 몸으로 느끼기.'},

{d:59,wk:10,ph:'신체별 역할',t:'양손 협응 + 분리',lead:'두 손이 다른 메시지를 동시에. 붙이고 뗄 수 있는 통제가 목표.',concept:'<p>두 손이 <b>다른 메시지를 동시에</b> — 붙이고 뗄 수 있는 통제가 목표예요. 완전 독립이 아니라 유연한 협응입니다.</p><table class="ctbl"><tr><th>단계</th><th>연습</th></tr><tr><td>1</td><td>각 손 도형·동작 자동화</td></tr><tr><td>2</td><td>왼손을 중립에 멈춰 버티기</td></tr><tr><td>3</td><td>한 번에 한 과제씩(왼손 크레셴도 등)</td></tr><tr><td>4</td><td>다른 결·타이밍 동시(오른손 마르카토+왼손 레가토)</td></tr><tr><td>5</td><td>실제 음악에 적용</td></tr></table><p><b>해석 · </b>미러링에는 <b>두 얼굴</b>이 있어요 — 강조용 의도된 미러링은 정답이고, 없애야 할 건 <b>습관성 무의식 미러링</b>뿐이에요. 목표는 완전 독립이 아니라 필요할 때 <b>붙이고 뗄 통제</b>. 전문가도 일부러 미러링합니다.</p><div class="cnote"><b>지휘 함의 · </b><b>쉬는 훈련</b>(왼손 정지)이 다르게 움직이는 훈련만큼 중요해요. 오른손 마르카토 ↔ 왼손 레가토를 동시에 그려보세요.</div>',think:['완전 독립이 아니라 붙였다 뗄 통제가 목표인 이유 — 자유는 통제에서 나온다는 역설을 음악으로 설명해보기.','오른손 마르카토 + 왼손 레가토 같은 이중 메시지가 필요한 실제 악구를 상상해보기.'],listen:['두다멜 「말람보」 영상','양손이 각자 춤추는 축제 — 통제와 자유가 동시에 있는 몸.'],read:[
'분업: 오른손=시간, 왼손=색','미러링 두 얼굴: 강조용 의도된 미러링=정답 / 습관성 무의식 미러링만 탈피','5단계: ①각 손 자동화 ②왼손 정지 ③한 과제씩 ④다른 결·타이밍 ⑤실제 음악','목표: 완전 독립 X → 필요할 때 붙이고 뗄 통제'],
q:[mc('없애야 할 미러링은?',['강조용 의도된 미러링','습관성 무의식 미러링','모든 미러링','다운비트 미러링'],1,'강조용은 오히려 정답.'),
sa('분리 연습 2단계에서 왼손은 무엇을 하나?','중립에 멈춰 버티기(정지)','쉬는 훈련이 다르게 움직이는 훈련만큼 중요.'),
mc('양손 협응의 목표는?',['완전 독립','필요할 때 붙이고 뗄 수 있는 통제','항상 미러링','항상 분리'],1,'전문가도 일부러 미러링함.')],
task:'오른손 마르카토 ↔ 왼손 레가토 긴 아치를 동시에(4단계) 연습.'},

{d:60,wk:10,ph:'신체별 역할',t:'복습 — 지휘·신체',lead:'문제로 다지기.',concept:'<p><b>10주차 정리.</b> 신체 각 부분이 하는 일 — 지휘는 <b>온몸의 언어</b>예요.</p><table class="ctbl"><tr><th>부위</th><th>역할</th></tr><tr><td>오른손</td><td>시간 (박·템포·구획, 명료함)</td></tr><tr><td>왼손</td><td>색 (표현·다이내믹·큐, 독립성)</td></tr><tr><td>시선·호흡</td><td>가장 빠른 큐 / 보이지 않는 박</td></tr><tr><td>몸통·팔</td><td>안정·규모 / 관절 위계로 크기</td></tr><tr><td>양손 협응</td><td>붙이고 뗄 통제 (유연한 협응)</td></tr></table><div class="cnote"><b>복습법 · </b>한 악구에 "오른손=무엇, 왼손=무엇, 시선=무엇, 호흡=무엇"을 배분표로 적어보세요. 온몸이 하나의 메시지를 향하게.</div>',think:['몸의 각 부위가 다른 말을 할 때 오케스트라는 어느 부위를 가장 믿고 따라올까?','내 몸에서 가장 서툰 채널 하나를 골라 남은 기간 집중 훈련 계획 세우기.'],listen:['내가 닮고 싶은 지휘자 영상 하나','무엇이 나를 끌어당기는지 한 줄로 적어보기 — 그게 내 지휘의 씨앗이에요.'],read:['오른손·왼손·시선·호흡·몸통·팔·양손 점검','핵심: 오른손=시간, 왼손=색, 한 번에 한 메시지'],
q:[mc('반동의 크기·속도가 예고하는 것은?',['조성','다음 박의 세기·템포','종지','음색'],1,'다음 박 정보를 나름.'),
sa('큰 다이내믹·넓은 레가토에 쓰는 관절은?','어깨(팔 전체)','가장 크고 강함.'),
mc('예비박이 늦으면?',['더 정확','진입이 무너짐','음량 증가','상관없음'],1,'연주자는 예측으로 맞춤.'),
sa('오른손과 왼손의 기본 분업을 쓰시오.','오른손=시간, 왼손=색','섞지 않음.')],
task:'한 악구에 "오른손=무엇, 왼손=무엇, 시선=무엇, 호흡=무엇" 배분표 작성.'},

// ── 11주: 비팅 + 종합 ──
{d:61,wk:11,ph:'비팅',t:'세코 + 악티브 vs 파시브',lead:'세코는 비팅의 최소 단위. 점을 얼마나 보여주나가 기준 축.',concept:'<p><b>세코</b>(마른 박)는 비팅의 최소 단위예요. 모든 박자 도형은 세코의 확대·축소입니다. 기준 축은 "<b>점을 얼마나 보여주나</b>" — 악티브와 파시브예요.</p><table class="ctbl"><tr><th>박</th><th>속도 곡선</th><th>성격</th></tr><tr><td>세코</td><td>짧고 건조</td><td>명료한 최소 박</td></tr><tr><td>악티브</td><td>가속 → 최저점 급감속</td><td>익투스 또렷 (억제)</td></tr><tr><td>파시브</td><td>도착까지 등속</td><td>면으로 흐름 (자유)</td></tr></table><svg class="cdia" viewBox="0 0 320 118"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">악티브 vs 파시브 — 점을 얼마나 보여주나</text><line x1="16" y1="92" x2="305" y2="92" stroke="#75818b" stroke-width="1"/><path d="M22,34 C50,50 68,88 78,90 C88,88 106,50 134,34" fill="none" stroke="#6fe9cd" stroke-width="2.4"/><circle cx="78" cy="90" r="4" fill="#ff8575"/><text x="78" y="110" text-anchor="middle" font-size="9" fill="#6fe9cd" font-weight="700">악티브 (점 또렷)</text><path d="M186,36 Q244,104 300,36" fill="none" stroke="#a2b3de" stroke-width="2.4"/><text x="243" y="110" text-anchor="middle" font-size="9" fill="#a2b3de" font-weight="700">파시브 (등속·점 흐림)</text></svg><p><b>해석 · </b>악티브는 최대 속도가 드러나며 <b>익투스가 콕</b> 찍히고, 파시브는 등속 궤적으로 점을 숨겨요. 중요한 건 점을 흐리든 찍든 <b>박 위치는 정확</b>해야 한다는 것 — 파시브의 정확성은 등속의 균질함과 도착 타이밍에서 나옵니다.</p><div class="cnote"><b>지휘 함의 · </b>같은 박을 악티브(콕)와 파시브(미끄러지듯)로 번갈아 그려보세요. 매일 트레이너의 악티브↔파시브 연습이 이 감각이에요.</div>',think:['악티브·파시브의 대비가 사라진 지휘는 무엇을 잃을까?','점을 숨기면서도 정확한 파시브 — 모호함과 부정확함의 경계를 몸으로 정의해보기.'],listen:['프로코피예프 고전 교향곡 1악장','마른 박과 젖은 박 — 소리의 자음과 모음을 혀끝으로 구별하듯.'],read:[
'세코(마른 박): 짧고 건조한 명료한 박 → 도형은 세코의 확대·축소','악티브: 박점으로 가속→최저점 급감속, 익투스 또렷(억제)','파시브: 도착까지 등속, 면으로 흐름(자유)','공통: 점을 흐리든 찍든 박 위치는 정확'],
q:[mc('비팅의 최소 단위는?',['도형','세코','반동','예비박'],1,'모든 도형은 세코의 확대·축소.'),
sa('도착까지 등속으로 움직여 점을 숨기는 박은?','파시브','자유(free) 흐름. 등속 궤적+도착 타이밍으로 예측.'),
mc('악티브 박의 속도 곡선은?',['등속','가속→최저점 급감속','감속만','일정'],1,'최대 속도가 드러나며 익투스 또렷.')],
task:'같은 박을 악티브(콕)와 파시브(미끄러지듯)로 번갈아 그려보기.'},

{d:62,wk:11,ph:'비팅',t:'강세 위계 + 레가토',lead:'점의 또렷함·크기로 강-약-중강-약. 선율이 얹히면 면으로.',concept:'<p>점의 또렷함·크기로 <b>강-약-중강</b>을 만들고, 선율이 얹히면 점을 잇는 <b>면</b>이 돼요.</p><table class="ctbl"><tr><th>요소</th><th>내용</th></tr><tr><td>4박 강세</td><td>강(악티브)-약(파시브)-중강-약, 점 차등</td></tr><tr><td>악/파 ≠ 강/약</td><td>표현 수단이지 등호 아님 (여린내기 업=악티브)</td></tr><tr><td>레가토</td><td>점 중심 분절 → 점을 잇는 면</td></tr><tr><td>비유</td><td>세코=자음, 레가토=모음(이어 부르기)</td></tr></table><p><b>해석 · </b>악티브/파시브는 강/약과 <b>등호가 아니에요</b> — 여린내기(업비트)를 악티브로 치거나, 강박을 파시브로 눌러 표현하기도 해요. 레가토에서는 익투스를 흐리고 궤적을 이어 <b>호흡을 그립니다</b>.</p><div class="cnote"><b>지휘 함의 · </b>4박을 강-약-중강-약 크기 차등으로 그린 뒤, 같은 4박을 레가토(면)로 연결해보세요. 자음과 모음의 차이처럼.</div>',think:['여린 악티브·강한 파시브가 어울리는 악구를 각각 떠올려보기.','자음(세코)–모음(레가토) 비유를 밀고 가면, 음악의 문장·구두점·억양은 각각 무엇일까?'],listen:['브람스 교향곡 3번 3악장','레가토의 강물에 몸을 맡기기 — 어디에도 모서리가 없는 시간.'],read:[
'4박 강세: 강(악티브)-약(파시브)-중강-약, 점 차등','악티브/파시브 ≠ 강/약 (수단이지 등호 아님)','레가토: 점 중심 분절 → 점을 잇는 면. 세코=자음, 레가토=모음','익투스 흐리고 궤적 이어 호흡을 그림'],
q:[mc('악티브/파시브와 강/약의 관계는?',['1:1 등호','표현 수단이지 등호 아님','무관','반대'],1,'여린내기 업=악티브, 강박을 파시브로 누르기도.'),
sa('세코가 자음이라면 레가토는 무엇에 비유되나?','모음(이어 부르기)','점 사이를 잇는 면.'),
mc('레가토에서 익투스는?',['더 또렷','흐리고 궤적을 이음','사라짐','2배'],1,'파시브에 가깝게, 호흡을 그림.')],
task:'4박을 강-약-중강-약 크기 차등으로, 그다음 레가토(면)로 연결해 그리기.'},

{d:63,wk:11,ph:'비팅',t:'다운/업비트 + 박의 두 얼굴',lead:'내려가 바닥 찍고, 튕겨 올라 예비. 모든 박은 다음 박의 예비.',concept:'<p>내려가 바닥을 찍고(다운), 튕겨 올라 예비하는(업) 것 — 그리고 <b>모든 박은 다음 박의 예비</b>라는 통찰이에요.</p><table class="ctbl"><tr><th>구분</th><th>내용</th></tr><tr><td>다운비트</td><td>내려가 최저점 급감속·전환 = 익투스(소리 나는 순간)</td></tr><tr><td>업비트</td><td>바닥 찍고 튕겨 오르는 반동 = 다음 박 예비</td></tr><tr><td>기본형</td><td>다운=악티브 / 업=파시브 (여린내기는 업이 악티브)</td></tr><tr><td>박의 두 얼굴</td><td>받는 얼굴(강/약박) + 주는 얼굴(다음 예비)</td></tr></table><p><b>해석 · </b>익투스(박점)는 최고 속도점이 아니라 <b>최저점의 감속·전환점</b>이에요 — 최대 속도는 바닥 직전에 지나갑니다. 지휘는 박의 <b>주는 얼굴</b>(다음 예비)을 우선해요. 익투스 순간 이미 다음을 향해 반동합니다.</p><div class="cnote"><b>지휘 함의 · </b>4박에서 각 박의 반동 크기(1작·2중·3작·4큼)를 의식하며 그려, 4박의 큰 반동이 다음 강박을 끌어오게 하세요.</div>',think:['모든 박이 다음 박의 예비라면, 마지막 박은 무엇을 예비할까 — 끝의 지휘에 대해.','받는 얼굴보다 주는 얼굴을 우선하는 이유를 연주자의 입장에서 설명해보기.'],listen:['빈 신년음악회 「아름답고 푸른 도나우」','업비트가 끌어올리는 춤 — 왈츠는 내려오는 게 아니라 떠오르는 것.'],read:[
'다운: 내려가 최저점 급감속·전환=익투스(소리 나는 순간)','업: 바닥 찍고 튕겨 오르는 반동=다음 박 예비(곡 시작=예비박)','기본형: 다운=악티브 / 업=파시브 (여린내기는 업이 악티브)','박의 두 얼굴: 받는 얼굴(강/약박)+주는 얼굴(다음 예비), 지휘는 주는 얼굴 우선'],
q:[mc('익투스(박점)는 어디인가?',['최고 속도점','최저점의 감속·전환점','중간','시작점'],1,'최대 속도는 바닥 직전에 지남.'),
sa('4/4에서 동작이 가장 커지는(악티브) 박은?','4박','약박이지만 다음 강박을 끌어와야 반동이 큼.'),
mc('지휘가 우선하는 박의 "얼굴"은?',['받는 얼굴','주는 얼굴(다음 예비)','둘 다 무시','강박만'],1,'익투스 순간 이미 다음을 향해 반동.')],

function tone(midi,time,dur,gain){var a=ac();var o=a.createOscillator(),g=a.createGain();o.type='triangle';o.frequency.value=440*Math.pow(2,(midi-69)/12);o.connect(g);g.connect(a.destination);g.gain.setValueAtTime(0.0001,time);g.gain.exponentialRampToValueAtTime(gain,time+0.02);g.gain.exponentialRampToValueAtTime(0.0001,time+dur);o.start(time);o.stop(time+dur+0.05);}

function playMel(m,d){var t=ac().currentTime+0.05;m.forEach(function(x,i){tone(x,t+i*d,d*0.9,0.22);});}
function playSeq(chs,d){var t=ac().currentTime+0.05;chs.forEach(function(ch,i){ch.forEach(function(x){tone(x,t+i*d,d*0.9,0.14);});});}

var CQ=[];
function palUn(d){return Math.min(PAL.length,2+Math.floor(d/3));}
function palShuf(a){for(var i=a.length-1;i>0;i--){var j=rnd(i+1),t=a[i];a[i]=a[j];a[j]=t;}return a;}
function palWeak(u){var arr=[];for(var i=0;i<u;i++){var m=(ST.cmem&&ST.cmem[PAL[i].q])||{s:0,c:0};var w=1+Math.max(0,m.s-m.c)*3+(m.s===0?4:0);for(var k=0;k<w;k++)arr.push(i);}return arr[rnd(arr.length)];}
function buildColor(d){var u=palUn(d);var fresh=(d%3===0)?u-1:-1;CQ=[];
  for(var i=0;i<3;i++){var ti=(i===0&&fresh>=0)?fresh:palWeak(u);var root=60+rnd(8);
    var notes=PAL[ti].set.map(function(x){return x+root;});
    var pool=[];for(var j=0;j<u;j++)if(j!==ti)pool.push(j);palShuf(pool);
    var ch=palShuf([ti].concat(pool.slice(0,Math.min(3,pool.length))));
    CQ.push({ti:ti,notes:notes,ch:ch});}
  var h2='';
  if(fresh>=0){h2+='<div class="col-new"><i style="background:'+PAL[fresh].c+'"></i><div><b>오늘 새 색 · '+PAL[fresh].n+'</b><br><span>'+PAL[fresh].f+'</span></div><button class="col-hear" onclick="colHear('+fresh+')">▶ 듣기</button></div>';}

function renderQ(q,i){var s='<div class="q" id="q'+i+'"><div><span class="q-tag '+q.k+'">'+(q.k==='mc'?'객관식':'단답')+'</span></div><div class="q-q">'+q.q+'</div>';

 else{s+='<input class="sa-in" id="sain'+i+'" placeholder="답을 입력…"><button class="sa-btn" onclick="revealSA('+i+')">정답 확인</button><div class="reveal" id="rev'+i+'"></div>';}
 return s+'</div>';}

function showComplete(n){var d=CUR[n-1];var rec=(ST.done[n])||{c:0,t:0};var dn=Object.keys(ST.done).length;var pct=Math.round(dn/66*100);var nx=n<66?CUR[n]:null;var msgs=['잘했어요! 오늘의 벽돌 하나를 쌓았어요.','꾸준함이 실력이 돼요. 내일도 만나요.','한 걸음 더 깊어졌어요.','오늘의 집중, 훌륭했어요.','좋은 흐름이에요. 계속 이어가요.'];var enc=msgs[n%msgs.length];var lt=(BEATPLAN[d.wk]&&BEATPLAN[d.wk].lt)||'';var h='<div class="cmp"><div class="cmp-badge">🎉</div><div class="cmp-day">DAY '+n+' 완료 · '+d.wk+'주차</div><div class="cmp-t">'+d.t+'</div>';h+='<div class="cmp-stats"><div class="cmp-s"><div class="cmp-n">'+rec.c+'/'+rec.t+'</div><div class="cmp-l">문제 정답</div></div><div class="cmp-s"><div class="cmp-n">🔥 '+(ST.streak||1)+'</div><div class="cmp-l">연속일</div></div><div class="cmp-s"><div class="cmp-n">'+dn+'/66</div><div class="cmp-l">진도 '+pct+'%</div></div></div>';h+='<div class="cmp-sum"><b>오늘 다룬 것</b><br>지휘 레슨('+lt+') · 청음 · 화성 건반 · '+d.t+'</div>';if(nx){h+='<div class="cmp-next"><b>다음 · DAY '+(n+1)+'</b> — '+nx.t+'</div>';}else{h+='<div class="cmp-next"><b>🏁 66일 완주!</b> 화성부터 지휘까지, 정말 대단해요.</div>';}h+='<div class="cmp-enc">'+enc+'</div>';h+='<button class="done-btn" onclick="goHome()">학습 지도로 돌아가기</button>';if(nx){h+='<button class="cmp-next-btn" onclick="openDay('+(n+1)+')">다음 날 이어서 →</button>';}h+='</div>';document.getElementById('lessonBody').innerHTML=h;window.scrollTo(0,0);}

function openRef(key){btStop();var h='<button class="back" onclick="goHome()">← 학습 지도로</button><div class="l-head"><div class="l-day">참고 사전 · REFERENCE</div><div class="l-t">기호 · 인물 · 구조</div><div class="l-lead">공부 중 언제든 찾아보는 상설 참고. 순서·번호와 무관하게 항상 같은 내용이에요.</div></div><div class="ref-search"><input type="text" placeholder="기호·인물·구조 검색 — 예: sfz, 쉥커, 소나타" oninput="refSearch(this.value)"></div><div class="ref-nav">'+REFTABS.map(function(t){return '<button class="'+(t[0]===key?'on':'')+'" onclick="refSwitch(\''+t[0]+'\')">'+t[1]+'</button>';}).join('')+'</div><div id="refBody"></div>';document.getElementById('lessonBody').innerHTML=h;document.getElementById('home').style.display='none';document.getElementById('lesson').style.display='block';window.scrollTo(0,0);refSwitch(key);}

var QUAL={triad:[['장3화음',[0,4,7]],['단3화음',[0,3,7]],['증3화음',[0,4,8]],['감3화음',[0,3,6]]],seventh:[['maj7',[0,4,7,11]],['딸림7(7)',[0,4,7,10]],['m7',[0,3,7,10]],['m7♭5',[0,3,6,10]],['dim7',[0,3,6,9]]]};

var HARMPLAN={1:'c-tri',2:'c-7th',3:'root-tri',4:'root-7th',5:'inv-tri',6:'inv-7th',7:'roman',8:'roman7',9:['roman','inv-7th'],10:['roman7','roman-min'],11:['roman7','roman-min','inv-7th']};
var HARMDESC={'c-tri':'C 위 3화음 쌓기 (기본기)','c-7th':'C 위 7화음 쌓기','root-tri':'여러 근음의 3화음 (이조)','root-7th':'여러 근음의 7화음','inv-tri':'3화음 전위 — 지정된 자리로','inv-7th':'7화음 전위','roman':'조성 안 로마숫자 화음 (I·IV·V…를 C장조에서 직접)','roman7':'로마숫자 7화음 (V7·ii7…)','roman-min':'단조 로마숫자 (a·e·d단조)'};
var HARM={mode:'c-tri',cur:null,sel:[]};
function noteName(m){return NOTENAMES[m%12];}
function pianoSVG(){var W=336,whitePCs=[0,2,4,5,7,9,11],whiteMidis=[];for(var oct=0;oct<2;oct++)whitePCs.forEach(function(pc){whiteMidis.push(60+oct*12+pc);});var ww=W/whiteMidis.length;var s='<svg viewBox="0 0 '+W+' 132" class="piano">';whiteMidis.forEach(function(m,i){s+='<rect id="pk'+m+'" class="pk pkw" x="'+(i*ww)+'" y="0" width="'+(ww-1)+'" height="130" rx="3" onclick="harmKey('+m+')"/><text x="'+(i*ww+ww/2)+'" y="123" text-anchor="middle" font-size="7.5" fill="#5c6670" pointer-events="none">'+noteName(m)+'</text>';});var lw={1:0,3:2,6:5,8:7,10:9};for(var oct=0;oct<2;oct++){[1,3,6,8,10].forEach(function(pc){var m=60+oct*12+pc;var li=whiteMidis.indexOf(60+oct*12+lw[pc]);var x=(li+1)*ww-ww*0.32;s+='<rect id="pk'+m+'" class="pk pkb" x="'+x+'" y="0" width="'+(ww*0.64)+'" height="82" rx="2" onclick="harmKey('+m+')"/>';});}return s+'</svg>';}
function genHarm(mode){if(mode==='roman'||mode==='roman7'||mode==='roman-min'){var D3={I:[0,4,7],ii:[2,5,9],iii:[4,7,11],IV:[5,9,12],V:[7,11,14],vi:[9,12,16]};var D7={I:[0,4,7,11],ii:[2,5,9,12],IV:[5,9,12,16],V:[7,11,14,17],vi:[9,12,16,19]};var MIN={i:[0,3,7],iv:[5,8,12],V:[7,11,14],V7:[7,11,14,17],VI:[8,12,15],'ii\u00b0':[2,5,8]};var label,notes;if(mode==='roman-min'){var mp=['i','iv','V','V7','VI','ii\u00b0'];var mr=mp[rnd(mp.length)];var MKEYS=[['a',69],['e',64],['d',62]];var mk=MKEYS[rnd(3)];notes=MIN[mr].map(function(x){return x+mk[1];});label=mk[0]+'단조에서 <b>'+mr+'</b>';}else{var KEYS=[['C',60],['G',67],['D',62],['F',65],['B♭',70]];var kk=KEYS[rnd(KEYS.length)];var isR7=mode==='roman7';var pool=isR7?['I','ii','IV','V','vi']:['I','ii','iii','IV','V','vi'];var r=pool[rnd(pool.length)];var ivl=(isR7?D7:D3)[r];notes=ivl.map(function(x){return x+kk[1];});label=kk[0]+'장조에서 <b>'+r+(isR7?'7':'')+'</b>';}while(Math.max.apply(null,notes)>83){notes=notes.map(function(n){return n-12;});}while(Math.min.apply(null,notes)<60){notes=notes.map(function(n){return n+12;});}notes.sort(function(a,b){return a-b;});return{label:label,notes:notes};}var isSev=mode.indexOf('7')>=0;var pool=isSev?QUAL.seventh:QUAL.triad;var q=pool[rnd(pool.length)];var root=60;if(mode.indexOf('root')>=0||mode.indexOf('inv')>=0)root=[60,62,64,65,67][rnd(5)];var notes=q[1].map(function(x){return x+root;});var label=noteName(root)+'음 위 <b>'+q[0]+'</b>';if(mode.indexOf('inv')>=0){var inv=1+rnd(q[1].length-1);for(var k=0;k<inv;k++){var mn=Math.min.apply(null,notes);notes[notes.indexOf(mn)]=mn+12;}label+=' · <b>'+inv+'전위</b>';}notes.sort(function(a,b){return a-b;});while(Math.max.apply(null,notes)>83){notes=notes.map(function(n){return n-12;});}while(Math.min.apply(null,notes)<60){notes=notes.map(function(n){return n+12;});}notes.sort(function(a,b){return a-b;});return{label:label,notes:notes};}
function harmNew(){var _md=Array.isArray(HARM.mode)?HARM.mode[rnd(HARM.mode.length)]:HARM.mode;HARM.cur=genHarm(_md);HARM.sel=[];for(var m=60;m<=83;m++){var k=document.getElementById('pk'+m);if(k)k.classList.remove('sel','ok','no');}var pr=document.getElementById('harmPrompt');if(pr)pr.innerHTML=HARM.cur.label+' 쌓기';var r=document.getElementById('harmR');if(r){r.textContent='';r.className='harm-r';}}
function harmKey(m){var i=HARM.sel.indexOf(m);var k=document.getElementById('pk'+m);if(i>=0){HARM.sel.splice(i,1);if(k)k.classList.remove('sel');}else{HARM.sel.push(m);if(k)k.classList.add('sel');}}
function harmCheck(){if(!HARM.cur)return;var ans=HARM.cur.notes.slice().sort(function(a,b){return a-b;});var sel=HARM.sel.slice().sort(function(a,b){return a-b;});var ok=ans.length===sel.length&&ans.every(function(v,i){return v===sel[i];});for(var m=60;m<=83;m++){var k=document.getElementById('pk'+m);if(!k)continue;k.classList.remove('sel');if(ans.indexOf(m)>=0)k.classList.add('ok');else if(HARM.sel.indexOf(m)>=0)k.classList.add('no');}playChord(ans,1.5);var r=document.getElementById('harmR');if(r){r.textContent=ok?'정답! ('+ans.map(noteName).join(' ')+')':'다시 — 정답은 초록 건반 ('+ans.map(noteName).join(' ')+')';r.className='harm-r '+(ok?'ok':'no');}}renderHome();
