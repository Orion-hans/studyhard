<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>이론 66 · 지휘 학습</title>
<style>
:root{
  /* 배경 위계 */
  --bg:#0c1116;--surface:#18212a;--surface2:#212c36;--raised:#26333f;
  --line:rgba(255,255,255,.12);--line2:rgba(255,255,255,.22);
  /* 글자 위계 — 대비 강화 */
  --text:#f4f8f9;      /* 제목·강조 (최고 대비) */
  --body:#dbe4e8;      /* 본문 (읽는 글, 밝게) */
  --muted:#a7b4bc;     /* 보조 (AA 통과) */
  --faint:#75818b;     /* 장식용만 */
  /* 강조색 — 텍스트로도 읽히게 살짝 밝힘 */
  --mint:#6fe9cd;--mint2:#3cc4a4;--coral:#ff8575;--amber:#f5d18f;--slate:#a2b3de;
  --mono:ui-monospace,'SF Mono','Roboto Mono',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--body);
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  font-size:16px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;line-height:1.6;letter-spacing:-.003em;}
.wrap{max-width:620px;margin:0 auto;padding:20px 16px 64px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

/* header */
header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;}
header h1{font-size:1.6rem;font-weight:800;margin:0;letter-spacing:-.02em;color:var(--text);}header h1 b{color:var(--mint);}
header .sub{font-size:.78rem;color:var(--muted);font-family:var(--mono);font-weight:600;}

/* progress */
.prog{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:14px;}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:11px;}
.prog-pct{font-size:1.7rem;font-weight:800;font-family:var(--mono);color:var(--mint);letter-spacing:-.02em;}
.prog-pct small{font-size:.8rem;color:var(--muted);font-weight:600;margin-left:5px;}
.prog-stats{display:flex;gap:16px;font-size:.8rem;color:var(--muted);font-family:var(--mono);font-weight:600;}.prog-stats b{color:var(--text);font-weight:800;}
.bar{height:8px;background:var(--surface2);border-radius:5px;overflow:hidden;}.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--mint2),var(--mint));border-radius:5px;transition:width .5s;}

/* today */
.today{background:linear-gradient(135deg,rgba(111,233,205,.16),rgba(162,179,222,.09));border:1px solid var(--line2);border-radius:16px;padding:18px;margin-bottom:22px;}
.today .lab{font-size:.72rem;color:var(--mint);font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;font-weight:700;}
.today .day{font-size:1.22rem;font-weight:800;margin:6px 0 3px;color:var(--text);letter-spacing:-.01em;}
.today .ph{font-size:.82rem;color:var(--muted);margin-bottom:14px;font-weight:500;}
.today .go{display:block;width:100%;background:var(--mint);color:#0a1013;font-size:1rem;font-weight:800;border-radius:11px;padding:13px;text-align:center;}
.today.done{background:var(--surface);}.today.done .go{background:var(--surface2);color:var(--muted);}

/* map */
.map-h{font-size:.78rem;color:var(--muted);font-family:var(--mono);letter-spacing:.08em;margin:0 2px 12px;text-transform:uppercase;font-weight:700;}
.wk{margin-bottom:13px;}
.wk-lab{display:flex;gap:8px;font-size:.8rem;color:var(--muted);margin-bottom:6px;padding-left:2px;font-weight:500;}.wk-lab b{color:var(--text);font-weight:800;}
.wk-days{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;}
.cell{aspect-ratio:1;border-radius:10px;background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.9rem;font-weight:700;color:var(--muted);position:relative;transition:transform .1s;}
.cell:active{transform:scale(.94);}
.cell.done{background:var(--mint);color:#0a1013;border-color:var(--mint);font-weight:800;}.cell.done::after{content:'✓';position:absolute;top:2px;right:5px;font-size:.58rem;opacity:.75;}
.cell.exam{border-color:var(--amber);color:var(--amber);}.cell.exam.done{background:var(--amber);color:#0a1013;}
.cell.cur{border-color:var(--mint);box-shadow:0 0 0 2px rgba(111,233,205,.4);color:var(--mint);}.cell.cur.done{color:#0a1013;}

/* lesson */
#lesson{display:none;}
.back{font-size:.9rem;color:var(--muted);padding:8px 0;margin-bottom:6px;font-weight:600;}
.l-head{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line);}
.l-day{font-size:.72rem;color:var(--mint);font-family:var(--mono);letter-spacing:.1em;font-weight:700;}
.l-t{font-size:1.45rem;font-weight:800;margin:6px 0 9px;letter-spacing:-.015em;color:var(--text);line-height:1.25;}
.l-lead{font-size:.98rem;color:var(--body);line-height:1.7;}
.sec{margin-bottom:26px;}
.sec-h{display:flex;align-items:center;gap:9px;font-size:.95rem;font-weight:800;color:var(--text);margin-bottom:12px;}
.sec-h .n{width:24px;height:24px;border-radius:50%;background:var(--mint);color:#0a1013;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;font-family:var(--mono);flex:0 0 auto;}
.sec-h .tag{font-size:.66rem;font-weight:700;color:var(--faint);font-family:var(--mono);letter-spacing:.05em;}
.read{list-style:none;margin:0;padding:0;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.read li{padding:13px 16px;font-size:.95rem;line-height:1.68;color:var(--body);border-bottom:1px solid var(--line);}.read li:last-child{border-bottom:none;}

/* beat trainer */
.bt-focus{font-size:.92rem;color:var(--body);background:var(--surface2);border-radius:11px;padding:12px 14px;margin-bottom:14px;line-height:1.6;border-left:3px solid var(--mint);}.bt-focus b{color:var(--mint);font-weight:700;}
.bt-box{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 14px;}
.btsvg{width:100%;max-width:250px;display:block;margin:0 auto 12px;}
.bt-ctrl{display:flex;flex-direction:column;gap:12px;align-items:center;}
.bt-meters{display:flex;gap:7px;}
.btm{padding:8px 17px;border:1px solid var(--line2);background:var(--surface2);border-radius:9px;font-size:.88rem;font-weight:700;color:var(--muted);font-family:var(--mono);}
.btm.on{background:var(--slate);color:#0a1013;border-color:var(--slate);}
.bt-play{background:var(--mint);color:#0a1013;font-weight:800;border-radius:10px;padding:11px 34px;font-size:.95rem;}
.bt-bpm{display:flex;align-items:center;gap:11px;font-size:.82rem;color:var(--muted);font-family:var(--mono);font-weight:600;width:100%;max-width:250px;}
.bt-bpm input{flex:1;accent-color:var(--mint);}
.bt-beatn{font-family:var(--mono);font-size:.82rem;color:var(--muted);}.bt-beatn b{color:var(--mint);font-size:1.05rem;font-weight:800;}

/* left hand */
.bt-lh-toggle{margin-top:2px;font-size:.85rem;color:var(--slate);background:var(--surface2);border:1px solid var(--line2);border-radius:9px;padding:9px 18px;font-weight:700;}
.bt-lh-toggle.on{background:var(--slate);color:#0a1013;border-color:var(--slate);}
.lh-box{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);width:100%;max-width:256px;}
.lh-box.on{display:block;}
.lh-head{font-size:.85rem;color:var(--slate);font-weight:700;margin-bottom:10px;text-align:center;}.lh-head b{color:var(--text);}
.lh-main{display:flex;gap:15px;align-items:flex-end;justify-content:center;}
.lh-track{width:30px;height:100px;background:var(--surface2);border:1px solid var(--line2);border-radius:7px;position:relative;overflow:hidden;flex:0 0 auto;}
.lh-fill{position:absolute;bottom:0;left:0;right:0;height:8%;background:linear-gradient(180deg,#b6c4ea,#5a7bc0);}
.lh-fill.flash{background:var(--coral);}
.lh-exs{display:flex;flex-direction:column;gap:6px;}
.lhx{font-size:.8rem;padding:7px 12px;border:1px solid var(--line2);background:var(--surface2);border-radius:8px;color:var(--muted);font-weight:600;text-align:left;}
.lhx.on{border-color:var(--slate);color:var(--slate);background:rgba(162,179,222,.14);}
.lh-note{font-size:.76rem;color:var(--muted);text-align:center;margin-top:11px;line-height:1.5;}

/* ear */
.ear-tgt{font-size:.92rem;color:var(--body);background:var(--surface2);border-radius:11px;padding:12px 14px;margin-bottom:14px;border-left:3px solid var(--amber);line-height:1.6;}.ear-tgt b{color:var(--amber);font-weight:700;}
.ear-q{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:9px;}
.ear-play{background:var(--raised);border:1px solid var(--line2);border-radius:9px;padding:10px 20px;font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:11px;}
.ear-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ear-opt{background:var(--surface2);border:1px solid var(--line2);border-radius:9px;padding:11px 8px;font-size:.88rem;color:var(--body);font-weight:600;}
.ear-opt.ok{background:rgba(111,233,205,.2);border-color:var(--mint);color:var(--mint);}
.ear-opt.no{background:rgba(255,133,117,.18);border-color:var(--coral);color:var(--coral);}
.ear-r{margin-top:10px;font-size:.86rem;color:var(--muted);display:none;line-height:1.55;}.ear-r.on{display:block;}.ear-r b{color:var(--mint);font-weight:700;}

/* quiz */
.q{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:15px;margin-bottom:11px;}
.q-tag{font-size:.66rem;font-family:var(--mono);font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.03em;}
.q-tag.mc{background:rgba(162,179,222,.22);color:var(--slate);}.q-tag.sa{background:rgba(245,209,143,.22);color:var(--amber);}
.q-q{font-size:.98rem;font-weight:700;margin:10px 0 13px;line-height:1.55;color:var(--text);}
.opt{display:block;width:100%;text-align:left;background:var(--surface2);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:.92rem;color:var(--body);font-weight:500;}
.opt.correct{background:rgba(111,233,205,.2);border-color:var(--mint);color:var(--mint);font-weight:700;}
.opt.wrong{background:rgba(255,133,117,.18);border-color:var(--coral);color:var(--coral);}.opt.dim{opacity:.45;}
.sa-in{width:100%;background:var(--surface2);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;font-size:.95rem;color:var(--text);font-family:inherit;}
.sa-in:focus{outline:none;border-color:var(--amber);}
.sa-btn{margin-top:9px;background:var(--raised);border:1px solid var(--line2);border-radius:9px;padding:9px 18px;font-size:.86rem;font-weight:700;color:var(--text);}
.reveal{margin-top:11px;padding:12px 14px;background:var(--surface2);border-radius:10px;border-left:3px solid var(--mint);display:none;}.reveal.on{display:block;}
.reveal .ans{font-size:.9rem;font-weight:800;color:var(--mint);margin-bottom:5px;}.reveal .exp{font-size:.86rem;color:var(--body);line-height:1.6;}
.selfmark{margin-top:10px;display:flex;gap:8px;}.selfmark button{flex:1;border-radius:9px;padding:9px;font-size:.85rem;font-weight:700;border:1px solid var(--line2);}
.selfmark .ok{color:var(--mint);}.selfmark .no{color:var(--coral);}.selfmark button.sel{background:var(--raised);}
.explain{margin-top:10px;font-size:.86rem;color:var(--body);line-height:1.6;padding-left:12px;border-left:3px solid var(--line2);display:none;}.explain.on{display:block;}

.task{background:rgba(245,209,143,.1);border:1px solid rgba(245,209,143,.3);border-radius:13px;padding:14px 16px;font-size:.94rem;line-height:1.65;color:#f0e3c6;}.task b{color:var(--amber);font-weight:700;}
.done-btn{display:block;width:100%;background:var(--mint);color:#0a1013;font-size:1rem;font-weight:800;border-radius:12px;padding:15px;margin-top:10px;}
.done-btn.saved{background:var(--surface2);color:var(--mint);border:1px solid var(--mint);}
.scoreline{text-align:center;font-size:.86rem;color:var(--muted);font-family:var(--mono);font-weight:600;margin:14px 0 6px;}.scoreline b{color:var(--mint);font-weight:800;}
.ref-btn{display:block;width:100%;margin-top:18px;background:var(--surface);border:1px solid var(--line2);border-radius:14px;padding:15px;font-size:.98rem;font-weight:700;color:var(--text);text-align:center;}
.ref-btn b{color:var(--mint);}
.ref-nav{display:flex;gap:7px;margin-bottom:18px;}
.ref-nav button{flex:1;padding:9px 4px;border:1px solid var(--line2);background:var(--surface2);border-radius:10px;font-size:.82rem;font-weight:700;color:var(--muted);}
.ref-nav button.on{background:var(--mint);color:#0a1013;border-color:var(--mint);}
.ref-cat{font-size:.85rem;font-weight:800;color:var(--slate);margin:18px 0 9px;padding-left:3px;border-left:3px solid var(--slate);padding-left:9px;}
.ref-list{list-style:none;margin:0;padding:0;background:var(--surface);border:1px solid var(--line);border-radius:13px;overflow:hidden;}
.ref-list li{display:flex;gap:12px;padding:12px 15px;border-bottom:1px solid var(--line);font-size:.92rem;line-height:1.6;}
.ref-list li:last-child{border-bottom:none;}
.ref-list .term{flex:0 0 36%;font-weight:700;color:var(--text);}
.ref-list .desc{flex:1;color:var(--body);}
.lesson-card{background:linear-gradient(135deg,rgba(111,233,205,.1),rgba(162,179,222,.06));border:1px solid var(--line2);border-radius:12px;padding:13px 15px;margin-bottom:12px;}
.lesson-h{font-size:.92rem;font-weight:800;color:var(--mint);margin-bottom:9px;letter-spacing:-.01em;}
.lesson-ul{list-style:none;margin:0;padding:0;}
.lesson-ul li{font-size:.9rem;line-height:1.62;color:var(--body);padding:4px 0 4px 15px;position:relative;}
.lesson-ul li::before{content:'▪';position:absolute;left:2px;color:var(--mint);font-size:.7rem;top:7px;}
.cex{background:var(--surface2);border:1px solid var(--line2);border-radius:11px;padding:12px 14px;margin:13px 0;}
.cex-t{font-size:.87rem;font-weight:800;color:var(--amber);margin-bottom:9px;}
.cex-btns{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px;}
.cex-b{background:var(--raised);border:1px solid var(--line2);border-radius:8px;padding:8px 14px;font-size:.84rem;font-weight:700;color:var(--text);}
.cex-b:active{transform:scale(.97);}
.cex-d{font-size:.85rem;color:var(--body);line-height:1.58;}
.bk-area{width:100%;min-height:90px;background:var(--surface2);border:1px solid var(--line2);border-radius:10px;padding:11px 12px;font-size:.78rem;font-family:var(--mono);color:var(--body);resize:vertical;word-break:break-all;line-height:1.5;}
.bk-area:focus{outline:none;border-color:var(--mint);}
.bk-msg{margin-top:10px;font-size:.86rem;font-weight:600;line-height:1.5;}
.bk-msg.ok{color:var(--mint);}.bk-msg.no{color:var(--coral);}
.deep-card{background:linear-gradient(135deg,rgba(162,179,222,.1),rgba(111,233,205,.05));border:1px solid var(--line2);border-radius:12px;padding:13px 15px;font-size:.9rem;line-height:1.62;color:var(--body);}
.deep-card b{color:var(--slate);font-weight:700;}
.bk-btns{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.bk-act{flex:1;min-width:130px;background:var(--surface2);border:1px solid var(--line2);border-radius:9px;padding:11px;font-size:.88rem;font-weight:700;color:var(--text);}
.bk-act:active{transform:scale(.98);}
.cmp{text-align:center;padding:22px 6px 8px;}
.cmp-badge{font-size:2.8rem;margin-bottom:6px;}
.cmp-day{font-size:.82rem;font-weight:800;color:var(--mint);letter-spacing:.04em;}
.cmp-t{font-size:1.28rem;font-weight:800;color:var(--text);margin:6px 0 20px;line-height:1.3;}
.cmp-stats{display:flex;gap:9px;justify-content:center;margin-bottom:18px;}
.cmp-s{flex:1;background:var(--surface2);border:1px solid var(--line2);border-radius:12px;padding:13px 4px;}
.cmp-n{font-size:1.1rem;font-weight:800;color:var(--text);}
.cmp-l{font-size:.71rem;color:var(--muted);margin-top:3px;}
.cmp-sum{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:.85rem;color:var(--body);line-height:1.65;text-align:left;margin-bottom:10px;}
.cmp-sum b{color:var(--mint);}
.cmp-next{background:linear-gradient(135deg,rgba(162,179,222,.12),rgba(111,233,205,.05));border:1px solid var(--line2);border-radius:11px;padding:12px 14px;font-size:.88rem;color:var(--body);text-align:left;margin-bottom:16px;}
.cmp-next b{color:var(--slate);}
.cmp-enc{font-size:.92rem;color:var(--amber);font-weight:600;margin-bottom:18px;}
.cmp-next-btn{width:100%;margin-top:9px;background:var(--surface2);border:1px solid var(--line2);border-radius:11px;padding:13px;font-size:.92rem;font-weight:700;color:var(--text);}
.cmp-next-btn:active{transform:scale(.98);}
.think-card{background:linear-gradient(135deg,rgba(245,209,143,.09),rgba(162,179,222,.06));border:1px solid var(--line2);border-radius:12px;padding:14px 16px;}
.think-ul{list-style:none;margin:0;padding:0;}
.think-ul li{font-size:.92rem;line-height:1.7;color:var(--body);padding:7px 0 7px 26px;position:relative;}
.think-ul li::before{content:'🧠';position:absolute;left:0;top:7px;font-size:.85rem;}
.think-ul li+li{border-top:1px dashed var(--line);}
.think-note{margin-top:10px;font-size:.8rem;color:var(--muted);line-height:1.5;}
.listen-card{background:linear-gradient(135deg,rgba(255,133,117,.08),rgba(245,209,143,.06));border:1px solid var(--line2);border-radius:12px;padding:14px 16px;margin-bottom:11px;}
.listen-t{font-size:.95rem;font-weight:800;color:var(--coral);line-height:1.5;margin-bottom:7px;}
.listen-p{font-size:.9rem;color:var(--body);line-height:1.68;}
.listen-hint{margin-top:10px;font-size:.79rem;color:var(--muted);border-top:1px dashed var(--line);padding-top:9px;}
.feel-wrap{margin-top:4px;}
.feel-area{width:100%;min-height:56px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:.9rem;font-family:inherit;color:var(--body);resize:vertical;line-height:1.55;}
.feel-area:focus{outline:none;border-color:var(--coral);}
.feel-row{display:flex;align-items:center;gap:10px;margin-top:8px;}
.feel-save{background:var(--surface2);border:1px solid var(--line2);border-radius:9px;padding:9px 16px;font-size:.85rem;font-weight:700;color:var(--text);}
.feel-save:active{transform:scale(.97);}
.feel-msg{font-size:.83rem;color:var(--mint);font-weight:600;}
.feel-item{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;}
.feel-d{font-size:.76rem;font-weight:700;color:var(--coral);margin-bottom:5px;}
.feel-x{font-size:.92rem;color:var(--body);line-height:1.6;}
.col-tgt{background:var(--surface2);border-left:2px solid var(--amber);border-radius:9px;padding:10px 12px;font-size:.86rem;color:var(--body);line-height:1.55;margin-bottom:11px;}
.col-new{display:flex;align-items:center;gap:11px;background:linear-gradient(135deg,rgba(245,209,143,.12),rgba(111,233,205,.05));border:1px solid var(--line2);border-radius:11px;padding:11px 13px;margin-bottom:12px;}
.col-new i{width:30px;height:30px;border-radius:8px;flex:0 0 auto;border:1px solid rgba(255,255,255,.25);}
.col-new div{flex:1;font-size:.86rem;line-height:1.5;color:var(--body);}
.col-new span{font-size:.8rem;color:var(--muted);}
.col-hear{background:var(--surface2);border:1px solid var(--line2);border-radius:8px;padding:8px 11px;font-size:.8rem;font-weight:700;color:var(--text);flex:0 0 auto;}
.col-q{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:10px;}
.col-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:9px;}
.col-chip{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--line2);border-radius:9px;padding:9px 10px;font-size:.82rem;font-weight:600;color:var(--body);text-align:left;}
.col-chip i{width:15px;height:15px;border-radius:4px;flex:0 0 auto;border:1px solid rgba(255,255,255,.25);}
.col-chip.ok{border-color:var(--mint);background:rgba(111,233,205,.16);color:var(--text);}
.col-chip.no{border-color:var(--coral);background:rgba(255,133,117,.14);}
.col-again{width:100%;background:var(--surface2);border:1px solid var(--line2);border-radius:9px;padding:10px;font-size:.85rem;font-weight:700;color:var(--muted);}
/* concept rich */
.concept{font-size:.96rem;line-height:1.74;color:var(--body);}
.concept p{margin:0 0 13px;}.concept b{color:var(--text);}
.concept h4{font-size:.92rem;color:var(--mint);margin:18px 0 9px;font-weight:800;letter-spacing:-.01em;}
.ctbl{width:100%;border-collapse:collapse;margin:11px 0 15px;font-size:.87rem;}
.ctbl th{background:var(--surface2);color:var(--mint);text-align:left;padding:9px 11px;font-weight:700;border:1px solid var(--line2);}
.ctbl td{padding:9px 11px;border:1px solid var(--line);color:var(--body);vertical-align:top;line-height:1.55;}
.ctbl td:first-child{color:var(--text);font-weight:700;white-space:nowrap;}
.cnote{font-size:.88rem;color:var(--body);background:var(--surface2);border-left:3px solid var(--amber);border-radius:9px;padding:11px 13px;margin:12px 0;line-height:1.62;}.cnote b{color:var(--amber);}
.cdia{display:block;width:100%;max-width:330px;margin:14px auto;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:10px;}
/* harmony drill */
.harm-tgt{font-size:.92rem;color:var(--body);background:var(--surface2);border-radius:11px;padding:12px 14px;margin-bottom:14px;border-left:3px solid var(--mint);line-height:1.6;}.harm-tgt b{color:var(--mint);}
.harm-box{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 14px;text-align:center;}
.harm-prompt{font-size:1.02rem;font-weight:800;color:var(--text);margin-bottom:12px;}.harm-prompt b{color:var(--mint);}
.piano{width:100%;max-width:280px;display:block;margin:0 auto 12px;}
.pk{cursor:pointer;}
.pkw{fill:#e4eaed;stroke:#8894a0;stroke-width:1;}
.pkb{fill:#2b3641;stroke:#161d24;stroke-width:1;}
.pk.sel{fill:var(--slate);}
.pk.ok{fill:var(--mint);}
.pk.no{fill:var(--coral);}
.harm-ctrl{display:flex;gap:8px;justify-content:center;}
.harm-btn{border-radius:9px;padding:10px 22px;font-size:.9rem;font-weight:800;}
.harm-chk{background:var(--mint);color:#0a1013;}
.harm-new{background:var(--surface2);border:1px solid var(--line2);color:var(--text);}
.harm-r{margin-top:11px;font-size:.88rem;font-weight:600;min-height:1.2em;}.harm-r.ok{color:var(--mint);}.harm-r.no{color:var(--coral);}
/* ref search */
.ref-search{position:relative;margin-bottom:16px;}
.ref-search input{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--line2);border-radius:11px;color:var(--text);font-size:.95rem;font-family:inherit;}
.ref-search input:focus{outline:none;border-color:var(--mint);}

/* ── 반응형: 패드 (768px+) ── */
@media (min-width:768px){
  html{font-size:17px;}
  .wrap{max-width:820px;padding:32px 30px 80px;}
  .wk-days{grid-template-columns:repeat(6,1fr);gap:10px;}
  .piano{max-width:420px;}
  .cdia{max-width:480px;}
  .concept{font-size:1rem;line-height:1.8;}
  .ctbl{font-size:.92rem;}
  .ear-opts{grid-template-columns:repeat(3,1fr);}
  .sec{margin-bottom:32px;}
  .lesson-ul li,.think-ul li{font-size:.95rem;}
  .cmp-stats{max-width:520px;margin-left:auto;margin-right:auto;}
  #btSvgWrap svg{max-width:440px;margin:0 auto;display:block;}
}
/* ── 반응형: 노트북 (1100px+) ── */
@media (min-width:1100px){
  html{font-size:18px;}
  .wrap{max-width:960px;padding:40px 36px 90px;}
  .piano{max-width:500px;}
  .cdia{max-width:560px;}
  .ear-opts{grid-template-columns:repeat(4,1fr);}
  .l-t{font-size:1.7rem;}
  header h1{font-size:2.1rem;}
}

<script>
function mc(q,c,a,e){return{k:'mc',q:q,c:c,a:a,e:e};}
function sa(q,a,e){return{k:'sa',q:q,a:a,e:e};}
var CUR=[// ── 1주: 화성 기초 I ──
{d:1,wk:1,ph:'화성 기초',t:'화음의 종류 — 3·7화음',lead:'화음마다 색과 역할이 달라요. 오늘은 기본 화음 10종을 귀와 손으로 익혀요.',concept:'<p><b>화음</b>은 밑음(근음)에서 <b>3도씩</b> 쌓은 음의 묶음이에요. 3도 둘을 쌓으면 <b>3화음</b>, 하나 더 쌓아 7도까지면 <b>7화음</b>이 됩니다. 어떤 3도(장3도=4반음 / 단3도=3반음)를 어떤 순서로 쌓느냐가 화음의 <b>질(質)</b>과 색을 결정해요.</p><h4>3화음 4종</h4><table class="ctbl"><tr><th>화음</th><th>쌓기</th><th>구성(도수)</th><th>색 · 자리</th></tr><tr><td>장3화음</td><td>장3+단3</td><td>1·3·5</td><td>밝고 안정 · I·IV·V</td></tr><tr><td>단3화음</td><td>단3+장3</td><td>1·♭3·5</td><td>어둡고 서정 · ii·iii·vi</td></tr><tr><td>증3화음</td><td>장3+장3</td><td>1·3·♯5</td><td>불안·부유(대칭)</td></tr><tr><td>감3화음</td><td>단3+단3</td><td>1·♭3·♭5</td><td>긴장·불안정 · vii°</td></tr></table><h4>7화음 5종</h4><table class="ctbl"><tr><th>화음</th><th>구성(도수)</th><th>색 · 쓰임</th></tr><tr><td>maj7</td><td>1·3·5·7</td><td>세련·부유 · I·IV</td></tr><tr><td>딸림7(7)</td><td>1·3·5·♭7</td><td>해결 요구 · V</td></tr><tr><td>m7</td><td>1·♭3·5·♭7</td><td>부드러운 단 · ii·vi</td></tr><tr><td>m7♭5</td><td>1·♭3·♭5·♭7</td><td>반감7 · ii°·vii</td></tr><tr><td>dim7</td><td>1·♭3·♭5·♭♭7</td><td>감7 · 대칭 · 고긴장</td></tr></table><p><b>해석 · </b>3화음의 밝기는 <b>3음</b>(장/단)이 가르고, 안정/불안은 <b>5음</b>(완전/증/감)이 가릅니다. 증·감화음은 <b>대칭 구조</b>라 근음이 모호해서 반음계·전조의 경첩으로 자주 쓰여요.</p><div class="cex"><div class="cex-t">🎧 예시 — 화음의 질 (근음 C)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playChord([60,64,67],1.3)">장3화음</button><button class="cex-b" onclick="ac();playChord([60,63,67],1.3)">단3화음</button><button class="cex-b" onclick="ac();playChord([60,64,68],1.3)">증3화음</button><button class="cex-b" onclick="ac();playChord([60,63,66],1.3)">감3화음</button><button class="cex-b" onclick="ac();playChord([60,64,67,71],1.4)">maj7</button><button class="cex-b" onclick="ac();playChord([60,64,67,70],1.4)">딸림7</button></div><div class="cex-d">3음(장/단)이 밝기를, 5음(완전/증/감)이 안정을 가릅니다. 증·감의 부유·긴장을 귀로 구별해보세요.</div></div><div class="cnote"><b>지휘 함의 · </b>화음의 질은 곡의 <b>명암</b>을 정해요. 같은 화음도 어느 층을 끌어올리냐(발란스)로 색이 달라지니, 총보에서 질을 먼저 읽고 색을 조각하세요.</div>',think:['증3·감7화음은 대칭 구조라 근음이 모호해요. 근음이 사라진 소리는 왜 어디로든 갈 수 있는 문이 될까?','같은 장3화음이라도 배치·악기에 따라 전혀 다르게 들려요. 화음의 질 말고 색을 만드는 요인을 세 가지만 꼽아보기.'],listen:['바그너 「트리스탄과 이졸데」 전주곡 (첫 3분)','첫 화음 하나가 여는 갈망의 세계. 이름 붙이지 말고, 그 화음이 몸 어디에 닿는지만 느껴보세요.'],read:[
'장3화음 1-3-5 (장3+단3): 밝고 안정 · I·IV·V','단3화음 1-♭3-5: 어둡고 서정 · ii·iii·vi','증3화음 1-3-♯5: 불안·부유','감3화음 1-♭3-♭5: 긴장·불안정 · vii°','maj7 1-3-5-7: 세련·부유 / dom7 1-3-5-♭7: 딸림·해결 요구','m7 / m7♭5(반감7) / dim7(감7·대칭)'],
q:[mc('장3화음의 구성 음정은?',['장3도+단3도','단3도+장3도','장3도+장3도','단3도+단3도'],0,'아래 장3도 위 단3도 = 장3화음. 반대면 단3화음.'),
sa('딸림7화음(dom7)을 근음 기준 음도로 쓰시오.','1-3-5-♭7','장3화음+단7도. V에 놓여 해결(→I)을 강하게 요구.'),
mc('감7화음(dim7)의 특징이 아닌 것은?',['모든 음정이 단3도','대칭 구조','강한 긴장','밝고 안정적'],3,'dim7은 단3도 4개가 쌓인 대칭·고긴장 화음.')],
task:'앱 사전에서 C장·c단·C증·C감 3화음을 눌러 소리 차이를 귀로 구별. maj7/dom7/m7도 비교.'},

{d:2,wk:1,ph:'화성 기초',t:'화성 기능 T–S–D',lead:'모든 화음은 셋 중 하나의 역할을 해요. 이 밀고 당김이 조성음악의 엔진.',concept:'<p>화음은 저마다 <b>역할(기능)</b>이 있어요. 이 역할의 밀고 당김이 조성음악을 굴리는 <b>엔진</b>입니다.</p><table class="ctbl"><tr><th>기능</th><th>대표 화음</th><th>느낌</th><th>경향</th></tr><tr><td>토닉 T</td><td>I · vi</td><td>집 · 안정 · 도착</td><td>어디로든</td></tr><tr><td>서브도미넌트 S</td><td>IV · ii</td><td>떠남 · 준비</td><td>→ D</td></tr><tr><td>도미넌트 D</td><td>V · vii°</td><td>긴장 · 해결 요구</td><td>→ T (강하게)</td></tr></table><svg class="cdia" viewBox="0 0 300 165"><defs><marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#a7b4bc"/></marker></defs><path d="M80,100 Q102,54 126,56" fill="none" stroke="#a7b4bc" stroke-width="2" marker-end="url(#ar)"/><path d="M174,56 Q198,54 220,100" fill="none" stroke="#a7b4bc" stroke-width="2" marker-end="url(#ar)"/><path d="M212,126 L90,126" fill="none" stroke="#ff8575" stroke-width="2.6" marker-end="url(#ar)"/><circle cx="60" cy="118" r="26" fill="rgba(111,233,205,.16)" stroke="#6fe9cd" stroke-width="2"/><text x="60" y="124" text-anchor="middle" font-size="18" font-weight="800" fill="#6fe9cd">T</text><circle cx="150" cy="42" r="26" fill="rgba(162,179,222,.16)" stroke="#a2b3de" stroke-width="2"/><text x="150" y="48" text-anchor="middle" font-size="18" font-weight="800" fill="#a2b3de">S</text><circle cx="240" cy="118" r="26" fill="rgba(255,133,117,.16)" stroke="#ff8575" stroke-width="2"/><text x="240" y="124" text-anchor="middle" font-size="18" font-weight="800" fill="#ff8575">D</text><text x="150" y="152" text-anchor="middle" font-size="9.5" fill="#ff8575" font-weight="700">D→T = 가장 강한 해결</text></svg><p><b>해석 · </b>분석의 첫 질문은 늘 <b>"지금 어느 기능인가?"</b>예요. 화음 이름보다 기능이 먼저입니다. 예로 Dm(ii)과 F(IV)는 다른 화음이지만 <b>둘 다 S</b> — 같은 "떠남"의 역할이에요. <b>토니시제이션</b>은 부속화음(V/V 등)으로 잠깐 다른 음을 으뜸음처럼 강조하되 조는 유지하는 것입니다.</p><div class="cex"><div class="cex-t">🎧 예시 — T–S–D 진행 (C장조)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[60,64,67],[65,69,72],[67,71,74],[60,64,67]],0.8)">I–IV–V–I</button></div><div class="cex-d">토닉(도미솔) → 서브도미넌트(파라도) → 도미넌트(솔시레) → 토닉. V의 긴장이 I로 풀리는 순간에 귀를 두세요.</div></div><div class="cnote"><b>지휘 함의 · </b>D→T 해결은 곡에서 가장 잦은 <b>긴장→이완</b>이에요. 도미넌트에서 반동을 조이고 토닉 도착에 무게를 실어 "숨을 내려놓게" 그리면 프레이징이 삽니다.</div>',think:['T–S–D를 중력에 비유한다면, 무중력처럼 기능이 흐려진 음악(드뷔시·명상 음악)은 무엇으로 흐름을 만들까?','한 곡에서 D가 유난히 길게 끄는 순간을 찾아, 작곡가가 해결을 미룬 이유를 추측해보기.'],listen:['베토벤 교향곡 5번 4악장 도입','어둠(3악장 끝)에서 빛(C장조)으로 문이 열리는 순간 — 해결이 몸에 주는 안도를 그대로 겪어보세요.'],read:[
'토닉 T: 집·안정·도착 (I·vi)','서브도미넌트 S: 떠남·준비 (IV·ii)','도미넌트 D: 긴장·해결 요구 (V·vii°)','기본 흐름 T→S→D→T = 집→떠남→긴장→귀가','토니시제이션: 부속화음으로 잠깐 다른 음을 으뜸처럼(조는 유지)'],
q:[mc('IV·ii 화음의 기능은?',['토닉','서브도미넌트','도미넌트','없음'],1,'IV·ii = S(버금딸림). 집을 떠나 움직이기 시작.'),
sa('조성음악의 기본 화성 흐름을 T·S·D로 쓰시오.','T-S-D-T','집→떠남→긴장→귀가. 긴장이 쌓였다 풀리는 왕복.'),
mc('토니시제이션이란?',['완전한 전조','잠깐 다른 화음을 가짜 으뜸음처럼 강조','종지를 생략','리듬을 바꿈'],1,'조를 완전히 옮기진 않고 잠깐 강조. 부속화음이 대표 수단.')],
task:'좋아하는 곡 한 악구를 골라 각 화음이 T·S·D 중 무엇인지 표시해보기.'},

{d:3,wk:1,ph:'화성 기초',t:'종지 (Cadence)',lead:'악구가 어떻게 끝나는가. 문장의 마침표·물음표·쉼표예요.',concept:'<p>악구가 <b>어떻게 끝나는가</b>를 보는 게 종지예요. 문장의 마침표·물음표·쉼표처럼, 종결 방식이 음악의 <b>숨과 구획</b>을 만들어요.</p><table class="ctbl"><tr><th>종지</th><th>진행</th><th>강도</th><th>느낌</th></tr><tr><td>완전정격 PAC</td><td>V→I (근음+소프라노 으뜸)</td><td>★★★</td><td>확실한 마침</td></tr><tr><td>불완전정격 IAC</td><td>V→I (전위·3·5음)</td><td>★★</td><td>약한 마침</td></tr><tr><td>반종지 HC</td><td>…→V</td><td>★</td><td>쉼표·질문</td></tr><tr><td>변격</td><td>IV→I</td><td>★★</td><td>아멘·여운</td></tr><tr><td>위종지</td><td>V→vi</td><td>—</td><td>끝날 듯 안 끝남</td></tr></table><p><b>해석 · </b>PAC는 "완전히 끝났다"는 도착점이라 <b>악절·악장의 경계</b>를 만들어요. 반종지는 선행구 끝에서 "질문"을 남겨 후속구를 부르고, 위종지는 도착을 미뤄 곡을 끌고 갑니다. 종지의 <b>강도 위계</b>를 알아야 어디서 크게, 어디서 살짝 숨 쉴지 정해요.</p><div class="cex"><div class="cex-t">🎧 예시 — 종지 비교 (C장조)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[67,71,74],[60,64,67]],0.95)">정격 V→I</button><button class="cex-b" onclick="ac();playSeq([[67,71,74],[69,72,76]],0.95)">위종지 V→vi</button><button class="cex-b" onclick="ac();playSeq([[65,69,72],[60,64,67]],0.95)">변격 IV→I</button></div><div class="cex-d">정격은 확실히 닫히고, 위종지(V→vi)는 끝날 듯 안 끝나며, 변격(IV→I)은 아멘처럼 부드러워요. 종결감의 차이를 들어보세요.</div></div><div class="cnote"><b>지휘 함의 · </b>종지 = 프레이징의 <b>구두점</b>. PAC엔 확실한 커트오프와 호흡, 반종지엔 열린 채 이어지는 제스처. 강도에 따라 쉼의 크기를 차등하세요.</div>',think:['위종지가 연달아 나오면 청중의 기대는 어떻게 변할까? 지휘자는 그 지연을 어디까지 밀 수 있을까?','문장의 마침표·쉼표·물음표를 종지에 대응시켜보고, 대응이 안 되는 종지가 있는지 생각해보기.'],listen:['모차르트 「아베 베룸 코르푸스」','종지마다 내려앉는 숨. 어디서 함께 숨을 쉬게 되는지, 몸이 먼저 알아요.'],read:[
'정격 V→I: 가장 확실한 마침. PAC(근음+소프라노 으뜸=최강)/IAC(전위·3·5음=약함)','반종지 HC: V에서 멈춤 = 쉼표·질문','변격 IV→I: 아멘·부드러운 여운','위종지 V→vi: 끝날 듯 안 끝나는 속임수','피카르디 3도: 단조 곡 마지막만 장3화음 = 빛나는 종결'],
q:[mc('가장 강한 종결감을 주는 종지는?',['반종지','변격종지','완전정격종지(PAC)','위종지'],2,'PAC: 두 화음 근음 위 + 소프라노가 으뜸음. "완전히 끝났다".'),
sa('V화음에서 멈춰 질문·기대를 남기는 종지 이름은?','반종지 (HC)','다음을 기대하게 함. 악절의 선행구 끝에 흔함.'),
mc('위종지(기만 종지)의 진행은?',['V→I','IV→I','V→vi','ii→V'],2,'딸림이 I 대신 vi로 빠짐 → 악구를 더 끌고 감.')],
task:'악보에서 종지 3개를 찾아 종류(정격/반/변격/위)를 표시.'},

{d:4,wk:1,ph:'화성 기초',t:'부가·확장·변화 화음(텐션)',lead:'기본 화음에 색을 더하는 음들. 재즈·낭만의 풍부함이 여기서.',concept:'<p>기본 3·7화음 위에 음을 더 얹어 <b>색과 긴장</b>을 더하는 게 텐션이에요. 재즈·낭만의 풍부함이 여기서 나옵니다.</p><table class="ctbl"><tr><th>종류</th><th>얹는 음</th><th>효과</th></tr><tr><td>6 · add9 · 6/9</td><td>6, 9 (7 없이)</td><td>투명 · 풍성</td></tr><tr><td>9 · 11 · 13</td><td>상위 텐션</td><td>풍성 · 긴장 고조</td></tr><tr><td>7♭9 · 7♯9</td><td>변형 9도</td><td>단조 해결 · 블루지</td></tr><tr><td>7♯11 · 7♭13</td><td>변형 11·13</td><td>부유 · 어두운 딸림</td></tr><tr><td>7alt</td><td>♭9·♯9·♯11·♭13</td><td>최대 긴장 → i</td></tr></table><p><b>해석 · </b>텐션은 화음의 <b>기능은 유지</b>하면서 색만 짙게 해요. 딸림7에 텐션이 많을수록 해결을 향한 긴장이 커집니다. add9·6/9처럼 7 없는 텐션은 "긴장 없는 색"이라 종지의 포근한 여운에 좋아요.</p><div class="cex"><div class="cex-t">🎧 예시 — 딸림7의 긴장 (근음 C)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playChord([60,64,67,70],1.5)">C7</button><button class="cex-b" onclick="ac();playChord([60,64,67,70,61],1.5)">C7♭9</button><button class="cex-b" onclick="ac();playChord([60,64,67,70,66],1.5)">C7♯11</button></div><div class="cex-d">기본 딸림7에서 텐션이 늘수록 긴장이 커지는 걸 들어보세요. 이 긴장이 해결(→I)을 강하게 원해요.</div></div><div class="cnote"><b>지휘 함의 · </b>텐션이 두꺼운 화음일수록 그 <b>불협의 층</b>을 어떻게 발란스할지가 관건. 텐션 음을 살짝 도드라지게 하면 색이 서고, 묻으면 안정돼요.</div>',think:['텐션이 많아질수록 긴장이 커진다면, 텐션이 포화되면(모든 음이 울리면) 오히려 긴장이 사라질까? 왜?','add9의 투명함이 어울리는 장면과 7♭9의 어두움이 어울리는 장면을 각각 하나씩 상상해 묘사해보기.'],listen:['라벨 「죽은 왕녀를 위한 파반」','텐션이 드리우는 그늘과 부드러움 — 슬픔인지 다정함인지 정하지 말고 머물러보세요.'],read:[
'6/add9/6-9: 7 없이 색만 더함','9·11·13: 딸림 위 상위 텐션(풍성·긴장)','7♭9/7♯9: 단조 해결·블루지','7♯11: 리디안♭7·부유 / 7♭13: 어두운 딸림','7alt(♭9·♯9·♯11·♭13): 최대 긴장 → i (재즈 리하모니)'],
q:[mc('add9와 6/9의 공통점은?',['7음을 반드시 포함','7 없이 색을 더함','딸림 기능','감화음'],1,'둘 다 7음 없이 9(또는 6·9)만 얹어 투명·풍성.'),
sa('7alt에 흔히 얹는 변화 텐션 4가지를 쓰시오.','♭9 ♯9 ♯11 ♭13','얼터드 스케일과 짝. i로 강하게 해결.'),
mc('7♯11에 어울리는 스케일은?',['프리지안','리디안♭7','로크리안','온음음계'],1,'♯11 = 리디안♭7(믹솔리디안 ♯4)의 색.')],
task:'앱 사전에서 C7·C7♭9·C7alt를 눌러 긴장이 커지는 순서를 귀로 확인.'},

{d:5,wk:1,ph:'화성 기초',t:'전위·자리표(Figured Bass)',lead:'같은 화음도 어느 음이 베이스냐로 무게가 달라져요. 자리표로 읽어요.',concept:'<p>같은 화음도 <b>어느 음이 베이스</b>냐로 무게와 안정감이 달라져요. 이걸 <b>자리표(figured bass)</b>로 읽습니다.</p><table class="ctbl"><tr><th>위치</th><th>베이스</th><th>자리표</th></tr><tr><td>3화음 기본</td><td>근음</td><td>5/3 (생략)</td></tr><tr><td>3화음 1전위</td><td>3음</td><td>6</td></tr><tr><td>3화음 2전위</td><td>5음</td><td>6/4</td></tr><tr><td>7화음 기본</td><td>근음</td><td>7</td></tr><tr><td>7화음 1전위</td><td>3음</td><td>6/5</td></tr><tr><td>7화음 2전위</td><td>5음</td><td>4/3</td></tr><tr><td>7화음 3전위</td><td>7음</td><td>4/2</td></tr></table><p><b>해석 · </b>기본 위치(근음 베이스)가 가장 안정적이고, <b>6/4(2전위)</b>는 불안정해 종지 6/4처럼 해결로 이어져요. 자리표는 <b>베이스 라인을 매끄럽게</b> 만드는 도구 — I → V6 → I는 베이스가 도-시-도로 도약 없이 흐릅니다.</p><div class="cex"><div class="cex-t">🎧 예시 — C장3화음 전위 (베이스 변화)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playChord([60,64,67],1.4)">근음 (5/3)</button><button class="cex-b" onclick="ac();playChord([64,67,72],1.4)">1전위 (6)</button><button class="cex-b" onclick="ac();playChord([67,72,76],1.4)">2전위 (6/4)</button></div><div class="cex-d">베이스가 근음→3음(미)→5음(솔)로 바뀌며 무게가 달라져요. 2전위(6/4)의 불안정함이 해결을 부릅니다.</div></div><div class="cnote"><b>지휘 함의 · </b>베이스는 화성의 <b>토대이자 발란스 기준</b>. 전위로 베이스가 순차로 흐르면 레가토로, 근음이 도약하면 또렷한 착지로 그리세요.</div>',think:['같은 화음의 전위만 바꿔도 베이스 선율이 생겨요. 화성이 선율이 되는 순간이란 무엇일까?','6/4가 유독 불안정한 이유를 배음(음향)의 관점에서 설명해본다면?'],listen:['바흐 「G선상의 아리아」','베이스가 한 걸음씩 내려가는 길을 눈 감고 따라 걷기. 선율보다 낮은 목소리를 먼저.'],read:[
'3화음: 기본 5/3, 1전위 6, 2전위 6/4','7화음: 기본 7, 1전위 6/5, 2전위 4/3, 3전위 4/2','베이스가 3음=1전위, 5음=2전위, 7음=3전위','예: 1전위 토닉=I6, 2전위 딸림7=V4/3','베이스 안정성: 토닉은 근음(뿌리)에 두면 가장 안정'],
q:[mc('3화음 1전위의 자리표는?',['5/3','6','6/4','7'],1,'베이스가 3음일 때 = 6 (I6).'),
sa('딸림7화음 2전위의 자리표를 쓰시오.','4/3','베이스가 5음. V4/3.'),
mc('가장 불안정해 다음으로 나아가려는 전위는?',['근음 위치','1전위(6)','2전위(6/4)','상관없음'],2,'6/4는 불안정 → 종지 6/4처럼 해결로 이어짐.')],
task:'C장조 I·IV·V를 근음·1전위·2전위로 배치해 베이스 라인을 매끄럽게 만들어보기.'},

{d:6,wk:1,ph:'화성 기초',t:'복습 — 화성 기초 I',lead:'1주차를 문제로 다져요. 틀린 건 해당 날로 돌아가 다시.',concept:'<p><b>1주차 종합.</b> 화음의 질 → 기능(T-S-D) → 종지 → 텐션 → 전위. 이 다섯이 <b>화성 읽기의 기본 문법</b>이에요.</p><table class="ctbl"><tr><th>개념</th><th>핵심 질문</th></tr><tr><td>화음의 질</td><td>장/단/증/감? 3·5·7음의 성격은?</td></tr><tr><td>기능</td><td>지금 T·S·D 중 무엇? (집/떠남/긴장)</td></tr><tr><td>종지</td><td>어떻게 끝나나? 강도는?</td></tr><tr><td>텐션</td><td>색을 더하나, 긴장을 더하나?</td></tr><tr><td>전위</td><td>누가 베이스? 안정/불안?</td></tr></table><div class="cnote"><b>복습법 · </b>좋아하는 곡 한 악구를 골라 이 다섯 질문을 한 장에 적어보세요. "화음 이름"이 아니라 "기능과 역할"로 읽는 눈이 화성 분석의 시작이에요.</div>',think:['이번 주 다섯 개념 중 서로 가장 깊게 연결된 두 개를 골라 하나의 문장으로 잇기.','화성을 전혀 모르는 사람에게 T–S–D를 30초 안에 비유로 설명한다면 어떤 비유를 쓸까?'],listen:['쇼팽 전주곡 e단조 Op.28-4','왼손 화성이 반음씩 무너져 내리는 슬픔 — 오늘만은 분석하지 말고 그냥 무너져보세요.'],read:[
'화음 10종·기능 T-S-D·종지·텐션·자리표를 한 번에 점검','핵심: 기능은 "지금 어디쯤(떠남/긴장/도착)?"','종지는 "어떻게 끝나나", 자리표는 "누가 베이스냐"'],
q:[mc('S→D→T에서 D의 대표 화음은?',['IV','ii','V','vi'],2,'D=도미넌트=V(vii°). 해결을 강하게 원함.'),
sa('단조 곡의 마지막만 장3화음으로 밝게 끝내는 것은?','피카르디 3도','어두운 곡의 빛나는 종결.'),
mc('m7♭5(반감7)의 구성은?',['1-♭3-♭5-♭7','1-♭3-♭5-♭♭7','1-3-5-♭7','1-♭3-5-♭7'],0,'감3화음+단7도. 감7(♭♭7)과 구별.'),
sa('V→vi 종지의 이름은?','위종지(기만 종지)','끝날 듯 안 끝남.')],
task:'이번 주 배운 곡 악구에서 기능·종지·전위를 모두 한 장에 정리(요약노트).'},
// ── 2주: 화성 기초 II ──
{d:7,wk:2,ph:'화성 기초',t:'화성 시퀀스',lead:'같은 화음 패턴이 한 칸씩 규칙적으로 이동. 계단처럼 방향·추진력을 만들어요.',concept:'<p><b>시퀀스</b>는 같은 화성 <b>모형</b>이 일정 간격으로 규칙적으로 반복 이동하는 것이에요. <b>방향</b>(상행/하행)과 <b>간격</b>(5도·3도·2도)이 색과 추진력을 결정합니다.</p><table class="ctbl"><tr><th>시퀀스</th><th>근음 이동</th><th>특징</th></tr><tr><td>하행 5도</td><td>5도씩 ↓</td><td>가장 강한 추진 (비발디·바흐)</td></tr><tr><td>상행 5도</td><td>5도씩 ↑</td><td>떠오름 · 덜 흔함</td></tr><tr><td>하행 5-6 (로마네스카)</td><td>4↓5↑ 교대</td><td>부드러운 하행 (파헬벨)</td></tr><tr><td>하행 3도</td><td>3도씩 ↓</td><td>포근 · 노래하는</td></tr><tr><td>로살리아</td><td>온음 위 통째 반복</td><td>기계적 반복(별칭)</td></tr></table><svg class="cdia" viewBox="0 0 320 96"><defs><marker id="a7" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#a7b4bc"/></marker></defs><circle cx="42" cy="40" r="20" fill="rgba(111,233,205,.14)" stroke="#6fe9cd" stroke-width="1.6"/><text x="42" y="46" text-anchor="middle" font-size="13" font-weight="800" fill="#6fe9cd">vi</text><circle cx="134" cy="40" r="20" fill="rgba(111,233,205,.14)" stroke="#6fe9cd" stroke-width="1.6"/><text x="134" y="46" text-anchor="middle" font-size="13" font-weight="800" fill="#6fe9cd">ii</text><circle cx="226" cy="40" r="20" fill="rgba(111,233,205,.14)" stroke="#6fe9cd" stroke-width="1.6"/><text x="226" y="46" text-anchor="middle" font-size="13" font-weight="800" fill="#6fe9cd">V</text><circle cx="300" cy="40" r="20" fill="rgba(111,233,205,.14)" stroke="#6fe9cd" stroke-width="1.6"/><text x="300" y="46" text-anchor="middle" font-size="13" font-weight="800" fill="#6fe9cd">I</text><path d="M64,40 L112,40" stroke="#a7b4bc" stroke-width="2" marker-end="url(#a7)"/><path d="M156,40 L204,40" stroke="#a7b4bc" stroke-width="2" marker-end="url(#a7)"/><path d="M246,40 L280,40" stroke="#ff8575" stroke-width="2.4" marker-end="url(#a7)"/><text x="160" y="82" text-anchor="middle" font-size="9.5" fill="#75818b">근음이 5도씩 하행 (A→D→G→C) · 가장 강한 추진</text></svg><p><b>해석 · </b>시퀀스는 <b>모형의 첫 등장</b>만 잡으면 나머지가 예측돼요. 보통 <b>2~3회</b> 반복하며 긴장을 적재하다 종지·정점으로 풀립니다. 하행 5도가 조성 진행의 엔진인 이유는 매 단계가 V→I의 연쇄이기 때문이에요.</p><div class="cex"><div class="cex-t">🎧 예시 — 하행 5도 시퀀스 (C장조)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[69,72,76],[62,65,69],[67,71,74],[60,64,67]],0.72)">vi–ii–V–I</button></div><div class="cex-d">근음이 A→D→G→C로 5도씩 하행해요. 매 단계가 V→I의 연쇄라 강한 추진이 느껴집니다.</div></div><div class="cnote"><b>지휘 함의 · </b>시퀀스 구간은 <b>하나의 긴 추진선</b>. 매 단계 살짝 밀어 목표로 몰아가되, 기계적으로 똑같이 반복하지 말고 방향성을 실으세요.</div>',think:['하행 5도 시퀀스가 조성 음악의 엔진이라면, 순환이 없는 음악은 무엇으로 앞으로 나아갈까?','시퀀스의 반복이 지루함이 아니라 추진이 되는 조건은 무엇일까?'],listen:['비발디 「사계」 겨울 1악장','시퀀스가 몰아칠 때 몸이 앞으로 쏠리는 감각. 추진이란 무엇인지 몸으로.'],read:[
'하행 5도: 근음 5도씩 하강(E-A-D-G-C). 가장 강력한 추진(비발디·바흐)','상행 5도: 덜 흔함·떠오름','하행 5-6/로마네스카/파헬벨 계열: 부드러운 하행','하행 3도: 포근·노래하는','로살리아: 악구 통째 온음 위로 = 값싼 반복'],
q:[mc('가장 강력한 추진력을 주는 시퀀스는?',['상행 5도','하행 5도','하행 3도','로살리아'],1,'근음이 5도씩 굴러 내려감. 조성 진행의 엔진.'),
sa('악구를 통째로 온음 위로 그대로 반복해 "값싼 반복"으로 불리는 것은?','로살리아','너무 기계적이라 별칭이 됨.'),
mc('시퀀스를 알아보는 핵심 단서는?',['같은 모양이 한 칸씩 이동','화음이 사라짐','박자가 바뀜','조가 바뀜'],0,'방향(상/하)과 간격(5도/3도)이 색을 결정.')],
task:'파헬벨 카논 진행을 쳐보고 하행 5-6(로마네스카)의 흐름을 귀로 느끼기.'},

{d:8,wk:2,ph:'화성 기초',t:'갈랑 스키마타',lead:'18세기의 관용 표현. 언어의 숙어처럼 정해진 패턴이 곡의 벽돌.',concept:'<p>18세기 갈랑 양식의 <b>관용 표현</b>이에요. 언어의 숙어처럼, 정해진 <b>베이스+선율 정형</b>들이 곡을 짜는 벽돌이 됩니다. 스키마를 알면 그 악구가 곡의 <b>어느 위치</b>(개시·응답·발전·종지)인지 바로 읽혀요.</p><table class="ctbl"><tr><th>스키마</th><th>베이스(음도)</th><th>쓰임·위치</th></tr><tr><td>로마네스카</td><td>1-5-6-3</td><td>장중한 개시</td></tr><tr><td>프린너</td><td>4-3-2-1</td><td>응답 · 마무리</td></tr><tr><td>폰테(다리)</td><td>딸림 지속 하강</td><td>재현부 진입</td></tr><tr><td>몬테(산)</td><td>한 음씩 상승</td><td>발전 · 긴장 고조</td></tr><tr><td>인두지오</td><td>딸림 앞 지연</td><td>도착 뜸들이기</td></tr></table><p><b>해석 · </b>스키마타는 그 시대의 <b>문법 숙어</b>라, 개별 화음보다 "이 정형이 무슨 역할을 하는가"를 봐요. 개시 정형(로마네스카)은 무게 있게, 응답 정형(프린너)은 정리하듯 — 위치가 곧 연주 방식입니다.</p><div class="cex"><div class="cex-t">🎧 예시 — 로마네스카 (베이스 1-5-6-3)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[60,64,67],[55,59,62],[57,60,64],[52,55,59]],0.85)">I–V–vi–iii</button></div><div class="cex-d">파헬벨 카논과 친척인 장중한 개시 정형. 베이스가 도-솔-라-미로 내려가는 걸 들어보세요.</div></div><div class="cnote"><b>지휘 함의 · </b>스키마의 <b>기능</b>(개시/응답/발전)에 따라 프레이징·무게를 배분하세요. 몬테는 밀어 올리고, 프린너는 내려놓듯.</div>',think:['스키마타가 그 시대의 숙어라면, 오늘날 대중음악의 숙어는 무엇일까? 하나 찾아 이름 붙여보기.','숙어를 아는 청중과 모르는 청중은 같은 악구를 어떻게 다르게 들을까?'],listen:['파헬벨 카논','수백 년 들어온 진행이 왜 여전히 아름다운가 — 익숙함과 감동의 관계를 느껴보세요.'],read:[
'로마네스카: 베이스 1-5-6-3, 장중한 개시','프린너: 받아치는 응답, 베이스 4-3-2-1','폰테(샘): 한 음 아래 반복 / 몬테(산): 한 음 위 상승','폰테(다리): 딸림 길게 깔고 건너감(재현부 직전)','인두지오: 딸림 앞 뜸들여 도착 지연'],
q:[mc('개시부에 자주 쓰이는, 베이스 1-5-6-3 정형은?',['프린너','로마네스카','몬테','인두지오'],1,'파헬벨 카논과 친척인 장중한 펼침.'),
sa('악구를 정리·마무리하는 응답 정형(베이스 4-3-2-1)의 이름은?','프린너','"이제 마무리 짓자"는 손짓.'),
mc('긴장을 고조시키며 한 음씩 위로 쌓는 정형은?',['폰테','몬테','콰이에스첸차','메이어'],1,'몬테=산. 상승으로 긴장 고조.')],
task:'모차르트 소나타 K.545 첫 악구에서 마이어/프린너 정형을 찾아보기.'},

{d:9,wk:2,ph:'화성 기초',t:'반음계 화성 I',lead:'온음계 밖의 음을 빌려 색을 더해요. 부속·차용·나폴리·증6.',concept:'<p>온음계(도레미) <b>밖의 음</b>을 빌려 색과 긴장을 더하는 화성이에요. 기능은 대개 유지하되 그늘·경이를 만듭니다.</p><table class="ctbl"><tr><th>화음</th><th>구성·특징</th><th>효과</th></tr><tr><td>부속화음 V/V</td><td>딸림의 딸림 (이차 딸림)</td><td>잠깐 다른 음을 으뜸처럼(토니시제이션)</td></tr><tr><td>차용화음(모달 믹스처)</td><td>반대 모드에서 빌림(장조에 iv·♭VI)</td><td>그늘 · 애수</td></tr><tr><td>나폴리 6화음 ♭II⁶</td><td>2음 반음↓ 장3화음(1전위)</td><td>종지 직전 어둠</td></tr><tr><td>증6화음 It·Fr·Ger</td><td>바깥으로 반음 확장</td><td>V(또는 I6/4)로 강하게 해결</td></tr></table><p><b>해석 · </b>이 화음들은 대부분 <b>도미넌트 또는 그 준비</b>로 기능해요. 특히 독일 증6(Ger⁶)은 소리가 <b>V⁷과 같아서</b> 이명동음 전조의 문이 됩니다. 나폴리·증6은 종지를 극적으로 물들이는 장치예요.</p><div class="cex"><div class="cex-t">🎧 예시 — 부속화음 V/V — 토니시제이션</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[62,66,69,72],[67,71,74],[60,64,67]],0.8)">D7→G→C</button></div><div class="cex-d">D7(V/V)이 G를 잠깐 으뜸음처럼 들리게 해요(F♯의 신선함). 조는 C 그대로인데 색이 열립니다.</div></div><div class="cnote"><b>지휘 함의 · </b>반음계 화음의 <b>낯선 색</b>이 스치는 순간을 살짝 도드라지게, 해결 화음에서 이완. 색의 대비가 드라마입니다.</div>',think:['부속화음은 잠깐 다른 조의 문을 여는 장치예요. 문을 열고 들어가지 않는(해결하지 않는) 부속화음은 어떤 효과를 낼까?','나폴리·증6처럼 어두운 색이 종지 직전에 자주 오는 이유를 기대의 관점에서 설명해보기.'],listen:['슈베르트 「마왕」','반음계가 만드는 공포의 색. 말발굽 리듬 위에서 화성이 조여오는 방식.'],read:[
'부속화음 V/V: 딸림의 딸림 — 잠깐 다른 데 들른 신선함','차용화음: 반대 모드에서 빌림(장조에 단조 iv·♭VI) = 그늘','나폴리 6화음 ♭II⁶: 2음 반음 내린 장3화음, 종지 직전 어둠','증6화음 It·Fr·Ger: 바깥으로 강하게 해결. Ger⁶=V⁷ 소리'],
q:[mc('V/V(부속화음)의 효과는?',['조를 완전히 바꿈','어떤 음을 잠깐 으뜸음처럼 강조','리듬 변화','종지 생략'],1,'토니시제이션 — 잠깐 다른 데 들른 신선함.'),
sa('2음을 반음 내려 만든, 종지 직전의 어두운 장3화음(보통 6화음)은?','나폴리 6화음 (♭II⁶)','베토벤이 즐겨 씀.'),
mc('독일 증6화음(Ger⁶)이 이명동음 전조에 쓰이는 이유는?',['소리가 V⁷과 같아서','근음이 없어서','감화음이라','장화음이라'],0,'Ger⁶ ≡ V⁷ 소리 → 같은 문을 다른 방향으로.')],
task:'C장조에서 V/V(=D7)를 넣어 G를 잠깐 으뜸음처럼 들리게 쳐보기.'},

{d:10,wk:2,ph:'화성 기초',t:'반음계 화성 II',lead:'더 진한 색 — 중3도·공통음 감7·옴니버스.',concept:'<p>더 진한 반음계 색 — <b>기능화성만으로는 안 풀리는</b> 진행들이에요.</p><table class="ctbl"><tr><th>화음/진행</th><th>특징</th></tr><tr><td>반음계 중3도(Chromatic Mediant)</td><td>3도 관계·공통음 적음·색 확 다름 (영화적 경이)</td></tr><tr><td>공통음 감7 (ct°7)</td><td>한 음 공유 감7 · 장식적 긴장</td></tr><tr><td>옴니버스</td><td>바깥 성부가 반음 양방향으로 미끄러짐</td></tr></table><p><b>해석 · </b>C장 ↔ E장처럼 3도 떨어지고 색이 확 열리는 진행은 딸림으로 설명이 안 돼요. 그래서 <b>신리만 변형이론(PLR, 45일)</b>이 이 자리를 메웁니다 — 공통음을 고정점으로, 움직이는 한 음을 변화의 주역으로 보는 관점이에요.</p><div class="cex"><div class="cex-t">🎧 예시 — 반음계 중3도 (C장 → E장)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[60,64,67],[64,68,71]],1.1)">C → E</button></div><div class="cex-d">3도 떨어지고 공통음(미)만 남아 색이 확 열리는 "경이". 영화음악의 신비로운 전환이에요.</div></div><div class="cnote"><b>지휘 함의 · </b>중3도 전환은 <b>색의 문이 갑자기 열리는</b> 순간. 음색·발란스를 확 바꿔 그 경이를 전하세요.</div>',think:['중3도 전환의 경이는 공통음 하나가 버티고 색이 확 바뀌는 데서 와요. 이 원리를 조명·무대 전환에 비유해본다면?','기능화성으로 설명이 안 되는 진행을 만나면 분석가는 무엇을 먼저 물어야 할까?'],listen:['존 윌리엄스 「E.T.」 플라잉 테마','중3도가 열어젖히는 경이 — 자전거가 떠오르는 순간 화성도 함께 떠올라요.'],read:[
'반음계 중3도(Chromatic Mediant): 3도 관계·공통음 적고 색 확 다름(영화의 경이)','공통음 감7 ct°7: 한 음 공유 감7, 장식적 긴장','옴니버스: 바깥성부 반음 양방향으로 미끄러짐','이런 화성은 기능(T-S-D)만으론 안 풀림 → 신리만(45일)로 이어짐'],
q:[mc('C장 ↔ E장처럼 3도 떨어지고 색이 확 다른 관계는?',['부속화음','반음계 중3도','나폴리','시퀀스'],1,'영화음악의 "경이·신비" 전환.'),
sa('한 음을 공유하며 장식적으로 끼어드는 감7화음의 이름은?','공통음 감7화음 (ct°7)','장식적 긴장을 더함.'),
mc('반음계 중3도 진행을 기능 화성으로 설명하기 어려운 이유는?',['너무 단순해서','딸림으로 안 풀리는 3도 이동이라','종지가 없어서','조성이 없어서'],1,'그래서 신리만 변형이론(PLR)이 보완.')],
task:'영화음악에서 3도로 확 열리는 전환을 하나 찾아 어떤 감정인지 메모.'},

{d:11,wk:2,ph:'화성 기초',t:'전조 (Modulation)',lead:'곡 중간에 조가 바뀌는 것. 어떻게 갈아타느냐가 드라마의 분기점.',concept:'<p>곡 중간에 <b>조</b>가 바뀌는 것. 어떻게 갈아타느냐가 드라마의 <b>분기점</b>이에요.</p><table class="ctbl"><tr><th>방식</th><th>방법</th><th>느낌</th></tr><tr><td>온음계 피벗</td><td>공통화음을 경첩으로</td><td>가장 매끄러움</td></tr><tr><td>반음계</td><td>부속·증6로</td><td>갑자기</td></tr><tr><td>이명동음</td><td>같은 소리 다른 이름(Ger⁶=V⁷)</td><td>먼 조 순간이동</td></tr><tr><td>공통음</td><td>한 음만 남기고 점프</td><td>신비</td></tr><tr><td>직접(악구)</td><td>준비 없이 새 조 시작</td><td>팝 후렴 반음 상승</td></tr></table><svg class="cdia" viewBox="0 0 320 108"><rect x="8" y="26" width="120" height="52" rx="9" fill="rgba(111,233,205,.12)" stroke="#6fe9cd" stroke-width="1.5"/><text x="68" y="57" text-anchor="middle" font-size="13" font-weight="800" fill="#6fe9cd">조 A</text><rect x="192" y="26" width="120" height="52" rx="9" fill="rgba(255,133,117,.12)" stroke="#ff8575" stroke-width="1.5"/><text x="252" y="57" text-anchor="middle" font-size="13" font-weight="800" fill="#ff8575">조 B</text><circle cx="160" cy="52" r="26" fill="rgba(162,179,222,.18)" stroke="#a2b3de" stroke-width="1.8"/><text x="160" y="49" text-anchor="middle" font-size="9" fill="#a2b3de">공통</text><text x="160" y="60" text-anchor="middle" font-size="9" fill="#a2b3de">화음</text><path d="M128,52 L136,52" stroke="#a7b4bc" stroke-width="2"/><path d="M184,52 L190,52" stroke="#a7b4bc" stroke-width="2"/><text x="160" y="98" text-anchor="middle" font-size="9.5" fill="#75818b">공통화음을 경첩 삼아 매끄럽게 (피벗 전조)</text></svg><p><b>해석 · </b>전조를 들을 때는 "<b>얼마나 매끄러운가(피벗) vs 갑작(직접)</b>"으로 드라마 강도를 읽어요. <b>근친조</b>(5도권 이웃·나란한조)일수록 자연스럽고, 먼 조일수록 충격입니다. 피벗 화음은 두 조 모두에 속해 경첩 역할을 해요.</p><div class="cex"><div class="cex-t">🎧 예시 — 피벗 전조 C장조 → G장조</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[60,64,67],[69,72,76],[62,66,69,72],[67,71,74]],0.85)">C→Am→D7→G</button></div><div class="cex-d">C(I) → Am(경첩: C의 vi = G의 ii) → D7(G의 V) → G. Am을 경첩 삼아 매끄럽게 G조로 넘어가요.</div></div><div class="cnote"><b>지휘 함의 · </b>전조 지점에서 <b>무게중심·색</b>을 옮기세요. 피벗은 부드럽게 넘기고, 직접 전조는 새 조의 첫 화음을 또렷이 선언하듯.</div>',think:['피벗 전조가 매끄러운 이유는 두 조에 다 속한 화음 때문이에요. 사람 관계에서 피벗 같은 존재를 떠올려 비유를 완성해보기.','먼 조로 갑자기 이동한 곡을 하나 떠올려, 그 순간 몸에서 무엇이 느껴졌는지 적어보기.'],listen:['슈베르트 즉흥곡 G♭장조 D.899-3','조가 미끄러지는 순간의 아득함. 어디서 땅이 바뀌었는지 몸이 먼저 알아차려요.'],read:[
'온음계적(피벗): 공통화음을 경첩으로 — 가장 매끄러움','반음계적: 부속·증6로 갑자기','이명동음: 같은 소리 다른 이름(Ger⁶=V⁷) — 먼 조 순간이동','공통음: 한 음만 남기고 점프','직접·악구: 준비 없이 새 조 시작(팝 후렴 반음 올리기)'],
q:[mc('가장 매끄러운 전조 방식은?',['직접 전조','이명동음','온음계적 피벗','공통음'],2,'두 조 공통화음을 경첩으로 자연스레 갈아탐.'),
sa('팝 마지막 후렴을 반음 올리는 것은 어떤 전조?','직접(악구) 전조','준비 없이 새 조로 시작.'),
mc('Ger⁶을 V⁷로 재해석해 먼 조로 가는 전조는?',['피벗','이명동음','공통음','직접'],1,'같은 소리, 다른 이름 = 순간이동.')],
task:'아는 곡에서 조가 바뀌는 지점을 찾아 어떤 방식(매끄러움/갑작)인지 표시.'},

{d:12,wk:2,ph:'화성 기초',t:'지속음·오스티나토 + 복습',lead:'반복되는 토대 위에 짓기. 그리고 화성 기초 II 점검.',concept:'<p>반복되는 <b>토대</b> 위에 음악을 짓는 기법이에요. 그리고 2주차 전체를 정리합니다.</p><table class="ctbl"><tr><th>기법</th><th>구조</th><th>효과</th></tr><tr><td>페달 포인트</td><td>한 음 길게, 위 화음 자유</td><td>긴장 적재(도미넌트 페달)</td></tr><tr><td>오스티나토</td><td>음형을 집요하게 반복</td><td>최면·축적 (볼레로)</td></tr><tr><td>파사칼리아</td><td>베이스 선율 반복</td><td>변주의 토대</td></tr><tr><td>샤콘느</td><td>화성 순환 반복</td><td>변주의 토대</td></tr></table><div class="cex"><div class="cex-t">🎧 예시 — 도미넌트 페달</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[43,67,71,74],[43,65,69,72],[43,67,71,74],[43,60,64,67]],0.7)">솔 페달 + 위 화음</button></div><div class="cex-d">베이스에 딸림음(솔)을 길게 깔고 위 화음이 자유롭게 움직여요. 해결 직전 긴장이 적재됩니다.</div></div><div class="cnote"><b>2주차 복습 · </b>시퀀스(방향·간격) → 스키마타(관용 정형) → 반음계(부속·차용·나폴리·증6·중3도) → 전조(피벗~직접) → 지속음. 화성의 <b>색과 움직임</b>을 다루는 도구들이에요.</div>',think:['지속음 위에서 화성이 흐려질 때 우리는 무엇을 듣게 될까 — 명상 음악의 드론이 주는 효과와 비교해보기.','오스티나토의 반복이 최면이 되는 경우와 긴장이 되는 경우, 갈림길은 무엇일까?'],listen:['아르보 패르트 「Spiegel im Spiegel」','드론 위에 시간이 고이는 10분 — 명상하듯, 아무것도 기다리지 않고 들어보세요.'],read:[
'페달 포인트: 한 음 길게, 위 화음 자유(토닉/도미넌트 페달)','오스티나토: 음형을 집요하게 반복(볼레로)','바소 오스티나토/그라운드: 베이스 반복 + 윗성부 자유 변주','파사칼리아(베이스 선율 반복) vs 샤콘느(화성 순환 반복)'],
q:[mc('도착 직전 긴장을 적재하는 지속음은?',['토닉 페달','도미넌트 페달','이중 페달','없음'],1,'딸림음을 길게 깔아 해결 직전 긴장.'),
sa('베이스 선율(그라운드) 자체의 반복이 핵심인 바로크 변주형식은?','파사칼리아','샤콘느는 화성 순환이 핵심.'),
mc('시퀀스 하행 5도의 근음 이동은?',['3도씩','5도씩','2도씩','반음씩'],1,'복습: 하행 5도 = 가장 강한 추진.')],
task:'토닉 페달 위에 화음 3~4개를 바꿔 쳐보고 "버티는 긴장감"을 느끼기.'},

// ── 3주: 선율·대위 ──
{d:13,wk:3,ph:'선율·대위',t:'동기·선율 전개',lead:'짧은 씨앗(동기) 하나가 변형되며 곡 전체로 자라요.',concept:'<p>짧은 씨앗인 <b>동기</b> 하나가 여러 방식으로 <b>변형</b>되며 곡 전체로 자라요. <b>반복</b>은 통일성을, <b>변형</b>은 발전을 줍니다.</p><table class="ctbl"><tr><th>변형</th><th>설명</th></tr><tr><td>반복</td><td>그대로 다시</td></tr><tr><td>시퀀스</td><td>음정은 유지, 위치만 이동</td></tr><tr><td>전위(inversion)</td><td>방향 뒤집기 (올라가던 걸 내려가게)</td></tr><tr><td>역행(retrograde)</td><td>거꾸로 (끝에서 처음으로)</td></tr><tr><td>확대(augmentation)</td><td>음가를 2배로 늘림</td></tr><tr><td>축소(diminution)</td><td>음가를 절반으로</td></tr><tr><td>분할(fragmentation)</td><td>동기의 일부만 떼어 발전</td></tr></table><p><b>해석 · </b>베토벤 5번의 "따따따딴" 하나가 곡 전체를 짓는 원리예요. 마무리엔 특징을 조금씩 덜어내는 <b>청산(liquidation)</b>으로 긴장을 풀어요. "이 선율이 아까 그 동기의 무슨 변형인가?"를 늘 물으세요.</p><div class="cex"><div class="cex-t">🎧 예시 — 동기와 변형 (선율)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playMel([60,62,64],0.4)">원형 (도레미)</button><button class="cex-b" onclick="ac();playMel([60,58,56],0.4)">전위</button><button class="cex-b" onclick="ac();playMel([64,62,60],0.4)">역행</button><button class="cex-b" onclick="ac();playMel([60,62,64],0.85)">확대</button></div><div class="cex-d">도-레-미(원형) → 방향 뒤집기(전위) → 거꾸로(역행) → 음가 2배(확대). 같은 씨앗의 변형을 들어보세요.</div></div><div class="cnote"><b>지휘 함의 · </b>동기가 <b>어디서 어떻게 변형</b>되는지 알면 그 순간을 부각할 수 있어요. 확대는 넓게, 축소는 조이며 그 성격을 몸짓으로.</div>',think:['동기 하나로 곡 전체를 짓는 것과 선율을 계속 새로 쓰는 것 — 통일성과 다양성의 균형점은 어디일까?','좋아하는 곡의 핵심 동기를 하나 뽑아, 일곱 변형 중 무엇이 실제로 쓰였는지 추적해보기.'],listen:['베토벤 교향곡 5번 1악장','네 개의 음이 곡 전체가 되는 기적. 동기를 세지 말고 파도처럼 맞으세요.'],read:[
'변형: 반복·시퀀스·전위(방향 뒤집기)·역행(거꾸로)·확대(늘림)·축소(줄임)·분할','청산(쇤베르크): 특징 덜어내며 마무리','전개적 변주(브람스): 조금씩 계속 바꿈','포르트슈피눙: 짧은 동기를 실 잣듯 길게(바로크)'],
q:[mc('음정 방향을 위아래로 뒤집는 변형은?',['역행','전위','확대','분할'],1,'전위=inversion. 올라가던 걸 내려가게.'),
sa('음가를 2배로 늘려 동기를 느리게 펼치는 변형은?','확대 (Augmentation)','축소는 반대(음가 절반).'),
mc('베토벤 5번 "따따따딴"처럼 한 동기로 곡을 키우는 원리는?',['우연성','동기 전개','아이소리듬','헤테로포니'],1,'작은 동기를 여러 방식으로 변형·발전.')],
task:'베토벤 5번 1악장 첫 동기가 어떻게 변형되는지 3군데 찾아 표시.'},

{d:14,wk:3,ph:'선율·대위',t:'악구 구조',lead:'선율이 어떻게 문장처럼 짜이는가 — 악절·문장·하이퍼미터.',concept:'<p>선율이 <b>문장</b>처럼 짜이는 방식이에요. 두 대표 틀 — 악절과 문장 — 을 구별하는 게 프레이징의 기초입니다.</p><table class="ctbl"><tr><th>틀</th><th>구조</th><th>느낌</th></tr><tr><td>악절(Period)</td><td>선행구(반종지) + 후속구(정격종지)</td><td>질문 → 대답</td></tr><tr><td>문장(Sentence)</td><td>기본악상 → 반복 → 전개·종지</td><td>제시 → 몰아 마침</td></tr><tr><td>하이퍼미터</td><td>마디들의 상위 강·약 주기(보통 4마디)</td><td>큰 박·호흡 단위</td></tr></table><svg class="cdia" viewBox="0 0 320 104"><text x="160" y="18" text-anchor="middle" font-size="10" fill="#a7b4bc">악절(Period) = 질문 + 대답</text><rect x="12" y="30" width="140" height="40" rx="9" fill="rgba(162,179,222,.14)" stroke="#a2b3de" stroke-width="1.5"/><text x="82" y="55" text-anchor="middle" font-size="12" font-weight="700" fill="#a2b3de">선행구 (질문)</text><rect x="168" y="30" width="140" height="40" rx="9" fill="rgba(111,233,205,.14)" stroke="#6fe9cd" stroke-width="1.5"/><text x="238" y="55" text-anchor="middle" font-size="12" font-weight="700" fill="#6fe9cd">후속구 (대답)</text><text x="82" y="92" text-anchor="middle" font-size="10" fill="#ff8575" font-weight="700">반종지 HC ↗</text><text x="238" y="92" text-anchor="middle" font-size="10" fill="#6fe9cd" font-weight="700">정격종지 PAC ✓</text></svg><p><b>해석 · </b>악절은 <b>대칭적 질문·대답</b>(4+4), 문장은 <b>앞은 짧게 두 번, 뒤는 길게 몰아</b>가는 비대칭이에요. 8마디를 만나면 먼저 이 둘 중 무엇인지 판별하면 어디서 숨 쉬고 어디로 몰지가 보여요.</p><div class="cnote"><b>지휘 함의 · </b>선행구 끝(반종지)은 <b>열린 채</b> 이어지는 제스처로, 후속구 끝(정격)은 <b>닫는</b> 커트오프로. 하이퍼미터의 큰 박을 몸으로 느끼며 프레이징하세요.</div>',think:['악절(질문–대답)과 문장(몰아가기)은 서로 다른 말하기예요. 연설·시·대화 중 각각 무엇에 가까울까?','7마디·9마디 악구를 만나면 어떤 효과가 날까? 어디가 늘거나 줄었는지 어떻게 찾을까?'],listen:['모차르트 피아노 소나타 K.545 1악장','질문과 대답의 대화 — 두 사람의 말소리처럼 들어보세요.'],read:[
'악절(Period): 선행구(질문·반종지) + 후속구(답·정격종지)','문장(Sentence): 기본악상→반복→전개·종지(앞 짧게 두 번, 뒤 몰아 마침)','하이퍼미터: 마디들이 모여 상위 강·약 주기(보통 4마디=큰 박)','캐플린 형식기능(32일)과 직결'],
q:[mc('선행구가 반종지로 묻고 후속구가 정격종지로 답하는 구조는?',['문장','악절','시퀀스','하이퍼미터'],1,'Period = 질문+대답 한 쌍.'),
sa('마디들이 모여 이루는 큰 강·약 주기(보통 4마디)를 뭐라 하나?','하이퍼미터','"큰 박". 프레이징·호흡의 단위.'),
mc('문장(Sentence)의 전형적 구조는?',['질문+대답','기본악상→반복→전개·종지','반복만','종지만'],1,'앞은 짧게 두 번, 뒤는 길게 몰아 마침.')],
task:'가곡 한 곡의 첫 8마디가 악절인지 문장인지 판별.'},

{d:15,wk:3,ph:'선율·대위',t:'비화성음 I',lead:'화음에 안 속한 음이 선율의 표정을 만들어요. 오늘은 경과·보조·계류.',concept:'<p>화음에 <b>속하지 않는 음</b>이 어떻게 들어왔다 빠지는가가 선율의 표정을 만들어요. <b>접근·해결 방식</b>과 <b>박 위치</b>로 종류가 갈립니다. 오늘은 경과·보조·계류.</p><table class="ctbl"><tr><th>비화성음</th><th>접근→해결</th><th>박</th><th>느낌</th></tr><tr><td>경과음</td><td>순차 → 순차(같은 방향)</td><td>약박</td><td>매끄럽게 지나감</td></tr><tr><td>보조음</td><td>순차 → 순차(되돌아옴)</td><td>약박</td><td>옆집에 잠깐</td></tr><tr><td>계류음 ★</td><td>앞 화음 붙듦 → 순차 하행</td><td>강박</td><td>불협의 찡함</td></tr></table><p><b>해석 · </b><b>계류음</b>이 핵심이에요. <b>준비(앞 화음 음 유지) → 걸림(강박에서 불협) → 해결(순차 하행)</b>의 3단계로, 4-3·7-6·9-8 유형이 대표적. 합창 종지의 찡한 순간이 바로 이 계류예요. 경과·보조는 약박의 장식이라 가볍게 흐릅니다.</p><div class="cex"><div class="cex-t">🎧 예시 — 계류음 4–3 해결</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[67,72,74],[67,71,74]],1.15)">Gsus4 → G</button></div><div class="cex-d">4음(도)이 강박에 걸렸다가 3음(시)으로 순차 하행 해결. 걸림→해결의 찡한 순간이에요.</div></div><div class="cnote"><b>지휘 함의 · </b>계류음의 <b>걸림</b>에 살짝 무게를, <b>해결</b>에 이완을 주면 그 표현이 살아요. 경과·보조는 흐름을 끊지 말고 지나가게.</div>',think:['계류음의 찡함은 걸림과 해결 사이의 시간에서 와요. 그 시간을 지휘자가 늘이거나 줄이면 표현은 어떻게 달라질까?','불협이 아름답게 들리는 조건은 무엇일까 — 준비·해결·문맥 중 무엇이 결정적일까?'],listen:['바버 「현을 위한 아다지오」','계류가 걸릴 때마다 조여오는 가슴, 풀릴 때의 숨. 걸림과 해결 사이에서 살아보세요.'],read:[
'경과음: 두 화음음 사이 순차로 지나감(약박) — 매끄럽게','보조음: 옆음 갔다 되돌아옴(약박) — 옆집에 잠깐','계류음 ★: 앞 화음 붙듦→강박 불협→순차 하행 해결(4-3·7-6·9-8)','계류음 3단계: 준비→걸림→해결. 합창의 찡한 순간'],
q:[mc('강박에서 불협으로 걸렸다 순차 하행으로 푸는 비화성음은?',['경과음','보조음','계류음','선행음'],2,'준비→걸림→해결. 표현의 핵심.'),
sa('두 화음음 사이를 순차로 지나가며 빈칸을 채우는 약박 음은?','경과음','도-(레)-미의 "레".'),
mc('계류음의 대표 걸림 유형이 아닌 것은?',['4-3','7-6','9-8','5-1'],3,'4-3·7-6·9-8·2-3(베이스)이 대표.')],
task:'합창곡 종지에서 계류음(걸렸다 풀리는 음) 하나를 찾아 3단계 표시.'},

{d:16,wk:3,ph:'선율·대위',t:'비화성음 II',lead:'전타·이탈·선행·자유음. 각각 다른 표정.',concept:'<p>나머지 비화성음 — 각기 다른 표정을 만들어요.</p><table class="ctbl"><tr><th>비화성음</th><th>접근→해결</th><th>박</th><th>느낌</th></tr><tr><td>전타음(앞꾸밈)</td><td>도약 → 순차</td><td>강박</td><td>탄식·한숨</td></tr><tr><td>이탈음</td><td>순차 → 도약(반대)</td><td>약박</td><td>디뎠다 도망</td></tr><tr><td>선행음</td><td>순차/도약 → 유지</td><td>약박</td><td>도착 한 박 먼저</td></tr><tr><td>지연음</td><td>유지 → 순차 상행</td><td>강박</td><td>이끔음의 늦은 해결</td></tr></table><p><b>해석 · </b><b>전타음</b>은 준비 없이 강박에 도약으로 나타나 순차로 풀리는 애잔한 음(모차르트의 한숨)이에요. <b>지연음</b>은 계류음과 원리가 같지만 <b>위로(상행)</b> 풀려 종지에서 이끔음이 으뜸음으로 늦게 올라갈 때 씁니다.</p><div class="cex"><div class="cex-t">🎧 예시 — 전타음 (앞꾸밈)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[60,64,65],[60,64,64]],1.0)">F(앞꾸밈) → E</button></div><div class="cex-d">강박에 도약으로 들어온 F가 E로 순차 해결 — 준비 없는 탄식의 강박음이에요.</div></div><div class="cnote"><b>지휘 함의 · </b>전타음(강박 한숨)은 <b>기대듯 얹었다 떨구는</b> 제스처로. 선행음은 도착을 미리 예고하니 다음 박을 준비하는 신호로 읽으세요.</div>',think:['전타음(한숨)이 한 번이면 탄식, 반복되면 애원이 돼요. 반복 횟수가 정서를 바꾸는 다른 예를 찾아보기.','비화성음을 모두 걷어낸 선율은 어떤 얼굴일까? 장식이 본질을 가릴 수도 있을까?'],listen:['모차르트 교향곡 40번 1악장','한숨 음형의 연쇄 — 탄식인지 체념인지, 오늘의 내 마음이 정해줄 거예요.'],read:[
'전타음(앞꾸밈): 강박에 도약으로 들어와 순차 해결, 준비 없음 — 탄식·한숨','이탈음: 순차로 들어와 반대 방향 도약(약박) — 한 발 디뎠다 도망','선행음: 다음 화음 음 미리 당김(약박) — 도착 한 박 먼저','지연음: 계류음의 상행 해결 버전(이끔음→으뜸)'],
q:[mc('준비 없이 강박에 도약으로 나타나 "탄식"을 주는 음은?',['경과음','전타음','보조음','선행음'],1,'모차르트의 애잔한 강박음.'),
sa('계류음과 원리는 같지만 위(상행)로 푸는 비화성음은?','지연음 (Retardation)','종지에서 이끔음이 으뜸음으로 늦게 올라갈 때.'),
mc('순차로 들어와 반대 방향으로 도약해 빠지는 음은?',['이탈음','계류음','전타음','경과음'],0,'옆으로 디뎠다 훌쩍 건너뜀(약박).')],
task:'모차르트 느린 악장에서 전타음(강박 한숨)을 찾아 표시.'},

{d:17,wk:3,ph:'선율·대위',t:'대위·모방·캐논',lead:'독립 선율 둘 이상이 규칙 있게 얽히는 기술.',concept:'<p>둘 이상의 <b>독립 선율</b>이 규칙 있게 얽히는 기술이에요. 각 선율이 살아 있으면서도 어울리게 짜는 것이 대위법입니다.</p><table class="ctbl"><tr><th>기법</th><th>설명</th></tr><tr><td>캐논</td><td>선행을 후행이 시간차로 모방 (돌림노래)</td></tr><tr><td>반행(전위) 캐논</td><td>위아래를 뒤집어 따라감 (거울)</td></tr><tr><td>역행 캐논</td><td>거꾸로 따라감 (게걸음)</td></tr><tr><td>스트레토</td><td>진입 간격을 좁혀 겹침 (절정)</td></tr><tr><td>전위 대위법</td><td>상하 성부를 바꿔도 성립 (8·10·12도)</td></tr></table><svg class="cdia" viewBox="0 0 320 104"><text x="160" y="16" text-anchor="middle" font-size="10" fill="#a7b4bc">캐논 = 시간차 모방(돌림노래)</text><rect x="16" y="30" width="250" height="24" rx="6" fill="rgba(111,233,205,.14)" stroke="#6fe9cd" stroke-width="1.3"/><text x="24" y="47" font-size="10" font-weight="700" fill="#6fe9cd">성부 1 (선행) ▶ 주제…</text><rect x="66" y="62" width="250" height="24" rx="6" fill="rgba(162,179,222,.14)" stroke="#a2b3de" stroke-width="1.3"/><text x="74" y="79" font-size="10" font-weight="700" fill="#a2b3de">성부 2 (후행) ▶ 같은 주제…</text><line x1="66" y1="30" x2="66" y2="86" stroke="#75818b" stroke-dasharray="3 3"/><text x="70" y="100" font-size="9" fill="#75818b">← 한 마디 뒤 진입(시간차)</text></svg><p><b>해석 · </b>대위의 목표는 <b>수평(각 선율의 노래됨)</b>과 <b>수직(동시에 울릴 때의 어울림)</b>을 동시에 만족시키는 것. 스트레토는 주제 진입을 바짝 좁혀 긴박감을 쌓아요.</p><div class="cex"><div class="cex-t">🎧 예시 — 모방 (주제 + 응답)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playMel([60,62,64,65,67],0.34)">주제</button><button class="cex-b" onclick="ac();playMel([67,69,71,72,74],0.34)">응답 (5도 위)</button></div><div class="cex-d">응답은 주제를 5도 위에서 받아요. 실제 캐논은 이 둘이 시간차로 겹쳐 울립니다.</div></div><div class="cnote"><b>지휘 함의 · </b>모방 <b>진입</b>을 큐로 또렷이 짚어 주면 청중이 "지금 저 성부가 주제를 받았다"를 들어요. 각 성부의 독립성을 발란스로 살리세요.</div>',think:['같은 선율로 얽히는 캐논과 자유 대위 — 통제와 자유의 차이가 소리에 어떻게 드러날까?','돌림노래의 즐거움의 정체는 무엇일까 — 예측? 겹침? 협동?'],listen:['바흐 인벤션 1번','두 목소리가 서로의 말을 듣는 방식. 한 번은 위만, 한 번은 아래만 따라가보세요.'],read:[
'캐논: 선행을 후행이 시간차로 모방(돌림노래)','반행(거울)/역행(게걸음)/확대·축소 캐논','모방: 느슨한 모방 / 스트레토: 진입 간격 좁혀 절정','전위 대위법: 상하 성부 바꿔도 성립(8·10·12도)'],
q:[mc('선율의 위아래를 뒤집어 따라가는 캐논은?',['역행 캐논','반행(전위) 캐논','확대 캐논','무한 캐논'],1,'거울 캐논. 올라가면 내려감.'),
sa('푸가 절정에서 주제 진입 간격을 바짝 좁혀 겹치는 기법은?','스트레토','"좁힘". 긴박감을 만듦.'),
mc('상하 성부를 서로 바꿔도 음악이 성립하게 짜는 기술은?',['정선율','전위 대위법','정량 캐논','포부르동'],1,'이중·삼중 대위(8·10·12도 전위).')],
task:'"Frère Jacques"를 2성부 돌림노래로 겹쳐 불러 캐논을 체험.'},

{d:18,wk:3,ph:'선율·대위',t:'푸가 + 복습',lead:'모방 대위의 꽃, 푸가. 그리고 선율·대위 점검.',concept:'<p><b>푸가</b>는 모방 대위의 꽃이에요. 하나의 주제가 여러 성부를 오가며 짜입니다. 그리고 3주차를 정리합니다.</p><table class="ctbl"><tr><th>용어</th><th>뜻</th></tr><tr><td>주제(Subject)</td><td>첫 제시 선율</td></tr><tr><td>응답(Answer)</td><td>5도 위에서 받음 (실음/조성)</td></tr><tr><td>대주제(Countersubject)</td><td>주제에 늘 붙는 대선율</td></tr><tr><td>간주부(Episode)</td><td>주제 없이 잇는 경과</td></tr><tr><td>스트레토</td><td>주제 겹침으로 절정</td></tr></table><div class="cnote"><b>3주차 복습 · </b>동기 전개(변형) → 악구 구조(악절/문장) → 비화성음(경과·보조·계류·전타·이탈·선행·지연) → 대위·캐논 → 푸가. <b>선율이 짜이고 얽히는</b> 원리들이에요.</div>',think:['스트레토는 주제 진입을 좁혀 절정을 만들어요. 대화에서 말이 겹치기 시작하는 순간과 비교해보기.','주제가 성부들을 여행하는 푸가를 하나의 이야기로 읽는다면 주인공·갈등·해소는 각각 무엇일까?'],listen:['바흐 평균율 1권 c단조 푸가','주제가 성부들을 여행할 때, 떠나보내고 마중하는 마음으로.'],read:[
'푸가 용어: 주제(Subject)·응답(5도 위, 실음/조성)·대주제·간주부','페달·스트레토로 절정','복습: 동기 변형·악구 구조·비화성음·캐논','종족 대위법(1~5종, 푹스)·정선율(빌려온 고정선율)'],
q:[mc('푸가에서 주제를 5도 위에서 받는 것은?',['대주제','응답','간주부','스트레토'],1,'Answer. 실음(Real)/조성(Tonal)으로 나뉨.'),
sa('푸가에서 주제 없이 이어주는 경과 구간의 이름은?','간주부 (Episode)','주제 사이를 잇는 구간.'),
mc('경과음의 박 위치는?',['강박','약박','상관없음','첫 박만'],1,'복습: 경과·보조·이탈=약박, 계류·전타=강박.'),
sa('대위를 얹는 토대가 되는 빌려온 고정 선율은?','정선율 (Cantus firmus)','흔히 성가.')],
task:'바흐 인벤션 한 곡에서 주제가 다른 성부로 모방되는 지점을 찾기.'},

{d:19,wk:4,ph:'리듬·짜임새',t:'리듬 기법 I',lead:'박·리듬이 규칙과 어긋나며 추진력을 만들어요.',concept:'<p>박·리듬이 규칙(<b>박자</b>)과 어떻게 <b>어긋나는가</b>가 추진력과 긴장을 만들어요. 어긋남이 곧 에너지입니다.</p><table class="ctbl"><tr><th>기법</th><th>설명</th><th>효과</th></tr><tr><td>당김음(싱코페이션)</td><td>약박을 강조</td><td>추진 · 재즈감</td></tr><tr><td>헤미올라</td><td>3박 두 마디를 2박 세 덩어리로(2:3)</td><td>바로크 종지 · 왈츠</td></tr><tr><td>폴리리듬</td><td>다른 박자 그룹 동시(3 대 2)</td><td>긴장 · 복합</td></tr><tr><td>확대·축소</td><td>리듬 통째 느리게/빠르게</td><td>변형 · 발전</td></tr></table><svg class="cdia" viewBox="0 0 320 118"><text x="160" y="15" text-anchor="middle" font-size="10" fill="#a7b4bc">헤미올라 = 같은 6박을 다르게 묶기 (2:3)</text><rect x="10" y="46" width="46" height="30" rx="4" fill="var(--surface2)" stroke="#75818b"/><text x="33" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#dbe4e8">1</text><rect x="60" y="46" width="46" height="30" rx="4" fill="var(--surface2)" stroke="#75818b"/><text x="83" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#dbe4e8">2</text><rect x="110" y="46" width="46" height="30" rx="4" fill="var(--surface2)" stroke="#75818b"/><text x="133" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#dbe4e8">3</text><rect x="160" y="46" width="46" height="30" rx="4" fill="var(--surface2)" stroke="#75818b"/><text x="183" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#dbe4e8">4</text><rect x="210" y="46" width="46" height="30" rx="4" fill="var(--surface2)" stroke="#75818b"/><text x="233" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#dbe4e8">5</text><rect x="260" y="46" width="46" height="30" rx="4" fill="var(--surface2)" stroke="#75818b"/><text x="283" y="66" text-anchor="middle" font-size="12" font-weight="700" fill="#dbe4e8">6</text><path d="M10,40 L156,40" stroke="#6fe9cd" stroke-width="2"/><path d="M160,40 L306,40" stroke="#6fe9cd" stroke-width="2"/><text x="83" y="34" text-anchor="middle" font-size="9" fill="#6fe9cd">정상: 3+3</text><text x="233" y="34" text-anchor="middle" font-size="9" fill="#6fe9cd"> </text><path d="M10,82 L106,82" stroke="#ff8575" stroke-width="2"/><path d="M110,82 L206,82" stroke="#ff8575" stroke-width="2"/><path d="M210,82 L306,82" stroke="#ff8575" stroke-width="2"/><text x="160" y="98" text-anchor="middle" font-size="9.5" fill="#ff8575" font-weight="700">헤미올라: 2+2+2</text></svg><p><b>해석 · </b><b>헤미올라</b>는 같은 6박을 3+3(정상)에서 2+2+2(헤미올라)로 <b>재해석</b>하는 거예요. 바로크·왈츠에서 <b>종지 직전</b>에 자주 나타나 "브레이크를 밟듯" 마무리를 예고합니다.</p><div class="cnote"><b>지휘 함의 · </b>헤미올라 구간은 3박 곡이라도 <b>2박으로 느껴</b> 지휘하세요. 당김음은 약박의 무게를 살려 추진을 놓치지 않게.</div>',think:['헤미올라는 같은 시간을 다르게 묶는 착청이에요. 시각의 착시와 어디가 같고 어디가 다를까?','당김음이 추진이 되는 이유를 기대의 어긋남으로 설명해보기 — 어긋남이 계속되면 새 규칙이 될까?'],listen:['번스타인 「웨스트 사이드 스토리」 중 아메리카','헤미올라의 춤 — 내 몸이 6을 어떻게 묶는지, 묶음이 바뀌는 순간의 짜릿함.'],read:[
'당김음: 약박 강조로 어긋남 — 추진·재즈감','헤미올라: 3박 2마디를 2박 3덩어리로(2:3) — 바로크 종지·왈츠','교차/폴리리듬: 다른 박자 그룹 동시(3 대 2)','확대·축소: 리듬 통째 느리게/빠르게'],
q:[mc('3박 두 마디를 2박 세 덩어리로 재해석하는 것은?',['당김음','헤미올라','폴리리듬','아이소리듬'],1,'2:3 재해석. 바로크 종지·왈츠에서 흔함.'),
sa('센박 대신 약박을 강조해 리듬을 어긋나게 하는 기법은?','당김음(싱코페이션)','추진력·재즈감.'),
mc('3 대 2처럼 다른 박자 그룹이 동시에 울리는 것은?',['헤미올라','폴리리듬','당김음','확대'],1,'교차리듬/폴리리듬.')],
task:'왈츠 종지에서 헤미올라(2:3)를 손뼉으로 쳐보기.'},

{d:20,wk:4,ph:'리듬·짜임새',t:'리듬 기법 II',lead:'중세부터 현대까지 — 아이소·가산·메트릭 모듈레이션.',concept:'<p>중세부터 현대까지의 리듬 조직 방식들이에요.</p><table class="ctbl"><tr><th>기법</th><th>설명</th></tr><tr><td>아이소리듬</td><td>탈레아(반복 리듬형)+콜로르(반복 음형)를 따로 겹침 (중세)</td></tr><tr><td>가산 리듬</td><td>2+2+3처럼 불규칙 묶음을 더함 (발칸·현대)</td></tr><tr><td>메트릭 모듈레이션</td><td>음표를 매개로 템포를 매끄럽게 바꿔치기 (엘리엇 카터)</td></tr><tr><td>리듬 변위</td><td>같은 패턴을 박 위치만 밀어 어긋나게</td></tr></table><p><b>해석 · </b><b>가산 리듬</b>은 균등한 박이 아니라 작은 묶음(2·3)을 더해 만들어요. 7/8 = 2+2+3처럼요. <b>메트릭 모듈레이션</b>은 셋잇단의 한 음을 새 박으로 삼아 템포를 자연스럽게 갈아탑니다.</p><div class="cnote"><b>지휘 함의 · </b>가산 리듬(7/8=2+2+3)은 <b>묶음 단위</b>로 크게 지휘하세요 — 낱박이 아니라 2·2·3의 세 덩어리로. 그래야 연주자가 그루브를 탑니다.</div>',think:['7/8(2+2+3)의 절뚝임이 그루브가 되는 순간은 언제일까 — 불규칙이 몸에 익는다는 것의 의미는?','메트릭 모듈레이션은 템포의 피벗 전조예요. 11일차 전조와 원리를 비교해 공통 구조를 찾아보기.'],listen:['스트라빈스키 「봄의 제전」 중 희생의 춤','불규칙 리듬이 깨우는 원초적인 몸의 반응. 세지 말고 부딪히세요.'],read:[
'아이소리듬: 반복 리듬형(탈레아)+반복 음형(콜로르) 따로 겹침(중세)','가산 리듬: 2+2+3 불규칙 묶음(발칸·현대)','메트릭 모듈레이션(카터): 음표 매개로 템포 매끄럽게 바꿔치기','리듬 변위: 같은 패턴을 박 위치만 밀어 어긋나게'],
q:[mc('셋잇단의 한 음을 새 박으로 삼아 템포를 바꾸는 기법은?',['아이소리듬','메트릭 모듈레이션','가산 리듬','헤미올라'],1,'엘리엇 카터. 음표를 매개로 템포 전환.'),
sa('2+2+3처럼 불규칙 묶음을 더해 박을 만드는 것은?','가산 리듬 (Additive rhythm)','발칸·현대음악.'),
mc('중세 기법으로 탈레아와 콜로르를 따로 돌려 겹치는 것은?',['가산 리듬','아이소리듬','폴리리듬','당김음'],1,'반복 리듬형+반복 음형.')],
task:'7/8(2+2+3)을 손뼉으로 두 마디 쳐보기.'},

{d:21,wk:4,ph:'리듬·짜임새',t:'짜임새 (Texture)',lead:'성부들이 어떤 관계로 얽히는가. 발란스 설계의 출발.',concept:'<p>성부(층)들이 서로 <b>어떤 관계로 얽히는가</b>예요. 이걸 알아야 "어느 성부를 들리게 할지"인 발란스를 설계해요.</p><table class="ctbl"><tr><th>짜임새</th><th>구조</th><th>예</th></tr><tr><td>모노포니</td><td>선율 하나 (반주 없음)</td><td>그레고리오 성가</td></tr><tr><td>호모포니</td><td>주선율 + 화음 반주</td><td>가곡 · 찬송가</td></tr><tr><td>폴리포니</td><td>독립 선율 둘 이상 얽힘</td><td>바흐 푸가</td></tr><tr><td>헤테로포니</td><td>같은 선율을 각자 조금씩 다르게</td><td>민속 합주</td></tr></table><svg class="cdia" viewBox="0 0 320 150"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">짜임새 4종 — 성부가 얽히는 방식</text><text x="45" y="34" text-anchor="middle" font-size="9" fill="#6fe9cd" font-weight="700">모노포니</text><path d="M12,52 Q30,44 48,52 T84,50" fill="none" stroke="#6fe9cd" stroke-width="2"/><text x="127" y="34" text-anchor="middle" font-size="9" fill="#a2b3de" font-weight="700">호모포니</text><path d="M94,48 Q112,40 130,48 T166,46" fill="none" stroke="#a2b3de" stroke-width="2"/><line x1="98" y1="62" x2="162" y2="62" stroke="#75818b" stroke-width="1.5" stroke-dasharray="5 3"/><line x1="98" y1="70" x2="162" y2="70" stroke="#75818b" stroke-width="1.5" stroke-dasharray="5 3"/><text x="45" y="98" text-anchor="middle" font-size="9" fill="#f5d18f" font-weight="700">폴리포니</text><path d="M12,116 Q30,106 48,116 T84,112" fill="none" stroke="#f5d18f" stroke-width="1.8"/><path d="M12,128 Q34,136 52,126 T84,130" fill="none" stroke="#f5d18f" stroke-width="1.8" opacity=".7"/><text x="127" y="98" text-anchor="middle" font-size="9" fill="#ff8575" font-weight="700">헤테로포니</text><path d="M94,116 Q112,108 130,116 T166,114" fill="none" stroke="#ff8575" stroke-width="1.8"/><path d="M94,120 Q114,110 132,120 T166,118" fill="none" stroke="#ff8575" stroke-width="1.8" opacity=".6" stroke-dasharray="2 2"/></svg><p><b>해석 · </b>한 곡은 짜임새가 <b>계속 바뀌어요</b> — 호모포니로 시작해 발전부에서 폴리포니로 조밀해지듯. "지금 이 부분은 호모? 폴리?"를 늘 물으면 주선율과 반주의 위계가 보입니다.</p><div class="cnote"><b>지휘 함의 · </b>짜임새 파악 = <b>발란스 설계</b>. 호모포니는 주선율을 띄우고, 폴리포니는 각 성부의 진입을 큐로 살려 독립성을 들려주세요.</div>',think:['호모포니에서 폴리포니로 바뀌는 순간 청중의 주의는 어떻게 재배치될까?','헤테로포니의 살아있음의 정체는 무엇일까 — 완벽한 유니즌과 비교해보기.'],listen:['라벨 「볼레로」','같은 선율 위로 층이 쌓이고 색이 두꺼워지는 15분 — 피부로 느끼는 크레셴도.'],read:[
'모노포니: 선율 하나(옥타브 유니즌 포함)','호모포니: 주선율+화음 반주 / 코랄(동음형 SATB)','폴리포니: 독립 선율 둘+ 얽힘(푸가)','헤테로포니: 같은 선율을 각자 조금씩 다르게','한 곡 안에서 계속 바뀜 → "지금 호모/폴리?" 늘 의식'],
q:[mc('주선율 하나 + 화음 반주 짜임새는?',['모노포니','호모포니','폴리포니','헤테로포니'],1,'대부분의 가요·가곡·찬송가.'),
sa('독립 선율 둘 이상이 동시에 얽히는 짜임새는?','폴리포니(다성)','바흐 푸가·돌림노래. 대위법으로 만듦.'),
mc('짜임새를 파악하는 것이 지휘에 중요한 이유는?',['템포 결정','어느 성부를 들리게 할지(발란스)','조성 파악','종지 찾기'],1,'발란스 = 지금 어느 층을 들리게 할까.')],
task:'좋아하는 곡 한 구간의 짜임새(호모/폴리)를 판별하고 주선율 악기를 표시.'},

{d:22,wk:4,ph:'리듬·짜임새',t:'화성 리듬·화성색',lead:'화음이 바뀌는 속도와 배치의 색. 표현의 숨은 축.',concept:'<p>화음이 <b>바뀌는 속도</b>(화성 리듬)와 <b>배치의 색</b>(보이싱)은 표현의 숨은 축이에요.</p><table class="ctbl"><tr><th>요소</th><th>내용</th></tr><tr><td>화성 리듬</td><td>화음 교체 속도 — 느림=장중, 빠름=긴장. 종지 직전 가속</td></tr><tr><td>밀집/개방 보이싱</td><td>뭉침·두꺼움 vs 투명·공간감</td></tr><tr><td>음역</td><td>저음역 밀집=탁함(머드) → 넓게 벌려야 명료</td></tr><tr><td>음색선율</td><td>같은 음을 악기 바꿔가며 = 색이 곧 선율(쇤베르크)</td></tr></table><svg class="cdia" viewBox="0 0 320 108"><text x="160" y="14" text-anchor="middle" font-size="10" fill="#a7b4bc">화성 리듬 = 화음이 바뀌는 속도</text><text x="12" y="40" font-size="9" fill="#6fe9cd" font-weight="700">느림 (장중)</text><rect x="12" y="46" width="144" height="22" rx="4" fill="rgba(111,233,205,.2)" stroke="#6fe9cd"/><rect x="160" y="46" width="144" height="22" rx="4" fill="rgba(162,179,222,.2)" stroke="#a2b3de"/><text x="84" y="61" text-anchor="middle" font-size="9" fill="#dbe4e8">화음 1</text><text x="232" y="61" text-anchor="middle" font-size="9" fill="#dbe4e8">화음 2</text><text x="12" y="88" font-size="9" fill="#ff8575" font-weight="700">빠름 (긴장·가속)</text><rect x="12" y="94" width="70" height="10" rx="3" fill="rgba(255,133,117,.2)" stroke="#ff8575"/><rect x="86" y="94" width="70" height="10" rx="3" fill="rgba(255,133,117,.2)" stroke="#ff8575"/><rect x="160" y="94" width="70" height="10" rx="3" fill="rgba(255,133,117,.2)" stroke="#ff8575"/><rect x="234" y="94" width="70" height="10" rx="3" fill="rgba(255,133,117,.2)" stroke="#ff8575"/></svg><p><b>해석 · </b><b>화성 리듬</b>은 곡의 호흡 속도예요. 느린 화성은 넓고 장중하게, 빠른 화성은 활발·긴장되게 들려요. 종지 직전에 화음 교체가 빨라지며 도착으로 몰아가는 것이 흔한 문법입니다.</p><div class="cex"><div class="cex-t">🎧 예시 — 화성 리듬 (느림 vs 빠름)</div><div class="cex-btns"><button class="cex-b" onclick="ac();playSeq([[60,64,67],[60,64,67],[67,71,74],[67,71,74]],0.5)">느림</button><button class="cex-b" onclick="ac();playSeq([[60,64,67],[65,69,72],[67,71,74],[57,60,64]],0.5)">빠름</button></div><div class="cex-d">느린 화성은 장중하게, 빠른 화성은 활발·긴장되게 들려요. 종지 직전엔 흔히 빨라집니다.</div></div><div class="cnote"><b>지휘 함의 · </b>화성 리듬의 <b>가속</b>을 느끼면 종지로 몰아가는 추진을 몸으로 표현할 수 있어요. 보이싱의 밀집/개방은 발란스로 그 색을 조각하세요.</div>',think:['화성 리듬이 느려질 때 시간이 넓어지는 느낌 — 명상 음악이 화성 교체를 극도로 늦추는 이유와 연결해보기.','같은 진행을 화성 리듬만 두 배 빠르게 하면 무엇을 잃고 무엇을 얻을까?'],listen:['드뷔시 「달빛」','화음이 아주 천천히 바뀔 때 시간이 넓어지는 감각 — 명상 음악과 닿아 있는 지점이에요.'],read:[
'화성 리듬: 화음 바뀌는 속도 — 느림=장중, 빠름=긴장. 종지 직전 가속','밀집(close)=뭉침/두꺼움, 개방(open)=투명/공간감','음역: 저음역 밀집=탁함 → 넓게 벌려야 명료','음색선율(Klangfarben): 같은 음을 악기 바꿔가며 = 음색이 곧 선율'],
q:[mc('종지 직전에 화성 리듬이 흔히 어떻게 되나?',['느려짐','가속','정지','상관없음'],1,'화음 교체가 빨라지며 도착으로 몰아감.'),
sa('음들을 한 옥타브 안에 모아 뭉치고 진하게 만드는 보이싱은?','밀집(close) 보이싱','개방은 넓게 벌려 투명.'),
mc('음색 변화 자체가 선율이 되게 하는 기법은?',['오스티나토','음색선율(Klangfarbenmelodie)','헤미올라','페달'],1,'쇤베르크 Op.16-3. 화성은 정지, 색만 이동.')],
task:'같은 화음을 밀집/개방으로 쳐서 색 차이를 귀로 확인.'},

{d:23,wk:4,ph:'리듬·짜임새',t:'복습 — 리듬·짜임새',lead:'문제로 다지기.',concept:'<p><b>4주차 정리.</b> 리듬의 어긋남과 성부의 얽힘 — 음악의 <b>시간과 층</b>을 다루는 도구들이에요.</p><table class="ctbl"><tr><th>개념</th><th>핵심</th></tr><tr><td>당김음·헤미올라·폴리</td><td>박자와의 어긋남 = 추진·긴장</td></tr><tr><td>가산·아이소·메트릭모듈</td><td>불규칙 묶음·템포 전환</td></tr><tr><td>짜임새 4종</td><td>모노·호모·폴리·헤테로</td></tr><tr><td>화성 리듬·보이싱</td><td>화음 속도 + 배치의 색</td></tr></table><div class="cnote"><b>복습법 · </b>한 곡에서 리듬 기법 2개 + 짜임새 변화 1곳을 찾아 표시해보세요. 다음은 <b>1개월 모의고사</b>로 1~4주를 종합 점검합니다.</div>',think:['리듬의 어긋남(당김·헤미올라)과 화성의 어긋남(불협)은 같은 원리의 다른 차원일까? 긴장–해소 축으로 통합해보기.','이번 주 개념 중 지휘 동작으로 번역하기 가장 어려운 것은 무엇이고 왜일까?'],listen:['거슈윈 「랩소디 인 블루」 도입','클라리넷 글리산도부터 — 리듬과 짜임새가 뒤섞이는 즐거움을 그냥 즐기세요.'],read:['당김음·헤미올라·폴리·아이소·가산 점검','짜임새 4종 + 화성 리듬·보이싱 점검'],
q:[mc('헤미올라의 비율은?',['3:4','2:3','1:2','4:5'],1,'3박 두 마디 = 2박 세 덩어리.'),
sa('같은 선율을 각자 조금씩 다르게 연주하는 짜임새는?','헤테로포니','"하나인 듯 여럿".'),
mc('저음역에서 화음을 밀집으로 쌓으면?',['맑아짐','탁해짐(머드)','커짐','사라짐'],1,'저음은 넓게 벌려야 명료.'),
sa('약박 강조로 어긋남을 만드는 기법은?','당김음','추진력·재즈감.')],
task:'한 곡에서 리듬 기법 2개 + 짜임새 변화 1곳을 찾아 요약.'},

{d:24,wk:4,ph:'모의고사',t:'1개월 모의고사',lead:'화성·선율·리듬 종합 점검. 60% 이상이면 통과.',concept:'<p><b>1개월 종합 점검</b>이에요. 1~4주에 배운 <b>화성 · 선율 · 리듬 · 짜임새</b> 전 범위에서 출제됩니다. 아래 체크리스트로 스스로 준비도를 확인하고, 문제를 푼 뒤 <b>60% 미만</b>이면 약한 주제로 돌아가세요.</p><table class="ctbl"><tr><th>주차</th><th>꼭 알아야 할 것</th></tr><tr><td>1주 화성</td><td>화음의 질 · T-S-D · 종지 · 텐션 · 전위</td></tr><tr><td>2주 화성II</td><td>시퀀스 · 스키마타 · 반음계 · 전조 · 지속음</td></tr><tr><td>3주 선율</td><td>동기 전개 · 악절/문장 · 비화성음 · 대위 · 푸가</td></tr><tr><td>4주 리듬</td><td>당김음·헤미올라 · 가산리듬 · 짜임새 4종 · 화성리듬</td></tr></table><div class="cnote"><b>시험 팁 · </b>틀린 문제는 그냥 넘기지 말고 <b>해당 Day로 돌아가 개념·표를 다시</b> 보세요. 반복 오답 주제 2개를 메모해 다음 주 복습 목록에 넣으면 효과적이에요.</div>',think:['틀린 문제들 사이에 공통 뿌리가 있는지 찾아보기 — 약점은 개념일까 용어일까 귀일까?','1개월 동안 가장 크게 바뀐 내 듣기 습관 하나를 적어보기.'],listen:['자유 감상','이번 달 가장 좋았던 곡을 한 번 더 — 이번엔 아무 분석 없이, 처음 만난 것처럼.'],read:['1~4주 전체에서 출제','틀린 문제는 해당 날로 돌아가 복습'],
q:[mc('V→I 완전정격 종지(PAC)의 조건은?',['전위 가능','소프라노가 3음','두 화음 근음+소프라노 으뜸음','반종지 포함'],2,'가장 강한 종결감.'),
sa('부속화음 V/V의 기능적 목적을 한마디로.','V(딸림)를 잠깐 으뜸음처럼 강조','토니시제이션.'),
mc('계류음의 3단계 순서는?',['걸림→준비→해결','준비→걸림→해결','해결→준비→걸림','준비→해결→걸림'],1,'앞 화음 붙듦→강박 불협→순차 하행.'),
sa('독립 선율들이 얽히는 짜임새 + 그걸 만드는 기술 이름은?','폴리포니 / 대위법','기술=대위법.'),
mc('메트릭 모듈레이션을 정립한 작곡가는?',['쇤베르크','엘리엇 카터','바르토크','리게티'],1,'음표 매개 템포 전환.')],
task:'모의고사 오답을 정리하고, 약한 주제 2개를 다음 주 복습 목록에 적기.'},
